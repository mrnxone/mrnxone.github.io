to the forehead. Males have short, straight horns set between large dark-ringed eyes. The arched back and tucked-in posture are characteristic. Grey-brown colouration blends almost perfectly with dry leaf litter.","behaviour":"Mostly solitary and secretive. When disturbed, dives head-first into thick vegetation and moves away in a zigzag run. Largely crepuscular but seen throughout the day. Territorial scent marking on vegetation.","bestTime":"Dawn and dusk; occasionally seen during the day in cooler, overcast conditions.","strategy":"Slow drives along woodland edges and dry riverbeds. They often pause at forest edges before retreating — this brief exposure is your window. Waterberg Plateau is excellent duiker habitat. Their grey colour makes them invisible in dry leaf litter unless moving."},"imageAssetName":"common_duiker","difficulty":"medium","isNocturnal":true},{"id":"MAM-ANT-017","commonName":"Puku","scientificName":"Kobus vardonii","category":"mammal","subcategory":"antelope","regions":["botswana"],"specificRegions":["chobe","linyanti"],"habitats":["riverine","grassland","wetland"],"conservationStatus":"NT","description":"A medium-sized antelope restricted to the floodplain grasslands and riverine margins of northern Botswana — the Chobe floodplain and Linyanti marshes represent one of its southernmost viable populations. Often confused with the larger kob and the more widespread impala. Botswana is a priority conservation country for this species due to declining range-wide numbers.","howToSpot":{"lookFor":"A stocky, uniformly golden-yellow antelope. Only males have short, forward-sweeping lyre-shaped horns (shorter and more stumpy than impala). Lacks the distinctive black-and-white rump markings of impala, and is stockier. The bright golden coat is a useful distinguishing feature.","behaviour":"Grazes in small groups of 5–15 on open floodplain grassland. Males display from elevated positions. Flees toward water when alarmed.","bestTime":"Year-round along the Chobe floodplain. Most visible in the dry season when concentrated near water.","strategy":"Scan the Chobe floodplain grasslands between Kasane and Serondela for small groups of golden antelope among the more common impala and lechwe. Their stockier build and lack of black markings distinguish them from impala. Ask guides specifically for puku — they are easy to overlook among more common species."},"imageAssetName":"puku","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-018","commonName":"Oribi","scientificName":"Ourebia ourebi","category":"mammal","subcategory":"antelope","regions":["botswana"],"specificRegions":["chobe","okavango"],"habitats":["grassland","savanna"],"conservationStatus":"LC","description":"A delicate, long-necked small antelope of open grassland, characterised by a distinctive black glandular patch below each ear — a scent gland used in territorial marking. More slender and longer-necked than steenbok. Requires specific short-to-medium grassland habitat and is consequently patchily distributed. Monogamous pairs defend well-defined territories.","howToSpot":{"lookFor":"A small, bright rufous-fawn antelope with a notably long neck relative to body size. The distinctive black bare-skin patch below each ear (the subauricular gland) is diagnostic. Only males carry short, straight upright horns. White underside; pale face. Slenderer and more 'gazelle-like' than steenbok.","behaviour":"Monogamous pairs are seen together. Runs with a characteristic stiff-legged bouncing 'pronk' when alarmed. Gives a sharp whistle alarm call. Males stand on elevated termite mounds to survey the territory.","bestTime":"Early morning in open grassland. Active throughout the cooler parts of the day.","strategy":"Scan open medium-height grassland in northern Botswana. Less common than steenbok; encounters are somewhat unpredictable. The Chobe grasslands near the floodplain margin are the best bet in this region. Look for pairs rather than solitary animals."},"imageAssetName":"oribi","difficulty":"hard","isNocturnal":false},{"id":"MAM-PRI-001","commonName":"Chacma Baboon","scientificName":"Papio ursinus","category":"mammal","subcategory":"primate","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","damaraland","fish_river","zambezi","chobe","okavango","moremi","tuli"],"habitats":["savanna","woodland","rocky"],"conservationStatus":"LC","description":"The largest baboon species and the most widely distributed primate in southern Africa. Troops of 20–100 individuals are the defining element of almost every safari landscape. A keystone omnivore and prey item for leopard — baboon alarm calls are the most reliable auditory indicator of a nearby predator. Dominant males are formidable; their canines exceed those of many large carnivores.","howToSpot":{"lookFor":"A large, dog-faced primate on four legs. Olive-brown coat; black naked face and rear. Males are significantly larger with a pronounced mane on the shoulders. Pink, swollen skin around the rump of oestrous females. Infants are born with a black natal coat and pink face.","behaviour":"Troops forage across large areas with a sentinel system — one individual watches for predators while the troop feeds. A sharp two-syllable bark alarm call ('wa-hoo') is given repeatedly when a predator is detected. Troops roost in trees or on cliff faces at night.","bestTime":"Active throughout the day. Most entertaining in the morning when the troop forages.","strategy":"Baboons are everywhere — they require no specific strategy. The interesting observation is using their alarm calls as a predator-detection system. A sustained chorus of alarm barks in a specific direction almost always means a predator — usually a leopard."},"imageAssetName":"chacma_baboon","difficulty":"easy","isNocturnal":false},{"id":"MAM-PRI-002","commonName":"Vervet Monkey","scientificName":"Chlorocebus pygerythrus","category":"mammal","subcategory":"primate","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","waterberg","chobe","okavango","moremi","linyanti"],"habitats":["woodland","riverine","savanna"],"conservationStatus":"LC","description":"A highly intelligent small monkey with one of the most sophisticated alarm call systems known in animals — distinct calls for eagle (causing the group to look up and run into bush), snake (causing them to stand up and look down), and leopard (causing them to climb trees). These specific responses can be elicited by playback and have been the subject of landmark animal behaviour studies.","howToSpot":{"lookFor":"A slim, grey-green monkey with a black face framed by white fur. Males have a bright blue scrotum and red penis — visible and unmistakable. Long tail carried in a characteristic arch when walking. Agile and fast through vegetation.","behaviour":"Lives in troops of 20–50 with a strict dominance hierarchy. Extremely vocal with distinct calls for different predator types. Habituated to humans around camps and lodges — often cheeky and bold around food. Grooms intensively as social bonding.","bestTime":"Active throughout the day. Most active in the morning and late afternoon.","strategy":"Vervet monkeys are very common around camps and lodges and require no special effort to find. For natural behaviour, watch groups away from human food sources in riverine forest. Their eagle alarm calls (causing a downward scatter) are fascinating to observe."},"imageAssetName":"vervet_monkey","difficulty":"easy","isNocturnal":false},{"id":"MAM-PRI-003","commonName":"Lesser Bushbaby","scientificName":"Galago moholi","category":"mammal","subcategory":"primate","regions":["namibia","botswana"],"specificRegions":["zambezi","waterberg","chobe","okavango","moremi","linyanti"],"habitats":["woodland","savanna"],"conservationStatus":"LC","description":"Africa's smallest primate and a remarkable aerialist, capable of leaping up to 2 m horizontally between branches using powerful elongated hind legs. The enormous eyes — some of the largest relative to body size of any mammal — are fixed in the socket and cannot rotate, which is why the animal rotates its entire head instead. Named for its child-like wailing call.","howToSpot":{"lookFor":"Tiny, weighing 150–200 g. Grey-brown body with enormous, forward-facing amber eyes that reflect strongly in torchlight. Enormous bat-like ears that can be folded independently. Long bushy tail longer than the body. Hind legs disproportionately long.","behaviour":"Strictly nocturnal, sheltering in tree holes or dense vegetation by day. Uses a unique foot-washing technique, urinating on its hands and feet to leave a scent trail. The wailing baby-like call is made in the evening and is often the first indication of their presence.","bestTime":"After dark. Most detectable in the first two hours of night when they begin calling.","strategy":"Spotlight along branches in acacia woodland after dark — the enormous orange eye-shine reflected by torchlight is unmistakable even at 50 m. Their wailing calls guide you to their area. Many bush lodges have resident groups that visit regularly."},"imageAssetName":"lesser_bushbaby","difficulty":"medium","isNocturnal":true},{"id":"MAM-SMA-001","commonName":"Aardvark","scientificName":"Orycteropus afer","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","central_kalahari","okavango","moremi","chobe"],"habitats":["savanna","grassland","woodland","semi-arid"],"conservationStatus":"LC","description":"Africa's most ecologically important burrowing animal — aardvark burrows, once vacated, provide shelter for an extraordinary range of species including warthog, hyena, mongoose, porcupine, and pythons. The sole member of its mammalian order, with no close living relatives. Its powerful claws can open a termite mound that would resist a pickaxe; it consumes up to 50,000 termites and ants per night.","howToSpot":{"lookFor":"An unmistakable, pig-sized animal with an elongated, tubular snout, massive donkey-like ears, a heavy, tapered tail, and powerful arched back. Pale pinkish-grey skin, sparsely covered with coarse hair. The hump-backed posture and unique silhouette are unlike any other African mammal.","behaviour":"Strictly nocturnal; spends the day in a burrow. Emerges after dark to forage, moving with a deliberate, purposeful trot and stopping frequently to sniff and dig. Has very poor eyesight but extraordinary hearing and smell.","bestTime":"Night drives in open savanna, particularly in areas with high termite mound density.","strategy":"This is one of the most sought-after night-drive sightings. Drive slowly in open grassland and semi-arid savanna at night, scanning the middle distance. The pale grey body reflects moonlight well. In the Kalahari and around Etosha's periphery, night drives regularly encounter them. A remarkable encounter when it happens."},"imageAssetName":"aardvark","difficulty":"hard","isNocturnal":true},{"id":"MAM-SMA-002","commonName":"Ground Pangolin","scientificName":"Smutsia temminckii","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["central_kalahari","khaudum","okavango","chobe"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"VU","description":"The world's most heavily trafficked mammal, pangolins are under devastating pressure from illegal wildlife trade for their scales and meat in Asia. The ground pangolin is the largest of Africa's two species. Covered in large, overlapping keratin scales — the only mammal with this feature — it rolls into a near-impenetrable ball when threatened. One of the rarest sightings on any African safari.","howToSpot":{"lookFor":"A unique, armoured animal walking on its hind legs with the front legs held off the ground, back arched, using its heavy tail as a counterbalance. Overlapping brown-grey keratin scales cover the entire upper body. Walks with a waddling, bipedal gait unlike any other mammal.","behaviour":"Nocturnal and solitary; forages with its long sticky tongue in termite mounds and ant nests. Rolls into a tight, virtually impenetrable ball when threatened — the scales can withstand lion bites. Digs powerful burrows using the large curved front claws.","bestTime":"Night drives only. Most commonly encountered in the dry season when fewer insects are active above ground and pangolins are more mobile.","strategy":"This is bucket-list territory — encountering a pangolin requires patience and luck. Night drives in the Central Kalahari are the most productive. Alert your guide that you are specifically looking for pangolins — they move with purpose and can be spotted by their distinctive bipedal silhouette from a distance. Treat any sighting as extraordinary."},"imageAssetName":"ground_pangolin","difficulty":"very_hard","isNocturnal":true},{"id":"MAM-SMA-003","commonName":"Cape Porcupine","scientificName":"Hystrix africaeaustralis","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","waterberg","central_kalahari","okavango","moremi","chobe"],"habitats":["savanna","woodland","rocky","semi-arid"],"conservationStatus":"LC","description":"Africa's largest rodent and the world's most heavily armoured porcupine. The quills are modified, hollow hairs up to 50 cm long; when threatened, the porcupine runs backward into the predator, driving the reverse-barbed quills deep into flesh. Lions and leopards have died from infected quill wounds. Quills are found at kills and along roads — a common sign even when animals are rarely seen.","howToSpot":{"lookFor":"A large, stocky rodent with a coat of long black-and-white banded quills on the back and sides. White quills on the head form a crest. The face, underside, and legs are covered in coarse dark hair. The quills rattle distinctively when the animal moves. Unmistakable if seen.","behaviour":"Strictly nocturnal; spends the day in a burrow or rocky den, often in family groups. Forages alone for roots, bulbs, and bark, sometimes travelling several kilometres. The quill rattle is a warning display — it rapidly reverses if pursued.","bestTime":"Night drives only. Most commonly seen on roads in rocky or semi-arid terrain.","strategy":"Drive slowly on dirt roads after dark — porcupines frequently cross roads and freeze in headlights. The white quills are visible from a distance. Rocky hillsides and areas with termite mounds are productive habitat. Their digging signs (disturbed soil, gnawed bones) are more commonly encountered than the animals themselves."},"imageAssetName":"cape_porcupine","difficulty":"medium","isNocturnal":true},{"id":"MAM-SMA-004","commonName":"African Civet","scientificName":"Civettictis civetta","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["zambezi","khaudum","chobe","okavango","moremi","linyanti"],"habitats":["woodland","riverine","savanna"],"conservationStatus":"LC","description":"The largest member of the Viverridae (civet) family and the source of civet musk historically used in perfume-making. A true omnivore with an extraordinary dietary range including toxic millipedes, poisonous plants, carrion, fruit, and small vertebrates. Produces the most powerful anal gland secretion of any carnivore, used to mark territories at 'civet latrines' — specific dung sites that are a telltale sign of their presence.","howToSpot":{"lookFor":"A cat-sized carnivore with boldly spotted black-and-white body, striped legs and neck, and a dark banded tail. The high-arched back and the raised crest of long black hair along the spine are distinctive. Mask-like black face markings. Longer-legged and larger than a genet.","behaviour":"Solitary and strictly nocturnal. Walks with a distinctive high-stepping, deliberate gait. Follows fixed routes repeatedly, scent-marking at regular latrines. When alarmed, raises the dorsal crest dramatically.","bestTime":"Night drives in woodland, particularly in northern Botswana's moist woodland ecosystem.","strategy":"Scan roadsides slowly with a spotlight in woodland areas at night. The spotted coat is visible but the animal often freezes in the beam. Chobe and Moremi offer regular night drive encounters. Look for the communal latrine sites (accumulations of dung) during the day as evidence of regular activity."},"imageAssetName":"african_civet","difficulty":"medium","isNocturnal":true},{"id":"MAM-SMA-005","commonName":"Large-spotted Genet","scientificName":"Genetta tigrina","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["chobe","okavango","moremi","linyanti","zambezi"],"habitats":["woodland","riverine"],"conservationStatus":"LC","description":"A slender, cat-like carnivore with a remarkably cat-like face but a much longer, semi-prehensile tail ringed in black and white. Despite superficial resemblance to a cat, genets are more closely related to mongooses and civets. Extremely agile climbers. Many bush lodges have habituated individuals that visit the dining area at night to hunt geckos and bats attracted to lights.","howToSpot":{"lookFor":"A slender, elongated carnivore with a very long, ringed black-and-white tail. Creamy-white to pale grey body with black or dark brown irregular spots arranged in rows. A dark dorsal stripe runs down the back. Small, pointed face with large eyes and short rounded ears.","behaviour":"Strictly nocturnal; superb climber and acrobat. Hunts insects, lizards, birds, and small rodents, often from branches. Lone foragers. Freezes in torch beam and can be observed closely before retreating.","bestTime":"Dusk onwards. Most easily seen around lodges that have habituated individuals, or on night drives in woodland.","strategy":"Alert lodge staff that you would like to see a genet — many camps in Botswana's northern reserves have resident individuals that appear most nights. For wild encounters, scan tree branches with a spotlight at night. The ringed tail and spotted body are distinctive in the beam."},"imageAssetName":"large_spotted_genet","difficulty":"medium","isNocturnal":true},{"id":"MAM-SMA-006","commonName":"Banded Mongoose","scientificName":"Mungos mungo","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"One of Africa's most entertaining animals to observe — gregarious troops of 10–40 forage together in a synchronised tumbling advance, overturning dung and leaf litter. Each member of a troop has a 'minder' that it grooms and defends; these individual relationships persist for life. Collectively mobs and repels much larger predators including monitor lizards and martial eagles.","howToSpot":{"lookFor":"A compact, short-legged mongoose with 10–15 dark brown transverse bands across the grey-brown back. Slightly larger than a dwarf mongoose. Grizzled grey-brown colouration; pointed muzzle; short, tapering tail with a dark tip.","behaviour":"Forages in tight, mobile groups with a constant low churring contact call. One individual keeps watch for aerial and ground predators. Reacts collectively to threats with an aggressive mob response, advancing in a group with backs arched and hair raised.","bestTime":"Active throughout the day. Groups are conspicuous and noisy.","strategy":"Troops are hard to miss once in good habitat — follow the churring and movement through savanna and woodland edges. In Botswana's northern reserves they are abundant and frequently encountered crossing roads. Easy to watch for extended periods as the troop ignores vehicles."},"imageAssetName":"banded_mongoose","difficulty":"easy","isNocturnal":false},{"id":"MAM-SMA-007","commonName":"Dwarf Mongoose","scientificName":"Helogale parvula","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","khaudum","chobe","okavango","moremi"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"Africa's smallest carnivore, and one of the continent's most socially sophisticated mammals. Groups of 8–30 live in strict matrilineal hierarchies where only the dominant female breeds; all other females and males cooperate to raise her pups. Famous for their mutualistic relationship with hornbills — the birds follow mongoose groups alerting them to aerial predators in exchange for flushed prey.","howToSpot":{"lookFor":"Tiny — adult weighs only 250–350 g. Uniform dark brown, grizzled coat with no distinct markings. Pointed muzzle and small rounded ears. The diminutive size makes them look like overgrown voles from a distance.","behaviour":"Lives and sleeps in termite mounds; groups emerge at sunrise to warm themselves on the mound surface before foraging. Move in a tight, organised group with constant contact calls. Yellow-billed hornbills often accompany the group overhead.","bestTime":"Early morning is best — groups sunbathe on termite mounds before heading out to forage.","strategy":"Park quietly near a large termite mound at dawn and wait. If a group is resident, they will emerge to warm in the early sun before foraging — some of the most rewarding wildlife viewing in Africa. Etosha and northern Botswana's woodlands are excellent."},"imageAssetName":"dwarf_mongoose","difficulty":"medium","isNocturnal":false},{"id":"MAM-SMA-008","commonName":"Meerkat","scientificName":"Suricata suricatta","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["namib_naukluft","fish_river","central_kalahari"],"habitats":["semi-arid","desert","grassland"],"conservationStatus":"LC","description":"Perhaps Africa's most charismatic small mammal — cooperative, vocal, and with a fascinating social structure. Like dwarf mongooses, only the dominant female breeds; subordinates babysit and guard pups and teach them to handle dangerous prey including scorpions (whose venom meerkats have partial immunity to). The upright sentinel posture is one of Africa's most iconic images.","howToSpot":{"lookFor":"Small (700–750 g), slender mongoose with pale silver-grey grizzled fur and dark eye-patches that serve as anti-glare filters for the bright Kalahari sun. Transverse dark bands on the lower back. Stands perfectly upright on hind legs when sentinel-posting — the classic, unmistakable meerkat posture.","behaviour":"Lives in social groups of 3–30. Sentinels rotate, standing upright to scan for aerial and terrestrial predators, giving specific alarm calls for each threat type. Group forages by digging and overturning objects while sentinels watch.","bestTime":"Morning is exceptional — groups emerge from their burrows at first light and 'sunbathe' in an upright row to warm up, facing the rising sun.","strategy":"The Central Kalahari, Makgadikgadi fringe, and southern Namibia are the places. Some groups around wildlife lodges in these areas are habituated and allow very close approach. Arrive at their burrow before dawn and wait — sunrise meerkat sunbathing is worth the early start."},"imageAssetName":"meerkat","difficulty":"medium","isNocturnal":false},{"id":"MAM-SMA-009","commonName":"Rock Hyrax","scientificName":"Procavia capensis","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["namib_naukluft","damaraland","fish_river","waterberg","tuli"],"habitats":["rocky"],"conservationStatus":"LC","description":"One of the most remarkable evolutionary curiosities in the animal kingdom — despite their appearance as fat guinea pigs, hyraxes are the closest living relatives of elephants and manatees. They possess rubber-padded feet with a central moist suction pad that provides extraordinary grip on vertical rock faces. They cannot regulate body temperature well and must warm up by basking each morning.","howToSpot":{"lookFor":"A rotund, rodent-like mammal about the size of a large guinea pig. Grey-brown fur; short legs; no visible tail. A small yellow-orange glandular patch on the back (dorsal gland) is visible at close range. Rounded head with small rounded ears and large eyes.","behaviour":"Lives in colonies of 10–80 on rocky outcrops. Basks communally on exposed rock surfaces each morning. At least one individual serves as sentinel, giving a sharp shrieking alarm call at any threat — after which the whole colony vanishes into rock crevices instantly.","bestTime":"Early morning on sunny days when they bask. Midday in winter.","strategy":"Look for rocky koppies and cliff faces — any suitable rocky outcrop in Namibia will likely hold a hyrax colony. Their basking behaviour makes them very easy to observe in the early morning. Fish River Canyon, Naukluft, and Waterberg are all reliable sites."},"imageAssetName":"rock_hyrax","difficulty":"easy","isNocturnal":false},{"id":"MAM-SMA-010","commonName":"South African Spring Hare","scientificName":"Pedetes capensis","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","central_kalahari","namib_naukluft","makgadikgadi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"Not a hare at all but a highly specialised bipedal rodent, moving in kangaroo-like bounds of up to 2 m on its powerful hind legs. The only member of its family. One of the most unmistakable of all African night-drive sightings — a pair of bright orange eye-shine reflections bounding away in the headlights like a miniature kangaroo.","howToSpot":{"lookFor":"A rabbit-sized, orange-tan rodent that stands and moves exclusively on its elongated hind legs. Very long, bushy, black-tipped tail used for balance. Large, upright ears; large eyes giving brilliant orange eye-shine at night. The kangaroo-like bipedal locomotion is unique in Africa.","behaviour":"Strictly nocturnal; spends the day in a burrow. Moves in a series of powerful two-legged bounds rather than running. Solitary or in pairs. Grazes on short grass and digs for roots.","bestTime":"Night drives on sandy roads in open savanna. Most easily seen in the Kalahari.","strategy":"One of the most reliably seen night-drive species in the Kalahari and Etosha periphery. Drive on sandy roads after dark — the brilliant orange eye-shine at road level bouncing away in the headlights is unmistakable. The Kalahari is outstanding for spring hares."},"imageAssetName":"spring_hare","difficulty":"medium","isNocturnal":true},{"id":"MAM-SMA-011","commonName":"African Ground Squirrel","scientificName":"Xerus inauris","category":"mammal","subcategory":"small_mammal","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","central_kalahari","makgadikgadi"],"habitats":["savanna","semi-arid","grassland"],"conservationStatus":"LC","description":"One of Africa's most entertaining and approachable small mammals. Fully diurnal in extremely hot, exposed desert and semi-arid habitats where few predators are active. Uses its thick, bushy tail as a personal parasol, angling it over its back to create shade. Social females live in cooperative groups while males are solitary or in bachelor bands.","howToSpot":{"lookFor":"A medium-sized, coarsely furred squirrel with a single white stripe on each flank. Cinnamon to grey-brown body. The tail is long, bushy, and flattened with conspicuous black-and-white banding. Red eyes. More robust than tree squirrels.","behaviour":"Forages during the heat of the day when most predators are inactive — a clever anti-predator strategy. Uses the tail as a sunshade. Digs its own burrow systems. Very approachable and inquisitive around campsites.","bestTime":"Mid-morning and midday. Active in full sun when other mammals are sheltering.","strategy":"One of the easiest Kalahari and arid Namibia sightings. Ground squirrels are often seen near roadsides and at campsites, approaching vehicles inquisitively. A simple and delightful observation requiring no effort."},"imageAssetName":"ground_squirrel","difficulty":"easy","isNocturnal":false},{"id":"REP-001","commonName":"Nile Crocodile","scientificName":"Crocodylus niloticus","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"One of the largest and most ancient reptiles on Earth, with a fossil record extending 200 million years. Adults can exceed 5 m and 750 kg. Africa's most dangerous reptile, responsible for an estimated 1,000 human deaths annually. The Okavango Delta and Chobe River hold very large, undisturbed populations. Despite fearsome reputation, crocodiles are attentive mothers, carrying hatchlings to the water in their mouths.","howToSpot":{"lookFor":"A large, armoured reptile with a heavily ridged, greenish-brown back, yellow-brown belly, and a characteristic large-toothed grin with the fourth lower tooth always visible outside the closed jaw. Distinctive yellow-and-black banding in juveniles. Eyes and nostrils positioned on top of the head for submerged surveillance.","behaviour":"Thermoregulates by basking on sand banks with jaws open to release heat. Ambushes prey at the water's edge by surging from shallow water. Rolls prey into a 'death roll' to disorient and dismember it. Females guard nest sites aggressively.","bestTime":"Year-round on any major river. Basking is most common in the cooler morning hours.","strategy":"Scan any sandbank or exposed mud bank along the Chobe or Okavango for the distinctive armoured backs of basking crocodiles. From a boat they are very easy to observe. When on foot near water, always scan the bank and shallows before approaching."},"imageAssetName":"nile_crocodile","difficulty":"easy","isNocturnal":false},{"id":"REP-002","commonName":"Rock Monitor","scientificName":"Varanus albigularis","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","waterberg","fish_river","central_kalahari"],"habitats":["savanna","rocky","semi-arid","woodland"],"conservationStatus":"LC","description":"The largest lizard in southern Africa, reaching 1.5–2 m in length and 6 kg. A powerful, slow-moving predator of eggs, rodents, snakes, and carrion. Unlike the Nile monitor, it is essentially terrestrial rather than aquatic, favouring rocky outcrops and semi-arid savanna. Namibia's fish river canyon and the rocky escarpments of central Namibia are excellent habitat.","howToSpot":{"lookFor":"A very large, robust lizard with a grey-brown body covered with pale yellow-white circular spots and ocelli arranged in rows. The tail is long — often longer than the body. Heavily built compared to the more slender Nile monitor. Tongue is forked and constantly flicking to smell the air.","behaviour":"Active by day; thermoregulates by basking exposed on rocks in the morning. Walks with a characteristic side-to-side gait. Climbs trees and rocks with ease. When threatened, inflates its body, hisses, and lashes with the tail.","bestTime":"Mid-morning when basking on exposed rocks.","strategy":"Scan rocky outcrops, termite mounds, and dry riverbeds in central and southern Namibia. Rock monitors are often seen basking motionless on prominent boulders in the early morning. Fish River Canyon area and the Naukluft mountains are very productive."},"imageAssetName":"rock_monitor","difficulty":"medium","isNocturnal":false},{"id":"REP-003","commonName":"Nile Monitor","scientificName":"Varanus niloticus","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland","woodland"],"conservationStatus":"LC","description":"Africa's largest lizard, reaching up to 2.1 m, and an excellent swimmer with a laterally flattened tail used as a rudder. A predatory generalist that raids crocodile nests, robs bird eggs, takes fish, frogs, and almost any small vertebrate it can overpower. A common sight on any Botswana river trip — they bask conspicuously on banks and fallen logs.","howToSpot":{"lookFor":"A large, slender lizard with a distinctly narrower head than the rock monitor and a more obviously compressed tail. Yellow and black spotted or banded pattern on a dark background, particularly vivid in juveniles. Often seen partially submerged at the water's edge.","behaviour":"Semi-aquatic; hunts both on land and in water. An accomplished swimmer, using its powerful tail for propulsion. When threatened, retreats into water. Constantly flicks its forked tongue to scent-track prey.","bestTime":"Year-round on any river bank. Basking is most active in the morning.","strategy":"On any boat trip in northern Botswana, scan fallen logs and reed-fringed banks — Nile monitors are nearly always visible without special effort. From the Chobe riverfront drive, they are easily seen in the riverine vegetation. Unmistakable at close range."},"imageAssetName":"nile_monitor","difficulty":"easy","isNocturnal":false},{"id":"REP-004","commonName":"Leopard Tortoise","scientificName":"Stigmochelys pardalis","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","namib_naukluft","waterberg","central_kalahari","chobe","okavango","moremi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"Africa's largest tortoise, with adults reaching 70 cm and 40 kg in the northern parts of the range. The striking black-and-yellow patterned domed shell inspired the common name. Remarkably long-lived — up to 100 years. Despite their slow reputation, leopard tortoises can move surprisingly quickly and have been recorded swimming and even occasionally climbing low trees and shrubs to access vegetation.","howToSpot":{"lookFor":"A large, domed tortoise with a bold, high-contrast yellow-and-black or yellow-and-dark-brown spotted and striped shell — the pattern varies regionally. The pale-yellow, column-like legs and small, flat-fronted head are characteristic. Adult shells can be enormous and dome-shaped, not flattened like many tortoise species.","behaviour":"Active in the morning and late afternoon; shelters from heat under bushes at midday. Grazes on grass and succulents. Can close its shell completely by withdrawing limbs. Completely herbivorous.","bestTime":"Warm mornings in spring and summer when they are actively grazing.","strategy":"Drive slowly and scan roadsides in savanna — leopard tortoises are frequently encountered crossing tracks in the morning. They are remarkably common in good habitat but their low profile and camouflage make them easy to drive past. The Serondela area of Chobe and Etosha's grasslands are productive."},"imageAssetName":"leopard_tortoise","difficulty":"easy","isNocturnal":false},{"id":"REP-005","commonName":"African Rock Python","scientificName":"Python natalensis","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","riverine","rocky"],"conservationStatus":"LC","description":"Africa's largest snake and one of the six largest snake species on Earth, reaching 5–6 m with individuals reported to 7.5 m. A non-venomous constrictor that kills by suffocation. Capable of consuming prey as large as impala, crocodiles, and even leopards — accounts of whole adult impala being swallowed are well documented. The distinctive triangular head with heat-sensing labial pits is diagnostic.","howToSpot":{"lookFor":"A massively built snake with a large, distinctly triangular head, and a body patterned in irregular brown, dark olive, and pale patches with a pale yellowish underside. The scales have a slight iridescent sheen. Heat-sensing pits visible as dark marks along the jaw.","behaviour":"Spends much of the day motionless, coiled in a burrow, rock crevice, or dense vegetation. Semi-aquatic; frequently found near water. Thermoregulates by basking in the open. After a large meal, an individual may not eat again for months.","bestTime":"Warm season mornings when basking. Encountered year-round near rivers.","strategy":"Scan rocky outcrops, fallen logs, and vegetation edges near water in warm weather. Pythons are most commonly encountered basking in the open in the morning. Termite mound burrows are a favourite refuge. Rock monitor burrows are frequently taken over by pythons — check rock crevices at the Waterberg. A powerful and impressive encounter when found."},"imageAssetName":"african_rock_python","difficulty":"hard","isNocturnal":false},{"id":"REP-006","commonName":"Black Mamba","scientificName":"Dendroaspis polylepis","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","chobe","okavango","moremi","khaudum"],"habitats":["savanna","woodland","rocky"],"conservationStatus":"LC","description":"Africa's most feared snake and the continent's largest venomous snake, reaching 4.5 m — though most adults are 2.5–3 m. The fastest snake in Africa, capable of 20 km/h over short distances. Despite its fearsome reputation, the black mamba is a shy and retiring animal that only strikes in self-defence. The 'black' refers not to its body colour (which is olive to grey) but to the dark interior of the mouth displayed in a threat gape.","howToSpot":{"lookFor":"A large, slender, olive-grey to grey-brown snake with smooth, rounded scales. The coffin-shaped head is distinctive — narrow and elongated. No hood. The jet-black interior of the open mouth is the defining feature when threatening. More slender and faster-moving than a python.","behaviour":"Primarily terrestrial but climbs trees readily. Moves quickly and purposefully. When threatened, holds the front third of the body erect, spreads a narrow hood, opens the mouth to expose the black interior, and gives a loud hiss — before attempting to retreat. Bites only as a last resort.","bestTime":"Active by day in the warm season. Most commonly encountered on hot mornings.","strategy":"Black mambas are encountered by chance — drive slowly and look for a large, fast-moving snake in savanna or rocky terrain. Despite their fearsome reputation, sightings are uncommon because they retreat quickly. Give any large snake the appropriate distance — 3–4 m minimum. Celebrate the encounter; most guides have seen very few in their careers."},"imageAssetName":"black_mamba","difficulty":"very_hard","isNocturnal":false},{"id":"REP-007","commonName":"Puff Adder","scientificName":"Bitis arietans","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","waterberg","central_kalahari","chobe","okavango","moremi"],"habitats":["savanna","grassland","semi-arid","rocky"],"conservationStatus":"LC","description":"Africa's most dangerous snake statistically, responsible for the majority of snakebite fatalities on the continent — not because of the most potent venom, but because of its cryptic camouflage, sluggish temperament (making it easy to step on), widespread distribution, and abundance. A potently cytotoxic venom causes massive tissue destruction. One of the most perfectly camouflaged animals in nature.","howToSpot":{"lookFor":"A heavy-bodied, triangular-headed snake with bold chevron markings of black, buff, and yellowish-brown in a pattern that mimics dead leaves and dry grass perfectly. The broad, flat, triangular head is very distinct from the neck. A short, stumpy tail. Much wider-bodied than most other snakes.","behaviour":"Ambush predator; relies on camouflage rather than escape. Inflates the body dramatically when threatened — the loud hissing 'puff' is the warning for which it is named. Very slow to move; often does not retreat from approach. Viviparous — births live young.","bestTime":"Active year-round in warm months. Frequently seen on warm roads after dark when thermoregulating on tarmac.","strategy":"The puff adder is not sought but encountered. The key safety message is to never walk in the bush without looking carefully where you are about to step, especially in dry grass and leaf litter. Sightings on roads at night are relatively common — the thermoregulating snake is very visible in headlights."},"imageAssetName":"puff_adder","difficulty":"medium","isNocturnal":false},{"id":"REP-008","commonName":"Boomslang","scientificName":"Dispholidus typus","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","chobe","okavango","moremi"],"habitats":["woodland","savanna","riverine"],"conservationStatus":"LC","description":"One of the most visually striking snakes in Africa — the bright green males with black-edged scales are jewel-like. Despite being rear-fanged (as opposed to front-fanged like mambas), the boomslang has a profoundly potent haemotoxic venom that prevents blood clotting, causing bleeding from every orifice. Fatalities are rare because the snake is extremely shy and must chew to inject venom. 'Boomslang' means 'tree snake' in Afrikaans.","howToSpot":{"lookFor":"A slender, arboreal snake with a distinctly large, rounded eye relative to head size — the largest eye of any African snake. Adult males are vivid emerald green with black scale edges; females and juveniles are brown to olive. The head is short and egg-shaped with the enormous eyes giving it an almost cartoon-like appearance.","behaviour":"Almost exclusively arboreal; very rarely comes to ground. Moves through branches with fluid precision. Inflates the throat to display the brightly contrasting skin between the scales when threatened. Retreats rapidly into the canopy when encountered.","bestTime":"Daytime in woodland and riverine thickets during the warm season.","strategy":"Scan branches in leafy woodland and riverine bush for the vivid green colour of an adult male — they can be visible from a vehicle. Any thorn tree that is being used as a basking spot by an obvious, non-cryptic snake is likely a boomslang. The large eye is diagnostic at close range."},"imageAssetName":"boomslang","difficulty":"hard","isNocturnal":false},{"id":"REP-009","commonName":"Mozambique Spitting Cobra","scientificName":"Naja mossambica","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","riverine"],"conservationStatus":"LC","description":"One of the most commonly encountered cobras in northern Botswana. Capable of accurately spitting venom at the eyes of a perceived threat from up to 2.5 m — the venom causes intense pain and, untreated, permanent blindness. A highly adaptable species found in a wide range of habitats, often entering buildings and sleeping areas. Despite this, bites are uncommon in encounters with a calm snake.","howToSpot":{"lookFor":"A medium-sized cobra (1–1.5 m) with a grey to olive or brownish body. When threatened, spreads a broad hood — dark grey to black with the pale yellow-pink throat colouration visible at the base. Juveniles have more pinkish colouration on the underside. The spread hood is the most obvious signal.","behaviour":"Primarily nocturnal; sometimes active at dawn and dusk. Spreads a hood and hisses loudly as a warning. Will spit venom if the warning is ignored. Not aggressive — will retreat rapidly if given the opportunity.","bestTime":"Night drives in northern Botswana. Frequently encountered crossing roads or near water after dark.","strategy":"Night drives in northern Botswana regularly encounter cobras crossing roads. If you encounter one, observe from a safe distance (3+ m) without trying to approach — the spitting is triggered by perceived threat from close range. Flushing with water immediately resolves eye-spitting incidents."},"imageAssetName":"mozambique_spitting_cobra","difficulty":"medium","isNocturnal":true},{"id":"REP-010","commonName":"Flap-necked Chameleon","scientificName":"Chamaeleo dilepis","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","khaudum","chobe","okavango","moremi","linyanti"],"habitats":["woodland","savanna","riverine"],"conservationStatus":"LC","description":"The most widespread and commonly encountered chameleon in the region. Like all chameleons, its colour changes are controlled by structural changes in skin cell layers rather than simple pigment release — and the primary function is communication and thermoregulation, not camouflage as is commonly believed. The tongue can be launched at prey at 26 km/h, extended to one-and-a-half times the body length.","howToSpot":{"lookFor":"A laterally compressed, slow-moving lizard with prehensile toes, a prehensile curling tail, and independently rotating cone-shaped eyes. Vivid green when calm, darkening to brown-black when threatened or cold. The characteristic flap-like lobes behind the head are erected when displaying. Its walk — a slow, deliberate leaf-like rocking motion — is unmistakable.","behaviour":"Arboreal; moves through branches with a painfully deliberate, rocking motion that mimics a leaf in the breeze. Eyes move constantly and independently. Males are highly territorial and display aggressively with colour changes. Descends to the ground to lay eggs.","bestTime":"Morning when they have descended to lower branches to warm up, before retreating into the canopy for the day.","strategy":"Walk slowly along bush paths and scan low branches at face height — chameleons on lower branches in the morning are the easiest finds. At night they turn whitish-grey as they sleep, making them visible in torchlight. Night walks in Moremi or Chobe woodland will almost certainly find one."},"imageAssetName":"flap_necked_chameleon","difficulty":"medium","isNocturnal":false},{"id":"REP-011","commonName":"Namaqua Chameleon","scientificName":"Chamaeleo namaquensis","category":"reptile","subcategory":null,"regions":["namibia"],"specificRegions":["namib_naukluft","skeleton_coast","sossusvlei"],"habitats":["desert","semi-arid"],"conservationStatus":"LC","description":"One of the world's most remarkable desert-adapted reptiles, found almost exclusively in the hyper-arid coastal Namib Desert. Unlike most chameleons it is largely terrestrial, walking across open sand and gravel with the characteristic rocking gait. Famous for an extraordinary thermoregulatory trick — darkening one side of the body to absorb heat while whitening the other to reflect heat, creating a striking two-tone appearance at dawn.","howToSpot":{"lookFor":"A medium-sized chameleon with a robust, somewhat flattened body. Sandy grey-brown with a yellowish lateral stripe. The two-tone black-and-white colouration during morning thermoregulation is the most visually striking field sign. The characteristic rocking chameleon walk is visible from metres away across open desert.","behaviour":"Walks long distances across bare gravel and sand to hunt insects and small lizards, unlike tree-dwelling chameleons. Buries itself in sand to shelter from extreme heat. Performs the extraordinary split-body thermoregulation every morning.","bestTime":"Early morning when thermoregulating — the two-tone colouration is most dramatic.","strategy":"Drive the gravel plains of the Namib, particularly between Walvis Bay and Swakopmund, in the early morning. Namaqua chameleons often walk along the road edge. The slow, rocking walk is clearly visible against the open gravel surface. The area around the D1982 road through the Namib is productive."},"imageAssetName":"namaqua_chameleon","difficulty":"medium","isNocturnal":false},{"id":"REP-012","commonName":"African Agama","scientificName":"Agama agama","category":"reptile","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","damaraland","zambezi","chobe","okavango","moremi"],"habitats":["savanna","rocky","woodland"],"conservationStatus":"LC","description":"One of Africa's most colourful and conspicuous lizards. Dominant males develop a vivid orange-red to cobalt-blue head and bright blue body — the intensity increasing during social displays and diminishing when submissive. A social species living in small groups of one dominant male, several females, and subordinate males. The dominant male's brilliant colouration makes him easy to identify.","howToSpot":{"lookFor":"A medium-sized, flat-bodied lizard. Dominant males have a striking orange or red head contrasting with a blue or blue-grey body. Females and subordinate males are grey-brown with a grey or orange head. The bipedal running style and the triangular, crested head are characteristic of the genus.","behaviour":"Active by day; bobs its head repeatedly — a territorial display and communication signal. Males display prominently from elevated rocks and branches, rotating to show their colouration to rivals. Thermoregulates by basking exposed in the morning, retreating to shade at midday.","bestTime":"Morning when males are prominently displaying on exposed rocks.","strategy":"Scan any exposed rock face or rocky outcrop, or the walls of buildings in game reserves, for the brilliant blue-and-orange colouration of a dominant male. Agamas are common, conspicuous, and tolerant of approach. Virtually every rocky area in the region holds a territorial male."},"imageAssetName":"african_agama","difficulty":"easy","isNocturnal":false},{"id":"BIR-RAP-001","commonName":"African Fish Eagle","scientificName":"Haliaeetus vocifer","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"The most iconic bird of the African waterway, whose two-note yelping call — the male throwing the head back while the female harmonises — is the defining sound of any African river. A large, powerful eagle closely related to the American Bald Eagle. Despite its aquatic specialisation it is also an accomplished kleptoparasite, stealing fish from herons, storks, and even pelicans in mid-air.","howToSpot":{"lookFor":"Unmistakable adult: snow-white head, chest, and tail contrasting with a rich chestnut belly and black wings and back. The bare yellow facial skin and yellow cere are vivid at close range. Juveniles are mottled brown and much harder to identify. Wingspan up to 2 m.","behaviour":"Perches conspicuously on a dead tree or exposed branch overhanging water for hours. Drops feet-first onto fish within 1 m of the surface, snatching them with large, rough-soled talons. Rarely gets wet — lifts off immediately after the strike.","bestTime":"Year-round near any major river. Most vocal and active in the early morning.","strategy":"Scan the tops of dead trees along any river or lagoon in northern Botswana — a fish eagle will almost always be visible. The Chobe and Okavango are outstanding. The call heard across the water is unmistakable and often leads you to the bird before you see it."},"imageAssetName":"african_fish_eagle","difficulty":"easy","isNocturnal":false},{"id":"BIR-RAP-002","commonName":"Bateleur","scientificName":"Terathopius ecaudatus","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","zambezi","chobe","okavango","moremi","linyanti","central_kalahari","nxai_pan"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"EN","description":"One of Africa's most spectacular and distinctive eagles, now classified as Endangered due to poisoning, persecution, and habitat loss. The name derives from the French street performer who balanced on a tightrope — the bird rocks dramatically from side to side in flight. It patrols enormous territories of up to 500 km² daily, covering over 300 km in the air, and is one of the first scavengers to locate carcasses.","howToSpot":{"lookFor":"In flight: extremely short tail (almost tailless appearance), very long wings, and the characteristic rocking, tilting flight. Adult has jet-black plumage, white wing linings visible from below, red facial skin and cere, and bright red feet. Immatures are all brown for up to 7 years. The silhouette in flight — long wings, no tail — is unique.","behaviour":"Almost always seen in flight, quartering open savanna at speed. Rarely perches for long; when it does, the hunched posture and brilliant facial colouration are striking. Soars on thermals, banking sharply between glides.","bestTime":"Mid-morning to mid-afternoon when thermals are active. Year-round.","strategy":"Scan the sky over open savanna — the tilting, tail-less silhouette is unmistakable once learned. In Etosha and the Kalahari, bateleurs are regular over open plains. The brilliant red face and feet catch the light at perch sites in acacia trees."},"imageAssetName":"bateleur","difficulty":"easy","isNocturnal":false},{"id":"BIR-RAP-003","commonName":"Martial Eagle","scientificName":"Polemaetus bellicosus","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","waterberg","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"VU","description":"Africa's largest eagle and one of the most powerful avian predators on the continent, capable of killing monitor lizards, small antelopes, and even young baboons. It has eyesight estimated at 3–4 times more acute than a human — capable of spotting prey at 5 km. Now Vulnerable; declining across its range due to persecution by farmers who believe it takes livestock.","howToSpot":{"lookFor":"A massive eagle. Adult has a dark brown head, throat, and upper chest; white underparts with dark brown spots; yellow eyes. The white-spotted belly and the combination of size and dark hood are diagnostic. Wingspan up to 2.6 m. Immatures are white below without spots, with a pale face.","behaviour":"Largely aerial; soars at great height on broad, flat wings. Hunts by stooping from height at speed. Often found at its large stick nest in a tall flat-topped tree. Extremely wary — rarely allows close approach on the ground.","bestTime":"Mid-morning when soaring on thermals. Year-round resident.","strategy":"Scan the high sky over open savanna for a very large, flat-winged soaring eagle. Martial eagles soar much higher than buzzards. In Etosha, check tall camelthorn trees for nests. A perched bird allows study of the spotted belly in detail — a memorable encounter."},"imageAssetName":"martial_eagle","difficulty":"hard","isNocturnal":false},{"id":"BIR-RAP-004","commonName":"Secretary Bird","scientificName":"Sagittarius serpentarius","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","central_kalahari","makgadikgadi","nxai_pan","chobe"],"habitats":["savanna","grassland"],"conservationStatus":"EN","description":"One of the most extraordinary birds of prey in the world — a large eagle that hunts entirely on foot, stalking through open grassland on long, stork-like legs and killing prey including snakes, lizards, and rodents with powerful stamping kicks. Now classified as Endangered due to habitat loss. The long, quill-like feathers behind the head are thought to have inspired the name — resembling the quill pens secretaries once tucked behind their ears.","howToSpot":{"lookFor":"Unmistakable. A very tall, long-legged bird of prey walking upright through grassland. Grey body, black wing tips and thighs, long black central tail feathers, and orange-red facial skin around yellow eyes. The long crest of black feathers projecting from the back of the head is diagnostic. Stands 1.2 m tall.","behaviour":"Walks long distances (up to 20 km per day) through open grassland, flushing and stomping prey. Stamps snakes to death with repeated powerful kicks. Pairs are monogamous and territorial; their large, flat stick nest is built at the top of a flat-topped acacia.","bestTime":"Early morning when walking actively in open grassland. Year-round.","strategy":"Scan open grassland and lightly wooded savanna — the secretary bird's upright walking silhouette is unmistakable. In Etosha, check open plains between waterholes. The Makgadikgadi grasslands are excellent habitat. Pairs are often seen walking together or in slow, low display flights."},"imageAssetName":"secretary_bird","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-005","commonName":"Lappet-faced Vulture","scientificName":"Torgos tracheliotos","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","namib_naukluft","khaudum","central_kalahari","chobe","moremi"],"habitats":["savanna","desert","semi-arid"],"conservationStatus":"EN","description":"Africa's largest vulture and the dominant scavenger at any carcass — its massive hooked bill can tear through hide and sinew that other vultures cannot open, making it the key that unlocks a carcass for all other species. Now Endangered due to poisoning (both intentional and from lead in carcasses shot with lead ammunition) and nest disturbance. One of the most impressive birds on the continent.","howToSpot":{"lookFor":"Enormous. Dark brown-black body and wings with a white belly and white thigh patches forming a distinct white stripe down the leg in flight. The bare pink-red facial skin with drooping lappets (folds of skin) on each side of the neck is diagnostic and distinctive. Wingspan up to 2.9 m — Africa's largest.","behaviour":"Dominates all other vultures at a carcass; other species wait until the lappet-faced has fed. Arrives relatively late at a carcass once it has spotted descending smaller vultures. Soars at great height. Very wary; rarely approached closely.","bestTime":"Mid-morning to mid-afternoon when soaring. Year-round.","strategy":"At any large carcass, the lappet-faced vulture is the largest and most dominant bird present. Scan soaring vultures — the lappet-faced is noticeably larger with a dark body and white leg stripe visible from below. In Etosha, check large dead trees near waterholes where they roost."},"imageAssetName":"lappet_faced_vulture","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-006","commonName":"White-backed Vulture","scientificName":"Gyps africanus","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","zambezi","chobe","okavango","moremi","linyanti","central_kalahari","nxai_pan"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"CR","description":"The most abundant vulture in Africa but now Critically Endangered — populations have declined by over 90% in west Africa and 60–70% elsewhere over 50 years, driven by poisoning, demand for body parts in the traditional medicine trade, and collision with power lines. Despite its status it remains a familiar and essential sight at kills across Botswana and Namibia's core protected areas.","howToSpot":{"lookFor":"A large, pale brown vulture with a white back visible in flight — diagnostic when seen from above or when the bird lands and folds its wings. Bare pinkish-white head and neck with a white neck ruff. Juveniles are dark brown. The most likely vulture seen at any kill in the region.","behaviour":"Highly gregarious; descends to kills in groups of dozens or even hundreds, jostling and competing noisily. Locates carcasses by watching other descending vultures from great height. Can eat 1 kg of meat in under a minute. Roosts communally in large trees.","bestTime":"Mid-morning at carcasses. Spiralling groups ('kettles') visible from kilometres away are a reliable indicator of a kill below.","strategy":"Follow spiralling vultures down — they reliably indicate a kill below. At Etosha, watch the sky above waterholes where predators make kills. A descending group of white-backed vultures in the distance should always be investigated."},"imageAssetName":"white_backed_vulture","difficulty":"easy","isNocturnal":false},{"id":"BIR-RAP-007","commonName":"Verreaux's Eagle","scientificName":"Aquila verreauxii","category":"bird","subcategory":"raptor","regions":["namibia"],"specificRegions":["namib_naukluft","damaraland","fish_river","waterberg"],"habitats":["rocky","semi-arid","desert"],"conservationStatus":"LC","description":"One of the world's most specialised large eagles, with over 98% of its diet consisting of rock hyrax. So specialised that where hyrax populations collapse, Verreaux's Eagles disappear. Restricted almost entirely to rocky hillsides and mountains in Namibia and southern Africa. Adult plumage — jet black with a brilliant white back and rump — is among the most striking of any eagle.","howToSpot":{"lookFor":"Jet-black plumage with a brilliant white back, rump, and white 'V' visible on the upper wings in flight. White patch at the base of the primaries visible from below. Vivid yellow cere and feet. Wingspan up to 2.3 m. Immatures are mottled brown and rufous. The white back of an adult in flight is visible from kilometres away.","behaviour":"Pairs hold permanent territories around rocky koppies and cliff faces where hyrax colonies live. Engages in spectacular soaring display flights low over ridgelines. Stoops at high speed to take hyrax in the open. Pairs hunt cooperatively — one distracts the colony while the other strikes.","bestTime":"Morning soaring along cliff faces and rocky ridgelines.","strategy":"Locate a rocky koppie with a hyrax colony and watch the sky above it. Verreaux's Eagles patrol their territory regularly and will fly over the same ridgeline repeatedly. Fish River Canyon, the Naukluft Mountains, and rocky areas of Damaraland are all productive sites."},"imageAssetName":"verreauxs_eagle","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-008","commonName":"Tawny Eagle","scientificName":"Aquila rapax","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","central_kalahari","makgadikgadi","nxai_pan","chobe"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"VU","description":"A medium-large eagle of open arid savanna, now Vulnerable and declining across its global range. An opportunistic predator and scavenger — will steal food from other raptors, follow safari vehicles to take flushed prey, and attend grass fires to catch fleeing animals. The most frequently encountered medium-large eagle in Etosha and the Kalahari.","howToSpot":{"lookFor":"A large, uniformly tawny-brown eagle with a rounded head, relatively small bill, and a somewhat slouched, 'hunched' perching posture. Pale yellow gape extends past the eye — distinguishing it from the similar but smaller Wahlberg's and Steppe Eagles. Wing tips reach the tail tip when perched.","behaviour":"Perches prominently on isolated trees and termite mounds. Highly kleptoparasitic — will harass smaller raptors and storks for prey. Scavenges readily at carcasses. Attends grass fires and locust swarms for easy pickings.","bestTime":"Active throughout the day in open country. Year-round.","strategy":"Scan prominent perch sites — isolated trees, termite mounds, and telephone poles in open savanna. Tawny eagles are sedentary and hold fixed territories, so the same tree may be used daily. The large gape extending past the eye is the best identification feature."},"imageAssetName":"tawny_eagle","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-009","commonName":"Pygmy Falcon","scientificName":"Polihierax semitorquatus","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","kaokoveld","central_kalahari"],"habitats":["semi-arid","savanna","grassland"],"conservationStatus":"LC","description":"Africa's smallest raptor — barely larger than a sparrow at 19–20 cm — yet a ferocious hunter of lizards, large insects, and small rodents. Has an intimate obligate relationship with the sociable weaver: it nests exclusively in the outer chambers of sociable weaver colonies, providing some protection against predators in return for the shelter. One of the most charming birds of the Namibian and Kalahari arid zones.","howToSpot":{"lookFor":"Tiny, perky falcon. Male has white underparts, grey upperparts, chestnut back, and a white face with a prominent white 'spectacle' around the eye. Female has a chestnut back and mantle. The short, hooked bill and upright falcon posture on a prominent perch are distinctive despite the tiny size.","behaviour":"Perches conspicuously on top of or beside sociable weaver nests and on bare branches, scanning for prey. Bobs its tail repeatedly when alert. Hunts with a low, fast, direct flight followed by a ground pounce.","bestTime":"Active throughout the day. Year-round resident.","strategy":"Find a sociable weaver colony — any large haystack-like nest on a camelthorn tree in the Namib or Kalahari — and scan the perimeter carefully. Pygmy falcons are nearly always present in or around the nest. The bold white face patch is visible at considerable distance for such a tiny bird."},"imageAssetName":"pygmy_falcon","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-010","commonName":"Gabar Goshawk","scientificName":"Micronisus gabar","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","waterberg","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"A small, agile hawk of open savanna and woodland. Occurs in two morphs — the normal grey morph and a rare melanistic (all-black) morph that resembles a small falcon. Remarkable for its nesting strategy of incorporating spider webs into the nest structure and draping the nest with spider webs containing the husks of dead insects — the function of which is still debated.","howToSpot":{"lookFor":"A small, compact hawk. Normal morph: pale grey above and white below with fine grey barring on the breast; bright red cere, eye-ring, and legs. Melanistic morph: all black with red cere and legs. Both morphs have a white rump patch visible in flight. Short, rounded wings.","behaviour":"An active, fast hunter of small birds, lizards, and insects. Hunts low through the vegetation in fast, darting pursuit. Often seen perching briefly before dashing into cover. Pairs circle high together in display.","bestTime":"Active throughout the day. Most conspicuous in the morning.","strategy":"Drive slowly through open woodland and scan low branches and the interior of acacia trees. The red cere and eye-ring are vivid and catch light well. In Etosha, check camelthorn woodland around waterholes. The melanistic form is always a striking surprise."},"imageAssetName":"gabar_goshawk","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-011","commonName":"Osprey","scientificName":"Pandion haliaetus","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","skeleton_coast"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"A cosmopolitan fish-hunting raptor that occurs in the region primarily as a Palearctic migrant (October–April), with small numbers resident year-round. Uniquely among raptors (other than the fish eagle), it reverses its outer toe to grip slippery fish with two toes in front and two behind, and its foot pads have sharp, scale-like projections for gripping. Plunges feet-first into water from up to 30 m.","howToSpot":{"lookFor":"A large raptor with long, narrow, angled wings and a distinctive M-shape in flight. White underparts, dark brown upperparts, dark brown mask through the eye, and a white head with a brown crown streak. The long, narrow wings with a carpal patch and bent 'elbow' in flight are diagnostic.","behaviour":"Hovers over water, scanning for fish near the surface, then plunges feet-first with wings folded back. Shakes water from its plumage on emergence and always carries fish head-forward to reduce drag. Perches on prominent waterside posts and dead trees.","bestTime":"Year-round on major rivers; most abundant October–April when migrants are present.","strategy":"Scan exposed perches — dead trees, bridge railings, riverside posts — above any major river. The bold dark-and-white plumage is easy to identify at a distance. On the Chobe and Okavango rivers, ospreys are regular in the migration season. Watch for the hover-and-plunge hunting sequence."},"imageAssetName":"osprey","difficulty":"medium","isNocturnal":false},{"id":"BIR-RAP-012","commonName":"African Hawk-Eagle","scientificName":"Aquila spilogaster","category":"bird","subcategory":"raptor","regions":["namibia","botswana"],"specificRegions":["khaudum","zambezi","waterberg","chobe","okavango","moremi","linyanti"],"habitats":["woodland","savanna","riverine"],"conservationStatus":"LC","description":"A powerful, medium-large eagle of dense woodland and riverine forest — a fast, agile predator that takes prey up to the size of a small impala and monitors. Less conspicuous than the martial eagle but a more capable hunter in woodland due to its shorter, rounder wings. The white underparts heavily streaked with dark brown are distinctive.","howToSpot":{"lookFor":"A large, powerful eagle with white underparts heavily streaked with dark brown-black from the throat to the belly. Dark brown upperparts; yellow eyes; feathered legs down to the yellow feet (distinguishing it from the bare-legged hawk eagles). In flight, the broad, rounded wings and powerful build are apparent.","behaviour":"An aerial hunter, stooping at speed from above the canopy into forest cover. Perches inside woodland — harder to see than open-country eagles. Pairs perform aerial display flights above their territory, calling with a loud, yelping cry.","bestTime":"Morning display flights are the most conspicuous time. Year-round resident.","strategy":"Scan woodland interior from the road — the African hawk-eagle perches inside dense trees and can be very hard to spot. High-pitched yelping calls from woodland canopy are the best locator. In Moremi and Chobe forests, check tall trees near clearings where the eagles hunt."},"imageAssetName":"african_hawk_eagle","difficulty":"hard","isNocturnal":false},{"id":"BIR-WAT-001","commonName":"African Jacana","scientificName":"Actophilornis africanus","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"Nicknamed the 'lily-trotter' for its ability to walk across floating vegetation on enormously elongated toes that distribute its weight over a wide surface area. A polyandrous species — females maintain harems of up to four males, each of which incubates eggs and raises chicks alone. When danger threatens, a male gathers his chicks under his wings with only their legs dangling visibly — one of Africa's most charming sights.","howToSpot":{"lookFor":"A chestnut-brown bird the size of a moorhen with white and black neck and head markings, a vivid blue frontal shield on the forehead, and absurdly long, spindly toes that spread widely as it walks on lily pads. The blue bill and shield are unmistakable.","behaviour":"Walks continuously across floating vegetation with a high-stepping gait. Very territorial; females chase rival females with aggressive displays. Flicks wings to reveal white wing patches. The male carrying chicks under his wings is one of the most extraordinary parental behaviours in birds.","bestTime":"Year-round on any permanent water with floating vegetation. Most active in the morning.","strategy":"Any lily pad-covered lagoon or slow-moving channel in the Okavango will have jacanas — simply scan the floating vegetation surface. The chestnut body and blue frontal shield are visible from a considerable distance. A boat trip through the delta channels is ideal."},"imageAssetName":"african_jacana","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-002","commonName":"Saddle-billed Stork","scientificName":"Ephippiorhynchus senegalensis","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["wetland","riverine","grassland"],"conservationStatus":"LC","description":"Africa's tallest stork and arguably its most beautiful wading bird. The dramatic combination of red, black, and yellow on the bill — the 'saddle' being the yellow plate at the base — makes it instantly recognisable. Unlike most storks it does not soar on thermals but flies strongly with regular wing-beats. Usually found in pairs; one of the few stork species that is largely silent.","howToSpot":{"lookFor":"A very large stork — up to 1.5 m tall — with striking black-and-white plumage, a brilliant red bill with a yellow saddle at the base, and a black band between red and yellow. Red and yellow eye-wattles. Long red legs. Males have dark eyes, females have yellow eyes — a rare sexual difference visible in the field.","behaviour":"Wades slowly through shallow water, hunting fish, frogs, and crabs with slow, deliberate steps and sudden lunging stabs. Usually seen in pairs or alone — never in large flocks. Flies with neck extended (unlike herons which fold the neck in flight).","bestTime":"Year-round in shallow wetlands. Most active in the morning.","strategy":"Scan shallow, open floodplains and the margins of lagoons in northern Botswana. The saddle-bill's height and vivid colouration make it visible at great distance. The Okavango floodplains and Chobe's seasonal marshes are reliable. Pairs often use the same territory for years."},"imageAssetName":"saddle_billed_stork","difficulty":"medium","isNocturnal":false},{"id":"BIR-WAT-003","commonName":"Goliath Heron","scientificName":"Ardea goliath","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"The world's largest heron, standing 1.5 m tall with a wingspan of 2.3 m. Uses size to dominate prime fishing spots and will aggressively displace smaller herons. A patient, motionless hunter of large fish, targeting prey too large for other herons to handle — catfish and tilapia up to 50 cm are taken. The deep, hoarse croaking calls carry far across water.","howToSpot":{"lookFor":"Unmistakable — far larger than any other heron in the region. Slate-grey upperparts, chestnut-red neck and chest with white streaks, chestnut-red underparts. The sheer size is the primary field mark. In flight, the slow, heavy wing-beats and fully extended neck distinguish it from a smaller heron immediately.","behaviour":"Stands motionless at the water's edge for extended periods, waiting for fish within striking distance. Wades slowly. Highly territorial around productive fishing spots — will chase away fish eagles and other herons with loud calls and raised wings.","bestTime":"Year-round on any major river or lagoon. Active throughout the day.","strategy":"Scan exposed banks, reed edges, and shallow channel margins along the Chobe and Okavango. The goliath heron's size makes it visible from a considerable distance — it dwarfs any nearby grey heron for comparison. A boat trip in the delta reliably produces close sightings."},"imageAssetName":"goliath_heron","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-004","commonName":"Wattled Crane","scientificName":"Bugeranus carunculatus","category":"bird","subcategory":"waterbird","regions":["botswana"],"specificRegions":["okavango","moremi","linyanti","chobe"],"habitats":["wetland","grassland"],"conservationStatus":"VU","description":"Africa's largest crane and one of its most threatened birds, with a global population of under 8,000. Botswana's Okavango Delta is a global stronghold, supporting the largest single population. Extremely sensitive to disturbance at the nest — a single human approach can cause nest abandonment. Pairs mate for life and perform elaborate, synchronised dancing displays.","howToSpot":{"lookFor":"A very large, grey-and-white crane with a distinctive white face and red wattles hanging from the chin. The wattles are long, pendulous, and vivid red. Dark grey body with white neck and breast. In flight, appears largely white above with black flight feathers. Stands 1.2 m tall.","behaviour":"Usually seen in pairs; solitary away from breeding season. Forages in shallow water and on floodplain margins for bulbs, tubers, and aquatic invertebrates. The crane's dancing display — bowing, leaping, and calling in synchrony — is one of Africa's great bird spectacles.","bestTime":"Year-round in the Okavango. Most conspicuous in the dry season (May–September) when water recedes and cranes concentrate.","strategy":"Scan open floodplain margins and seasonal grassland in the Okavango from a vehicle or boat. The white neck and red wattles are visible at great distance. Pairs tend to use the same areas repeatedly. Give nesting pairs a very wide berth — disturbance at the nest can cause abandonment."},"imageAssetName":"wattled_crane","difficulty":"medium","isNocturnal":false},{"id":"BIR-WAT-005","commonName":"Lesser Flamingo","scientificName":"Phoeniconaias minor","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["etosha","makgadikgadi","namibNaukluft"],"habitats":["wetland","grassland"],"conservationStatus":"NT","description":"The smaller of the two flamingo species in the region, but by far the more numerous — gatherings of hundreds of thousands on Etosha's pans and the Makgadikgadi Pans create some of the most spectacular wildlife spectacles on Earth. Filters blue-green algae from alkaline water using a highly specialised, upside-down bill. The Makgadikgadi breeds at irregular intervals depending on water levels.","howToSpot":{"lookFor":"A pink flamingo significantly smaller than the greater flamingo. Deeper, more uniformly dark pink plumage. The bill is dark crimson to black — much darker than the greater flamingo's pink bill with black tip. The combination of size and dark bill distinguishes it from the greater flamingo at close range.","behaviour":"Highly gregarious — almost never seen alone. Feeds by sweeping its inverted bill through the water in a side-to-side motion, filtering algae. Large flocks take off in a wave of pink when disturbed, the sound of thousands of wings audible from far away.","bestTime":"Most spectacular in the wet season (December–March) when large numbers gather on shallow alkaline pans.","strategy":"The Makgadikgadi Pans and Etosha's Andoni and Okondeka areas attract enormous flamingo flocks. View from a distance with binoculars — closer approach flushes the flock. The pink mass visible on the horizon of a glittering white pan is one of Africa's great spectacles."},"imageAssetName":"lesser_flamingo","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-006","commonName":"African Spoonbill","scientificName":"Platalea alba","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","chobe","okavango","moremi","makgadikgadi"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"A large, all-white wading bird with a uniquely flattened, spatula-shaped bill used to sweep through shallow water in a distinctive side-to-side motion, detecting prey by touch rather than sight. The only spoonbill in Africa. The red facial skin and red bill with
