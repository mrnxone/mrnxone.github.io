<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Safari Tracker">
<title>Safari Tracker 🦁</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4EFE6;--card:#FFFFFF;--text:#1C1A17;--sec:#7A7068;--border:#E4DDD2;
  --accent:#B8722A;--accent-light:#FBF0E3;--green:#2A7A50;--green-light:#E8F5EE;
  --red:#C0392B;--radius:14px;--nav-h:68px;
  --mammal:#8B5E3C;--mammal-bg:#F7EDDF;
  --bird:#2869A8;--bird-bg:#E4EEF8;
  --reptile:#3D7A52;--reptile-bg:#E2F0E7;
  --amphibian:#2E7A72;--amphibian-bg:#E2F0EE;
  --fish:#2B59A0;--fish-bg:#E2EBF8;
}
html{background:var(--bg);scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;
  min-height:100vh;padding-bottom:var(--nav-h)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;height:var(--nav-h);
  padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  font-size:10px;font-weight:500;color:var(--sec);padding-bottom:4px;
  transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:24px;line-height:1}

/* ── HOME ── */
.home-header{padding:52px 20px 0}
.home-greeting{font-size:13px;font-weight:600;color:var(--sec);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.home-title{font-size:32px;font-weight:800;letter-spacing:-.5px}

.ring-section{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px}
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;
  width:180px;height:180px}
.ring-wrap svg{position:absolute;inset:0}
.ring-inner{text-align:center;z-index:1}
.ring-num{font-size:48px;font-weight:800;letter-spacing:-2px;color:var(--text);line-height:1}
.ring-denom{font-size:14px;color:var(--sec);margin-top:2px}
.ring-label{font-size:16px;font-weight:600;margin-top:14px;text-align:center}
.ring-sub{font-size:13px;color:var(--sec);text-align:center;margin-top:3px}

.cat-section{padding:0 16px 24px}
.section-hd{font-size:13px;font-weight:700;color:var(--sec);
  text-transform:uppercase;letter-spacing:.7px;margin:0 0 10px 4px}
.cat-row{background:var(--card);border-radius:var(--radius);padding:13px 14px;
  margin-bottom:8px;cursor:pointer;transition:transform .1s}
.cat-row:active{transform:scale(.98)}
.cat-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-icon{font-size:18px}
.cat-name{font-size:14px;font-weight:600;flex:1}
.cat-count{font-size:13px;color:var(--sec)}
.bar-bg{height:6px;background:#EEEAE3;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ── LIST ── */
.list-header{padding:52px 16px 12px;display:flex;align-items:center;gap:10px}
.list-title{font-size:28px;font-weight:800;letter-spacing:-.5px;flex:1}
.group-toggle{background:var(--accent-light);color:var(--accent);
  border:none;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600}

.search-wrap{padding:0 16px 10px;position:relative}
.search-wrap input{width:100%;padding:11px 16px 11px 42px;border:1.5px solid var(--border);
  border-radius:13px;background:var(--card);font-size:15px;color:var(--text);
  transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);
  font-size:17px;pointer-events:none}

.filter-scroll{display:flex;gap:8px;padding:0 16px 12px;
  overflow-x:auto;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);font-size:13px;font-weight:500;white-space:nowrap;
  transition:all .15s;color:var(--text)}
.chip.on{border-color:var(--accent);background:var(--accent);color:#fff}

.results-bar{padding:2px 16px 8px;font-size:13px;color:var(--sec)}

.animal-list{padding:0 16px;display:flex;flex-direction:column;gap:9px}
.sect-label{font-size:12px;font-weight:700;color:var(--sec);
  text-transform:uppercase;letter-spacing:.7px;padding:10px 0 4px}
.sect-label:first-child{padding-top:2px}

.a-card{background:var(--card);border-radius:var(--radius);
  display:flex;align-items:center;gap:12px;padding:12px 12px;
  cursor:pointer;transition:transform .1s;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.a-card:active{transform:scale(.98)}
.a-thumb{width:54px;height:54px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0}
.a-info{flex:1;min-width:0}
.a-name{font-size:15px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.a-sci{font-size:12px;color:var(--sec);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.a-badges{display:flex;align-items:center;gap:5px;margin-top:5px}
.a-spotted{font-size:22px;flex-shrink:0;margin-left:4px}
.nocturnal-icon{font-size:11px;opacity:.6}

/* ── BADGES ── */
.badge{padding:2px 7px;border-radius:7px;font-size:11px;font-weight:700}
.b-lc{background:#E4F2DC;color:#2D6A1F}.b-nt{background:#ECF2DC;color:#4D6A1F}
.b-vu{background:#FEF0DC;color:#8A4E10}.b-en{background:#FEE6DC;color:#8A2C10}
.b-cr{background:#FDDCDB;color:#7A1818}.b-dd{background:#EEEAE3;color:#666}

.diff-dots{display:flex;gap:2px}
.dd{width:6px;height:6px;border-radius:50%}
.dd.f{background:var(--accent)}.dd.e{background:#DDD8CF}

/* ── DETAIL ── */
.detail-hero{padding:52px 20px 24px;display:flex;flex-direction:column;
  align-items:center;text-align:center;position:relative;min-height:220px}
.d-back{position:absolute;top:52px;left:16px;background:rgba(255,255,255,.25);
  border:none;border-radius:10px;padding:7px 13px;font-size:14px;
  color:white;font-weight:500}
.d-emoji{font-size:72px;line-height:1;margin-bottom:14px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.2))}
.d-name{font-size:26px;font-weight:800;color:white;letter-spacing:-.3px;line-height:1.1}
.d-sci{font-size:14px;font-style:italic;color:rgba(255,255,255,.82);margin-top:5px}
.d-hero-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.hero-badge{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,.22);color:white;border:1px solid rgba(255,255,255,.3)}

.d-body{padding:16px;display:flex;flex-direction:column;gap:14px}

.d-card{background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.05)}
.d-card-title{font-size:16px;font-weight:700;margin-bottom:10px}
.d-text{font-size:14px;line-height:1.68;color:#3A3530}

/* spotted card */
.spot-card.spotted{background:var(--green-light);border:1.5px solid #A8D5BC}
.spot-card.unspotted{background:#F8F5F0;border:1.5px dashed #CEC8BE}
.spot-row{display:flex;align-items:center;gap:12px}
.spot-ico{font-size:36px}
.spot-meta{flex:1}
.spot-lbl{font-size:16px;font-weight:700}
.spot-detail{font-size:13px;color:var(--sec);margin-top:2px}
.spot-edit{background:none;border:none;color:var(--accent);
  font-size:13px;font-weight:600;padding:0;margin-top:6px}
.spot-btn{width:100%;padding:14px;border:none;border-radius:12px;
  font-size:16px;font-weight:700;margin-top:2px;transition:transform .1s}
.spot-btn:active{transform:scale(.98)}
.spot-btn.mark{background:var(--green);color:white}
.spot-btn.edit{background:white;color:var(--green);border:1.5px solid var(--green);margin-top:10px}
.unmark-btn{display:block;background:none;border:none;
  color:#AAA;font-size:12px;margin:8px auto 0;text-decoration:underline}

/* how to spot */
.hts-grid{display:flex;flex-direction:column;gap:10px}
.hts-item{background:#F8F4EE;border-radius:11px;padding:12px 14px}
.hts-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--sec);margin-bottom:5px;
  display:flex;align-items:center;gap:5px}
.hts-txt{font-size:13px;line-height:1.65;color:#3A3530}

/* regions */
.region-grp{margin-bottom:10px}
.region-country{font-size:12px;font-weight:700;color:var(--sec);margin-bottom:6px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.r-chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.r-chip.namibia{background:#FEF0DC;color:#8A4E10}
.r-chip.botswana{background:#E2EBF8;color:#1A3E80}
.h-chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;
  background:#F0EAE0;color:#5A4A3A}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;
  padding:24px 20px 40px;width:100%;max-width:480px;
  animation:slide-up .3s ease}
@keyframes slide-up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{font-size:18px;font-weight:800;margin-bottom:3px}
.modal-sci{font-size:13px;font-style:italic;color:var(--sec);margin-bottom:20px}

.toggle-row{display:flex;border:1.5px solid var(--border);
  border-radius:11px;overflow:hidden;margin-bottom:16px}
.t-opt{flex:1;padding:11px;text-align:center;font-size:14px;
  font-weight:600;background:none;border:none;transition:all .15s}
.t-opt.on{background:var(--green);color:white}

.m-field{margin-bottom:13px}
.m-lbl{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--sec);margin-bottom:5px}
.m-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);
  border-radius:11px;font-size:15px;color:var(--text);
  background:white;transition:border-color .15s}
.m-input:focus{border-color:var(--accent)}
.m-textarea{resize:none;height:80px;line-height:1.5}

.m-actions{display:flex;gap:10px;margin-top:20px}
.m-save{flex:1;padding:14px;background:var(--green);color:white;
  border:none;border-radius:12px;font-size:16px;font-weight:700}
.m-cancel{padding:14px 20px;background:#F0EAE0;color:var(--text);
  border:none;border-radius:12px;font-size:15px;font-weight:500}

.empty{text-align:center;padding:60px 30px;color:var(--sec)}
.empty-icon{font-size:48px;display:block;margin-bottom:12px}
.empty-txt{font-size:15px;line-height:1.6}
</style>
</head>
<body>

<div id="app"></div>

<nav id="nav">
  <button class="nav-btn active" data-nav="home">
    <span class="nav-icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" data-nav="list">
    <span class="nav-icon">🔭</span>Animals
  </button>
</nav>

<div class="overlay" id="modal">
  <div class="modal" id="modal-card">
    <div class="modal-hd" id="modal-name"></div>
    <div class="modal-sci" id="modal-sci"></div>
    <div class="toggle-row">
      <button class="t-opt on" id="t-spotted" onclick="modalToggle(true)">✓ Spotted</button>
      <button class="t-opt" id="t-unspotted" onclick="modalToggle(false)">✗ Not spotted</button>
    </div>
    <div id="modal-fields">
      <div class="m-field">
        <div class="m-lbl">Date</div>
        <input class="m-input" type="date" id="m-date">
      </div>
      <div class="m-field">
        <div class="m-lbl">Location (optional)</div>
        <input class="m-input" type="text" id="m-location" placeholder="e.g. Etosha waterhole">
      </div>
      <div class="m-field">
        <div class="m-lbl">Notes (optional)</div>
        <textarea class="m-input m-textarea" id="m-notes" placeholder="What did you observe?"></textarea>
      </div>
    </div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveSighting()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const CATALOGUE = {"version":"1.1","lastUpdated":"2025-05","totalCount":125,"animals":[{"id":"MAM-MEG-001","commonName":"African Elephant","scientificName":"Loxodonta africana","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","kaokoveld","zambezi","khaudum","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","riverine","desert"],"conservationStatus":"VU","description":"The world's largest land animal, consuming up to 150 kg of vegetation daily. Botswana harbours the largest elephant population on Earth — over 130,000 individuals — concentrated around the Chobe and Okavango systems. Namibia's desert-adapted elephants of Damaraland and Kaokoveld are a distinct ecotype, capable of walking up to 70 km between water sources across waterless gravel plains.","howToSpot":{"lookFor":"Unmistakable grey bulk up to 4 m at the shoulder; large fan-shaped ears unique to African elephants; long muscular trunk; ivory tusks present in most adults. Desert-adapted individuals in Namibia appear leaner with proportionally longer legs.","behaviour":"Highly social, living in matriarchal family units. They rumble constantly in low-frequency communication, dust-bathe to protect skin, and will wade chest-deep through rivers. Lone bulls are common and can be more unpredictable.","bestTime":"Year-round, but dry season (May–October) concentrates herds around permanent water. Waterholes and rivers at dawn and dusk offer the best sightings.","strategy":"Park yourself at an Etosha waterhole at first light and wait — herds may spend hours drinking. On Chobe's floodplain, take a boat: elephants swim across the river in the dry season. In Damaraland, ask guides for the desert herd's last-known location and follow their truck-sized tracks."},"imageAssetName":"african_elephant","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-002","commonName":"African Lion","scientificName":"Panthera leo","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","zambezi","chobe","okavango","moremi","linyanti","central_kalahari","nxai_pan"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"VU","description":"Africa's apex predator and the only truly social felid, living in prides of up to 30 individuals led by coalitions of related males. Etosha's lions are famous for nocturnal hunts under floodlit waterholes; the Okavango and Linyanti prides are known for exceptional size and bold vehicle tolerance. The Kalahari supports a distinct desert-adapted population.","howToSpot":{"lookFor":"Adult males are unmistakable with a full mane ranging from blonde to near-black. Females and young are tawny-yellow and easily confused with dry grass at a distance. Very large head and paws distinguish them from leopard.","behaviour":"Rests up to 20 hours per day, usually in shade. Hunts in coordinated groups most actively at night and dawn. Will lie in the open on cool mornings to absorb sun. Males advertise territory with deep, resonant roars audible 8 km away.","bestTime":"Year-round. Early morning and late afternoon for active behaviour. Etosha's floodlit waterholes make night sightings exceptional.","strategy":"Follow vultures spiralling downward — they indicate a kill. Scan under every shady tree in savanna; look for a patch of tawny shapes. In Etosha, position at a waterhole from 20:00 onwards. In the delta, ask your guide about active pride territories."},"imageAssetName":"african_lion","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-003","commonName":"African Buffalo","scientificName":"Syncerus caffer","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","khaudum","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","grassland","riverine"],"conservationStatus":"LC","description":"One of the Big Five and widely considered Africa's most dangerous animal to a hunter on foot. Massive herds of 500–2,000 individuals are a defining spectacle of the Chobe floodplains in the dry season. Old solitary bulls, called dagga boys, are notoriously unpredictable and account for most buffalo-related injuries. Highly dependent on surface water and abundant grass.","howToSpot":{"lookFor":"Heavily built, dark brown to black bovid. Bulls are distinctly larger than cows. The fused horn boss on the forehead is unique — a solid helmetlike shield from which the horns sweep downward then curl up. Old bulls often have worn, scarred horns and mud-caked flanks.","behaviour":"Gregarious and constantly grazing; herds move in a slow wave across grassland. Old bulls often wallow in mud and are found in small groups near water. Will stand their ground and charge if cornered; notoriously seek revenge on predators.","bestTime":"Dry season (May–October) when herds gather near rivers in Chobe and the Okavango. Year-round in Etosha.","strategy":"Follow the sound of tearing grass and lowing. Large herds raise dust visible from kilometres away. On the Chobe River, scan the floodplain from a boat — herds of 1,000 or more are possible."},"imageAssetName":"african_buffalo","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-004","commonName":"Hippopotamus","scientificName":"Hippopotamus amphibius","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"VU","description":"The third-largest land mammal and one of Africa's most dangerous, responsible for an estimated 500 human deaths annually. Spends the entire daylight period submerged or wallowing to protect its delicate, sunburn-prone skin, which secretes a natural pink sunscreen. Emerges after dark to graze, consuming up to 40 kg of grass per night. The Okavango and Chobe rivers hold large resident populations.","howToSpot":{"lookFor":"Barrel-shaped grey-brown body, enormously wide mouth. Usually only the eyes, ears, and nostrils break the water surface. Pink blotches around the eyes and behind the ears are the blood-based secretion. Ears wiggle constantly while submerged.","behaviour":"Highly territorial in water; males fight viciously with canine teeth up to 50 cm long. Snorts and blows spray when surfacing. Yawning is a threat display, not fatigue. Groups of 10–30 are typical; single large bulls hold pool territories.","bestTime":"Year-round on rivers. At night or very early morning when they graze on land — a torch will pick up their enormous shapes.","strategy":"Any major river in northern Botswana or the Namibian Zambezi Region will have hippos. Scan shallow sandbanks and reed beds from a boat for basking individuals. Listen at night for deep grunting laughter calls."},"imageAssetName":"hippopotamus","difficulty":"easy","isNocturnal":true},{"id":"MAM-MEG-005","commonName":"Giraffe","scientificName":"Giraffa camelopardalis","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","waterberg","zambezi","khaudum","chobe","okavango","moremi","nxai_pan","central_kalahari"],"habitats":["savanna","woodland"],"conservationStatus":"VU","description":"The tallest living terrestrial animal, reaching 5.8 m. The subspecies found here — the Angolan giraffe — is characterised by large, irregular pale-edged patches on a cream background, with noticeably paler legs than other subspecies. Etosha hosts one of the densest populations in Africa. A single stride covers up to 4.5 m; they can reach 56 km/h when galloping.","howToSpot":{"lookFor":"Unmistakable silhouette towering above the treeline. Angolan giraffe has large orange-brown patches separated by pale cream lines; colour fades toward the lower legs. Two to five short ossicones (skin-covered horns) on the head. Males are significantly taller and darker than females.","behaviour":"Browses exclusively on leaves of tall trees, favouring Acacia and Terminalia. Drinks in a highly vulnerable splayed-leg posture that leaves it unable to flee instantly — watch for nervous head-raising. Necking fights between bulls are spectacular.","bestTime":"Year-round; most active in the morning. Waterholes draw them at predictable intervals during the dry season.","strategy":"Their height makes them visible from far across open savanna — look for tall moving shapes above the treeline. In Etosha, waterholes reliably attract giraffe, who drink in a slow, awkward spread-legged crouch. In Chobe, they are common along the escarpment woodland."},"imageAssetName":"giraffe","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-006","commonName":"White Rhinoceros","scientificName":"Ceratotherium simum","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","moremi"],"habitats":["grassland","savanna"],"conservationStatus":"NT","description":"The largest rhino species and second-largest land animal after the elephant. A pure grazer — its wide square lip is perfectly adapted for cropping short grass. The name 'white' derives from the Afrikaans 'wyd' (wide), referring to this lip, not its colour. Heavily persecuted by poachers; Namibia's Waterberg Plateau is a carefully managed stronghold. Has been reintroduced to several Botswana reserves.","howToSpot":{"lookFor":"Massive grey body; wide, flat square upper lip clearly visible when grazing; two horns, the front one substantially longer. No shoulder hump. Holds head lower than black rhino when walking. Calves always walk in front of the mother.","behaviour":"Grazes on short grass almost continuously. Social compared to black rhino — often seen in small groups of 2–5, called crashes. Extremely poor eyesight but acute hearing and smell. Will stand still and face a vehicle head-on.","bestTime":"Early morning and late afternoon when temperatures are cooler; they seek shade mid-day.","strategy":"In Etosha, ask rangers about recent sightings near the eastern waterholes where grassland is more extensive. At Waterberg, guided game drives have a high success rate. Approach quietly and upwind — their nose is their primary sense."},"imageAssetName":"white_rhinoceros","difficulty":"medium","isNocturnal":false},{"id":"MAM-MEG-007","commonName":"Black Rhinoceros","scientificName":"Diceros bicornis","category":"mammal","subcategory":"megafauna","regions":["namibia"],"specificRegions":["damaraland","etosha","kaokoveld"],"habitats":["semi-arid","rocky","desert","savanna"],"conservationStatus":"CR","description":"Critically endangered with fewer than 6,400 remaining worldwide; Namibia protects the only free-ranging desert-adapted population on Earth. These individuals in Damaraland and the Palmwag Concession survive on sparse desert vegetation and walk extraordinary distances between ephemeral water sources. The Save the Rhino Trust has been instrumental in their conservation since the 1980s.","howToSpot":{"lookFor":"Smaller and more compact than white rhino. The distinctive pointed, prehensile upper lip is used to grasp branches — clearly different from white rhino's wide square lip. Head held high when walking. Front horn often very long and may curve dramatically. More solitary and darker-skinned appearance.","behaviour":"A browser, feeding on bushes, euphorbias, and acacias. Predominantly solitary; aggressive and territorial. Will charge vehicles without warning when surprised. Most active at dawn, dusk, and night. Frequents dry watercourses at night to drink.","bestTime":"Very early morning near dried riverbeds and water sources. Night tracking with expert guides is the most productive approach.","strategy":"The only reliable way to see these animals in the wild is a guided tracking experience with Save the Rhino Trust rangers in Damaraland. They track on foot using spoor, broken vegetation, and dung. Book well in advance. This is one of the most extraordinary wildlife encounters on Earth."},"imageAssetName":"black_rhinoceros","difficulty":"very_hard","isNocturnal":true},{"id":"MAM-MEG-008","commonName":"Plains Zebra","scientificName":"Equus quagga","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","khaudum","chobe","okavango","moremi","makgadikgadi","nxai_pan","central_kalahari"],"habitats":["savanna","grassland","woodland"],"conservationStatus":"NT","description":"The most abundant wild equid on Earth and a keystone grazer that opens up tall grass for more selective feeders. Every individual has a unique stripe pattern. Botswana's Makgadikgadi supports one of Africa's last great zebra migrations — over 30,000 animals move with the rains between November and April in a journey rivalling the Serengeti spectacle.","howToSpot":{"lookFor":"Bold black-and-white stripes across the entire body including the mane, which stands upright. Shadow stripes (faint brownish stripes between the black ones) are present in the southern Burchell's subspecies found here. Round muzzle and robust build distinguish from the more delicate Grevy's.","behaviour":"Lives in small family units of a stallion and several mares that aggregate into large herds. Almost always associates with wildebeest and impala — different senses complement each other against predators. Stallions fight by biting and kicking.","bestTime":"Year-round in Etosha and Chobe. Makgadikgadi migration peaks November–April with the rains.","strategy":"Follow the dust raised by a moving herd in the dry season. At Makgadikgadi, position at Baines' Baobabs area from December for migration viewing. Zebra are vocal — listen for their distinctive bark-like calls."},"imageAssetName":"plains_zebra","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-009","commonName":"Hartmann's Mountain Zebra","scientificName":"Equus zebra hartmannae","category":"mammal","subcategory":"megafauna","regions":["namibia"],"specificRegions":["namib_naukluft","damaraland","kaokoveld","sossusvlei"],"habitats":["rocky","semi-arid","grassland"],"conservationStatus":"VU","description":"A Namibian endemic subspecies found nowhere else on Earth at significant numbers. Distinguished from the plains zebra by its pure white belly with no shadow stripes, a distinctive 'gridiron' pattern of parallel stripes on the rump, a pronounced dewlap under the chin, and orange muzzle. Supremely adapted to mountainous terrain — can scale near-vertical rocky slopes with ease.","howToSpot":{"lookFor":"Crisp black-and-white stripes with a pure white belly — no shadow stripes. The grid-like horizontal stripe pattern on the rump ('gridiron') is definitive. Orange muzzle. Dewlap on the throat. Slightly smaller and more slender than plains zebra.","behaviour":"More agile than plains zebra; navigates rocky hillsides and mountain paths with confidence. Lives in small family groups of 6–12. Uses mountain slopes as escape terrain from predators — will ascend cliffs that lions cannot follow.","bestTime":"Cool morning hours when groups move down from rocky slopes to graze on lower plateau grasslands.","strategy":"Scan rocky hillsides and mountain escarpments in central and southern Namibia, particularly in the Naukluft Mountains and around Damaraland. The Namibia-Naukluft Park has reliable populations. Drive mountain roads slowly in the early morning."},"imageAssetName":"mountain_zebra","difficulty":"medium","isNocturnal":false},{"id":"MAM-MEG-010","commonName":"Warthog","scientificName":"Phacochoerus africanus","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","khaudum","chobe","okavango","moremi","makgadikgadi","nxai_pan","central_kalahari"],"habitats":["savanna","grassland","woodland"],"conservationStatus":"LC","description":"The archetypal African pig, instantly recognisable from the Pumba character of popular culture. Named for the large facial warts — actually fibrous skin pads that protect the face during rooting and rival fights. Remarkably, it kneels on its calloused front wrists to graze on short grass. Reverses into termite mound burrows tail-first at speed when fleeing predators.","howToSpot":{"lookFor":"Stocky grey-brown pig with a large domed head, upcurved ivory tusks, and prominent facial warts on males. The thin tail with a black tuft is held rigidly upright when running. Piglets have a reddish-pink colouration and follow single-file behind the mother.","behaviour":"Active by day; reverses into burrows at night to avoid predators. Kneels to graze, sometimes with the whole family in a kneeling row. Surprisingly fast — reaches 48 km/h. Family groups are called sounders.","bestTime":"Morning and late afternoon when grazing in open areas. Very common at campsites across the region.","strategy":"Almost impossible to miss in good habitat — warthogs are fearless around vehicles and often seen at close range. Check short-grass areas near waterholes and along roadsides. Piglets in September–November are exceptionally entertaining."},"imageAssetName":"warthog","difficulty":"easy","isNocturnal":false},{"id":"MAM-MEG-011","commonName":"Common Eland","scientificName":"Taurotragus oryx","category":"mammal","subcategory":"megafauna","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","damaraland","khaudum","central_kalahari","makgadikgadi","chobe","okavango"],"habitats":["savanna","grassland","woodland","semi-arid"],"conservationStatus":"LC","description":"The world's largest antelope, with bulls exceeding 900 kg — heavier than a riding horse. Despite this bulk, eland can clear 2 m fences from a standstill. A distinctive clicking sound is produced by the tendons in their front knees with each step, audible from 100 m. Inhabits a huge range of habitat types including desert margins and montane grassland.","howToSpot":{"lookFor":"Ox-sized antelope; fawn to grey-brown with faint white vertical stripes on the sides (more prominent in young). Both sexes carry long, tightly spiralled horns. Bulls develop a pronounced dewlap and dark forehead tuft; older bulls turn slate-grey. The knee-click is a giveaway before you see the animal.","behaviour":"Lives in mixed herds of 25–70, sometimes into the hundreds. Despite their bulk they are wary and flee early from vehicles, making close approaches difficult. Capable of long trots that outlast most predators. Semi-nomadic, following seasonal vegetation.","bestTime":"Early morning and late afternoon. More approachable at water in the dry season.","strategy":"Listen for the tendon-click in thick bush before the animals emerge. In Etosha, eland are common around the western and central waterholes. In the Kalahari, they are nomadic and encounters are unpredictable — scan open grassland from raised ground."},"imageAssetName":"common_eland","difficulty":"medium","isNocturnal":false},{"id":"MAM-PRE-001","commonName":"Leopard","scientificName":"Panthera pardus","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","khaudum","damaraland","okavango","moremi","chobe","linyanti","tuli"],"habitats":["savanna","woodland","rocky","riverine"],"conservationStatus":"VU","description":"The most secretive and adaptable of Africa's big cats, thriving in habitat ranging from desert margins to dense riparian forest. Famous for hauling prey heavier than itself into tree forks to cache from hyenas and lions. Namibia's Waterberg Plateau is a stronghold; Moremi and Linyanti in Botswana offer some of the continent's best leopard viewing.","howToSpot":{"lookFor":"Pale golden coat densely covered with dark rosettes — open rings with a dark centre dot unlike cheetah's solid spots. A black tear-stripe runs from each eye to the jaw. Low-slung and powerfully muscled. Long, white-tipped tail often hangs below a branch. Significantly stockier than cheetah.","behaviour":"Solitary and primarily nocturnal. Freezes and flattens before fleeing. Drags prey into tree forks to cache it — look for impala legs or a carcass hanging above you. Scratches tree trunks as scent and visual territory markers.","bestTime":"Dawn and the first two hours after sunrise; dusk onwards. Night drives are the most reliable.","strategy":"Scan horizontal branches in large trees along dry riverbeds. Follow the persistent alarm calls of impala and baboons — they stare and bark continuously toward a hidden leopard. Ask your guide for recent sightings; leopards reuse the same favourite trees repeatedly."},"imageAssetName":"leopard","difficulty":"hard","isNocturnal":true},{"id":"MAM-PRE-002","commonName":"Cheetah","scientificName":"Acinonyx jubatus","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","namib_naukluft","khaudum","central_kalahari","makgadikgadi","chobe","moremi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"VU","description":"The world's fastest land animal, capable of reaching 112 km/h in short sprints. Namibia holds the world's largest wild cheetah population — approximately 3,000 individuals — most on commercial farmland outside protected areas. Unlike other big cats, cheetahs are diurnal hunters relying on sight and speed rather than stealth or darkness. They cannot roar, but produce a distinctive bird-like chirp.","howToSpot":{"lookFor":"Slender, deep-chested body on long legs built for speed. Solid black spots on a tawny coat (no rosettes). A distinctive thick black tear-stripe from the inner eye corner to the mouth. Small head, high-set eyes. Semi-retractile claws give a footprint with visible nail marks, unlike other cats.","behaviour":"Diurnal hunter, most active in the early morning. Uses elevated vantage points — termite mounds, fallen logs, vehicle rooftops — to scan for prey. Hunts by visible stalking followed by explosive sprint. Rests in shade midday. Coalitions of brothers are common.","bestTime":"Early morning from 06:00–10:00 when they are actively hunting. Midday rest makes them harder to spot.","strategy":"Scan every termite mound and elevated feature in open savanna. Cheetahs love to use the same vantage points repeatedly. In Etosha, open plains east of Namutoni are productive. In the Kalahari, check open calcrete pans at dawn. Their slim silhouette on a mound is distinctive from a distance."},"imageAssetName":"cheetah","difficulty":"medium","isNocturnal":false},{"id":"MAM-PRE-003","commonName":"Spotted Hyena","scientificName":"Crocuta crocuta","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","zambezi","chobe","okavango","moremi","linyanti","central_kalahari","nxai_pan"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"Africa's most successful large predator by biomass, and a highly efficient hunter in its own right — not merely a scavenger. Studies show the majority of spotted hyena diet consists of animals they kill themselves. Organised in female-dominated matrilineal clans of up to 80 individuals. Their haunting whooping call, used to rally the clan, is the defining sound of the African night.","howToSpot":{"lookFor":"A large, powerfully built carnivore with a notably sloped back (hindquarters lower than shoulders), giving a distinctive loping gait. Sandy to rufous-brown with irregular dark spots that fade with age. Rounded ears and a thick, short muzzle. The tail is short with a black tuft.","behaviour":"Primarily nocturnal but frequently seen at dawn and dusk. Clans defend territories vigorously; boundary patrols are marked by pasting secretion from the anal gland on grass stalks. Bone-crushing bite allows them to consume entire carcasses including skull and hooves.","bestTime":"Dusk until dawn. Early morning after a night of activity.","strategy":"Follow the sound of whooping calls at night — the clan is assembling or communicating. At a lion kill, hyenas will be circling at a respectful distance. Check denning areas on game drives; cubs are often seen outside the entrance during the day."},"imageAssetName":"spotted_hyena","difficulty":"medium","isNocturnal":true},{"id":"MAM-PRE-004","commonName":"Brown Hyena","scientificName":"Hyaena brunnea","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["skeleton_coast","namib_naukluft","damaraland","central_kalahari","makgadikgadi"],"habitats":["semi-arid","desert","savanna"],"conservationStatus":"NT","description":"One of Africa's rarest and least-known large carnivores, with a global population of only 4,000–10,000 individuals. An almost exclusively nocturnal scavenger and forager, identifiable by its long, shaggy brown coat, striped legs, and pointed ears. Unique among large carnivores for its willingness to scavenge seal and fish carcasses along the Skeleton Coast.","howToSpot":{"lookFor":"Long, shaggy brown coat that is distinctive from spotted hyena. Striped legs, a pale ruff on the neck and shoulders. Pointed ears unlike the rounded ears of spotted hyena. No spots. The sloped back and loping posture is similar to spotted hyena but build is generally lighter.","behaviour":"Strictly solitary when foraging, covering enormous home ranges of 200–500 km². Scent-marks prolifically; pasting secretions on grass stalks with an inverted walk is a frequent behaviour. Carries food long distances to caches. Rarely vocalises.","bestTime":"Strictly after dark. Night drives in arid areas, particularly Kalahari and Skeleton Coast.","strategy":"Drive slowly on back roads after dark in the Kalahari or along the Skeleton Coast and scan with a spotlight. Look for the pale mane catching light. They frequently investigate carcasses on the Namibian coast. Remote waterholes in dry areas are productive camera trap sites."},"imageAssetName":"brown_hyena","difficulty":"hard","isNocturnal":true},{"id":"MAM-PRE-005","commonName":"African Wild Dog","scientificName":"Lycaon pictus","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["khaudum","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland"],"conservationStatus":"EN","description":"One of Africa's most endangered mammals, with fewer than 6,600 remaining in fragmented populations. Arguably the continent's most efficient predator with hunt success rates exceeding 80%, compared to around 30% for lions. Botswana — particularly the Okavango–Linyanti–Chobe ecosystem — hosts the world's second-largest population and offers the best reliable viewing.","howToSpot":{"lookFor":"Each dog has a unique tricolour pattern of black, white, and yellow-ochre patches. Large rounded bat-like ears. Very long legs and a lean, athletic build. White-tipped tail is visible when running. The mottled coat is unmistakable and unlike any other African carnivore.","behaviour":"Packs of 6–20 members with a strict social hierarchy. Hunts during daylight in a cooperative coursing strategy — relentless pursuit at moderate speed rather than a sprint. Pack members greet each other with high-pitched twittering vocalisations. Pups are cared for communally.","bestTime":"Early morning (06:00–09:00) and late afternoon (16:00–19:00) when the pack is hunting. They rest in shade during the hot midday hours.","strategy":"Ask your guide every morning for latest den or sighting information — wild dogs cover vast distances and tracking them requires local intelligence. In Moremi and Linyanti, lodges with guides who know the resident packs offer the best success. Early morning game drive departures are essential."},"imageAssetName":"african_wild_dog","difficulty":"hard","isNocturnal":false},{"id":"MAM-PRE-006","commonName":"Black-backed Jackal","scientificName":"Lupulella mesomelas","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","skeleton_coast","namib_naukluft","damaraland","sossusvlei","chobe","okavango","moremi","central_kalahari","makgadikgadi"],"habitats":["savanna","grassland","semi-arid","desert"],"conservationStatus":"LC","description":"The most widespread and abundant wild canid in southern Africa — virtually impossible to miss on any safari. The black-and-silver saddle over the reddish-brown body is distinctive. Extraordinarily adaptable, ranging from beaches and desert to montane grassland. One of the most successful omnivores on the continent, feeding on everything from insects and wild berries to medium-sized mammals and seal pups.","howToSpot":{"lookFor":"Rust-red sides and legs contrasting sharply with a black-and-silver saddle across the back. White-flecked with a pointed muzzle and large upright ears. Bushy tail with a black tip. Considerably smaller than a wild dog.","behaviour":"Usually seen in mated pairs or small family groups. Highly vocal — the screaming yell is a characteristic sound of African nights. Frequently seen loitering around kills, waiting for scraps. Will shadow a cheetah waiting for it to catch something.","bestTime":"Active at dawn, dusk, and after dark, but frequently seen during the day particularly in cooler months.","strategy":"Jackal are so common they require no strategy — simply keep your eyes open while driving. The Skeleton Coast is excellent for watching them scavenge seal carcasses. Listen for their wailing call at dusk."},"imageAssetName":"black_backed_jackal","difficulty":"easy","isNocturnal":false},{"id":"MAM-PRE-007","commonName":"Side-striped Jackal","scientificName":"Lupulella adusta","category":"mammal","subcategory":"predator","regions":["botswana"],"specificRegions":["okavango","moremi","chobe","linyanti","zambezi"],"habitats":["woodland","riverine","wetland"],"conservationStatus":"LC","description":"The quieter and more elusive cousin of the black-backed jackal, preferring denser woodland and wetter habitats. Named for a pale stripe running along each flank, bordered below by a darker stripe. More omnivorous than the black-backed — wild fruits, insects, and small rodents form a large part of the diet. Most common in northern Botswana's dense woodlands.","howToSpot":{"lookFor":"Uniform grey-brown to olive-grey body — much less contrasting than black-backed jackal. The pale side stripe and white-tipped tail are the key features. Slightly larger and heavier-built than black-backed jackal. Less rust-red colouration.","behaviour":"Predominantly nocturnal and much less vocal than black-backed jackal. Rarely seen at kills. Pairs are territorial and monogamous. Tends to disappear into bush quickly — a shy and watchful demeanour.","bestTime":"Dusk and the first few hours of darkness. Occasionally seen at dawn in dense woodland.","strategy":"Drive slowly through woodland edges in northern Botswana after dark. The Moremi woodlands and areas around the Okavango Delta channels are the most productive. The white tail-tip catches spotlight beams well."},"imageAssetName":"side_striped_jackal","difficulty":"medium","isNocturnal":true},{"id":"MAM-PRE-008","commonName":"Caracal","scientificName":"Caracal caracal","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","fish_river","central_kalahari"],"habitats":["savanna","semi-arid","rocky","woodland"],"conservationStatus":"LC","description":"A powerfully built wild cat famous for extraordinary aerial agility — it can leap over 3 m vertically and snatch birds in mid-flight. The long, black-tufted ears amplify sound and are used in communication. Namibia harbours the highest caracal density in Africa, though most live on farmland. Despite this abundance they are very rarely observed due to their strict nocturnality.","howToSpot":{"lookFor":"Robustly built, tawny-rufous cat — uniform in colour with a paler underside. The long black ear tufts are the most distinctive feature; no other African cat has them. White spots around the eyes. Relatively long legs for a medium-sized cat.","behaviour":"Strictly nocturnal and solitary. Ambush predator that climbs trees to escape danger and to cache prey. Extremely shy and flushes immediately when spotted. Farmland individuals in Namibia sometimes active at dusk.","bestTime":"After dark. Night drives in dry savanna or rocky areas.","strategy":"Slow night drives in rocky semi-arid terrain are the best approach. Scan with a spotlight close to rocky outcrops and along dry riverbeds. Caracal eyes reflect orange-red in torchlight. A rare and thrilling encounter — do not expect it."},"imageAssetName":"caracal","difficulty":"hard","isNocturnal":true},{"id":"MAM-PRE-009","commonName":"Serval","scientificName":"Leptailurus serval","category":"mammal","subcategory":"predator","regions":["botswana"],"specificRegions":["okavango","moremi","chobe","linyanti"],"habitats":["wetland","grassland","riverine"],"conservationStatus":"LC","description":"An elegant, long-legged cat of tall grass and wetland margins. The longest legs relative to body size of any cat, allowing it to peer above tall grass and pounce on rodents with remarkable precision. Has the highest hunting success rate of any African felid — approximately 50% — by using large ears to pinpoint prey movements under grass before striking.","howToSpot":{"lookFor":"Tawny-yellow with bold black spots and stripes; very long neck and legs; enormously large, oval ears set close together. Resembles a miniature cheetah but with a much shorter tail and far more prominent ears. The spotting pattern is more varied than cheetah.","behaviour":"Hunts primarily by sound — rotating its enormous ears independently to triangulate rodent movements under thick grass. Leaps high in an arc to pin prey with both forepaws. Mostly solitary; females with kittens occasionally seen in short grass after rain.","bestTime":"Dawn and dusk in open grassland; occasionally active on overcast days. Night drives are most productive.","strategy":"Scan the short-grass floodplain edges and reed margins around the Okavango and Chobe. Servals prefer recently burnt grassland — check known burn areas. Often seen crossing roads at dusk in Moremi. Their distinctive silhouette — long legs, small head, big ears — is recognisable even at distance."},"imageAssetName":"serval","difficulty":"hard","isNocturnal":true},{"id":"MAM-PRE-010","commonName":"African Wild Cat","scientificName":"Felis silvestris lybica","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","namib_naukluft","central_kalahari","makgadikgadi","moremi"],"habitats":["savanna","semi-arid","grassland","woodland"],"conservationStatus":"LC","description":"The ancestor of all domestic cats, diverging from house cat lineages approximately 10,000 years ago. Indistinguishable from a robust tabby cat except for longer legs, a more erect posture, and reddish-brown colouring on the backs of the ears. Widespread but rarely seen due to its nocturnal habits and excellent camouflage. Hybridisation with feral domestic cats is a significant conservation threat.","howToSpot":{"lookFor":"Essentially a tabby cat — grey-brown with faint tabby stripes. Critically, reddish-brown fur on the backs of the ears. Longer legged and more upright sitting posture than a domestic cat. Bushy-ringed tail with black tip. The upright posture when sitting alert is a key behavioural clue.","behaviour":"Strictly nocturnal; rests in burrows or dense cover during the day. Hunts rodents, birds, and reptiles using a stalk-and-pounce technique identical to a domestic cat. Solitary except when mating.","bestTime":"Night drives only. Most productive in dry, open savanna away from human habitation.","strategy":"Shine a spotlight along roadsides and open areas in dry savanna at night. The reflecting eye-shine is amber. The key challenge is distinguishing them from feral domestic cats — wild cats sit very upright and have the characteristic reddish ears. Away from villages, any small cat-like animal is likely to be genuine."},"imageAssetName":"african_wild_cat","difficulty":"medium","isNocturnal":true},{"id":"MAM-PRE-011","commonName":"Aardwolf","scientificName":"Proteles cristata","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["namib_naukluft","damaraland","central_kalahari","makgadikgadi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"A highly specialised hyena family member that feeds almost exclusively on harvester termites (Trinervitermes species), consuming up to 300,000 per night using a long, sticky tongue. Entirely harmless to livestock and other animals despite its fearsome family connections. Erects its mane dramatically to appear larger when threatened. The southern African subspecies is crepuscular in winter, making it more detectable than its strictly nocturnal counterpart.","howToSpot":{"lookFor":"Resembles a small, slender striped hyena. Yellow-buff with 4–5 distinct vertical dark stripes on the body, striped legs, and a long black mane running from the neck to the tail. Pointed muzzle and large upright ears. Notably smaller than spotted or brown hyena.","behaviour":"Forages alone, licking up surface-foraging termites with its wide, sticky tongue. The mane raises dramatically when alarmed. A very shy, skittish animal that disappears into the grass at the first disturbance. Mates for life.","bestTime":"Dusk and the first two hours of night (crepuscular in cool winter months, strictly nocturnal in summer).","strategy":"Drive slowly in open semi-arid grassland at dusk in Namibia's interior or the Kalahari. They often forage near termite mounds and short-grass areas. The white-banded mane catches torchlight well. A sighting requires patience and quiet."},"imageAssetName":"aardwolf","difficulty":"hard","isNocturnal":true},{"id":"MAM-PRE-012","commonName":"Honey Badger","scientificName":"Mellivora capensis","category":"mammal","subcategory":"predator","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","khaudum","central_kalahari","okavango","moremi","chobe"],"habitats":["savanna","semi-arid","woodland","desert"],"conservationStatus":"LC","description":"Pound-for-pound considered one of the most ferocious animals on Earth. Loose, extremely tough skin allows it to twist and bite even when gripped by a predator. Immune to many snake venoms, including puff adder venom, it regularly preys on cobras and mambas. Famous for tearing open beehives with powerful claws to raid honey and bee larvae. Has been recorded chasing lions off kills.","howToSpot":{"lookFor":"Compact, low-slung body with very short legs and a shuffling, rolling gait. Distinctive two-tone colouring: silvery-white on the top of the head and back, contrasting sharply with jet black on the flanks, legs, and underside. Broad, flat head with small ears.","behaviour":"Almost totally fearless; will confront any animal including lion when cornered. Powerfully digs out burrows and insect colonies at speed. Covers vast distances nightly in purposeful, direct trot. Will follow the greater honeyguide bird to beehives.","bestTime":"Often seen during the day, particularly in the morning on cool days — one of the more reliably diurnal nocturnal mammals.","strategy":"Drive slowly through diverse scrub habitat and watch for a distinctive low, rolling shape crossing roads. Honey badgers ignore vehicles once they decide they are uninteresting. Termite mound areas and woodland edges are productive. Their distinctive gait makes them immediately identifiable."},"imageAssetName":"honey_badger","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-001","commonName":"Greater Kudu","scientificName":"Tragelaphus strepsiceros","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","damaraland","zambezi","khaudum","chobe","okavango","moremi","tuli"],"habitats":["woodland","rocky","savanna"],"conservationStatus":"LC","description":"One of Africa's most magnificent antelopes. Bulls carry spectacular spiralled horns that can reach 1.8 m along the curve — among the longest of any antelope. Highly dependent on dense woodland and bush for cover, making them among the most habitat-specific of the large antelopes. The deep, resonant bark of a fleeing kudu is one of the most evocative sounds of the African bush.","howToSpot":{"lookFor":"Large, elegant antelope — tawny-grey with 6–10 narrow white vertical body stripes. Bulls have massive spiralled horns and a heavy dewlap under the chin; cows are hornless and more rufous-brown. Both sexes have large, rounded ears and a white chevron stripe between the eyes.","behaviour":"Cryptic and cautious; freezes when alarmed, relying on its stripes to break up its outline in dappled woodland shade. Flees with a characteristic high-stepping stiff-legged trot. Bulls are often solitary; cows live in small groups.","bestTime":"Early morning and late afternoon when they move to feed at woodland edges. Dry-season waterholes are reliable.","strategy":"Drive slowly through thick bush and scan into shadows — kudu use their camouflage expertly. At Etosha's waterholes in the late dry season they drink in the early morning. Namibia's Waterberg Plateau is outstanding kudu habitat. Look for white flashes of the rump when they flee."},"imageAssetName":"greater_kudu","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-002","commonName":"Gemsbok","scientificName":"Oryx gazella","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","sossusvlei","damaraland","fish_river","skeleton_coast","central_kalahari","makgadikgadi"],"habitats":["desert","semi-arid","savanna","grassland"],"conservationStatus":"LC","description":"Namibia's national animal and the supreme desert survivor. Can allow its body temperature to rise to 45°C — the blood passing through the nasal passages cools before reaching the brain, preventing heat death. Can survive months without drinking by extracting water from wild melons and tubers. The long, near-perfectly straight horns are used with lethal precision against lions and hyenas.","howToSpot":{"lookFor":"A striking grey-fawn body with bold black-and-white markings on the face and legs; black side stripe separating the pale flank from the white belly; black tail. Both sexes carry long, rapier-straight horns, though females' horns are often longer and more slender. The geometric face markings are unmistakable.","behaviour":"Stands in loose herds of 10–40 in desert grassland. Faces directly into the sun during the hottest part of the day to minimise exposed surface area. Territorial bulls chase and spar at a distance with their horns.","bestTime":"Year-round. Active throughout the day in cooler months. The most reliably seen large mammal of Namibia's arid zones.","strategy":"Almost impossible to miss across Namibia's arid interior. In the Namib-Naukluft and around Sossusvlei, gemsbok are frequently encountered on gravel plains. They stand exposed in open desert, making binoculars unnecessary."},"imageAssetName":"gemsbok","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-003","commonName":"Springbok","scientificName":"Antidorcas marsupialis","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","sossusvlei","fish_river","central_kalahari","makgadikgadi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"South Africa's national animal and the iconic antelope of southern Africa's arid savannas. Named for its spectacular pronking display — stiff-legged vertical leaps of up to 3 m with the white dorsal crest fanned open — thought to intimidate predators or signal fitness. Formerly occurred in vast seasonal migrations of millions across the Karoo and Kalahari.","howToSpot":{"lookFor":"Compact, graceful antelope. Cinnamon-brown back separated from the white flanks by a brown side stripe. White face with brown eye stripes. Both sexes carry lyre-shaped, ringed horns. The white rump patch and concealed dorsal crest are revealed during pronking.","behaviour":"Lives in mixed herds that can number in the thousands. The pronking display — stiff-legged bouncing jumps — is one of Africa's most iconic behaviours. Herds perform synchronised gallops when panicked. Extremely vigilant.","bestTime":"Year-round in suitable habitat. Most active in the early morning and late afternoon.","strategy":"Very common in Etosha and across Namibia's arid south. In the Central Kalahari and Makgadikgadi, look for large aggregations after rain. The pronking display is most commonly triggered by a fleeing herd — any predator alert will cause the display."},"imageAssetName":"springbok","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-004","commonName":"Impala","scientificName":"Aepyceros melampus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","khaudum","waterberg","chobe","okavango","moremi","linyanti","nxai_pan"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"The most abundant antelope in the Botswana ecosystems and an essential prey species holding the entire predator community together. Often dismissed as the 'McDonald's of the bush' by safari guides, the impala's athleticism is extraordinary — capable of leaping 3 m high and 10 m long in a single bound, often performing aerial somersaults to confuse chasing predators.","howToSpot":{"lookFor":"Medium-sized, very elegant chestnut-coloured antelope with a paler tan on the flanks and white belly. Three black lines on the rump — one down the tail and one on each upper thigh — are diagnostic. Only rams have the graceful, lyre-shaped, deeply ridged horns. Black tufts of hair above the hind hooves cover scent glands.","behaviour":"Lives in large mixed herds that split into bachelor male groups and female herds with young. During the rut, territorial rams herd females relentlessly with a rasping snort-growl unique in the antelope world. Alarm snorts alert everything in the vicinity to predators.","bestTime":"Year-round. Active throughout the day.","strategy":"Impala are so abundant in Botswana that you will encounter them constantly. The interesting observation is watching their behaviour — if a herd suddenly explodes in all directions with alarm snorts, scan immediately for the predator that triggered it."},"imageAssetName":"impala","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-005","commonName":"Blue Wildebeest","scientificName":"Connochaetes taurinus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","zambezi","chobe","okavango","moremi","makgadikgadi","nxai_pan","central_kalahari"],"habitats":["savanna","grassland","woodland"],"conservationStatus":"LC","description":"The Makgadikgadi Pans support one of Africa's most spectacular and least-known wildebeest migrations, with tens of thousands moving between seasonal grazing from November to April. These odd-looking antelope — often described as assembled from leftover parts — are a keystone prey species and their mass movements create the ecological rhythms of the southern African savanna.","howToSpot":{"lookFor":"Large, dark grey-brown antelope with a muscular neck and shoulders tapering to narrow hindquarters. Both sexes have curved buffalo-like horns. A dark mane, beard under the throat, and dark facial stripe. The general impression is of a prehistoric animal with a disproportionately large head.","behaviour":"Highly gregarious. During migrations, herds mass in their thousands, constantly snorting and grunting. Calves are born synchronously during a brief period to overwhelm predators — thousands of calves in a few weeks. Curious and will stare at vehicles before galloping away.","bestTime":"Year-round in Etosha and Chobe. Makgadikgadi migration November–April for large aggregations.","strategy":"For the migration spectacle, position at the Boteti River or Nxai Pan in January–March. In Etosha, wildebeest are regular at all major waterholes year-round. Usually found in association with zebra."},"imageAssetName":"blue_wildebeest","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-006","commonName":"Red Hartebeest","scientificName":"Alcelaphus buselaphus caama","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","central_kalahari","makgadikgadi","nxai_pan"],"habitats":["savanna","grassland"],"conservationStatus":"LC","description":"A large, russet-coloured antelope of open grassland and savanna, instantly recognisable by its steeply sloping back and unusually long, narrow face. One of the fastest antelopes — capable of sustained speeds of 55 km/h and with remarkable stamina. Both sexes carry distinctive bracket-shaped horns with sharp backward-and-upward tips.","howToSpot":{"lookFor":"Large rufous-red antelope with a notably sloping back (highest at the shoulders). Elongated narrow head with bracket-shaped double-curved horns in both sexes. A dark smudge on the face and dark leg markings. The strong slope of the back and long face are immediately recognisable.","behaviour":"Lives in small herds of 5–20; territorial bulls stand on the highest point available (termite mounds, hillocks) to survey their territory. Very alert and will detect a threat at great distance. Trot away before breaking into a gallop.","bestTime":"Active throughout the day in open grassland. Most visible in the early morning.","strategy":"Scan open grassland and savanna — hartebeest prefer more open country than most antelopes. In Etosha, check the open grassland pans east of the park. In the Kalahari, they are common on open calcrete flats. The territorial bulls on termite mounds are easily spotted."},"imageAssetName":"red_hartebeest","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-007","commonName":"Sable Antelope","scientificName":"Hippotragus niger","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["chobe","moremi","linyanti","khaudum","zambezi"],"habitats":["woodland","savanna"],"conservationStatus":"LC","description":"One of Africa's most visually stunning large antelopes — adult bulls are jet black with dazzling white facial markings and sweeping, scimitar-curved horns that can exceed 1.6 m. Dependent on a specific combination of medium-height grass for grazing and woodland for shade and mineral licks. Botswana's Chobe and Moremi are strongholds.","howToSpot":{"lookFor":"Adult bulls are jet black with a bright white belly, white facial markings, and long, backward-sweeping curved horns. Cows and young are chestnut-brown with shorter horns. The black-and-white contrast of a bull is unmistakable and spectacular. Both sexes have a stiff upright mane.","behaviour":"Lives in herds of 10–30 females with dominant bulls. Extremely aggressive when threatened — uses the long horns effectively, even against lions. Bulls hold territories year-round and perform elaborate dominance displays.","bestTime":"Early morning and late afternoon when moving between grassland and woodland.","strategy":"Sable are less commonly encountered than impala or wildebeest. Ask specifically for sable habitat — miombo woodland edges with clear understorey. In Chobe, the Savuti area and the Linyanti marshes hold good populations."},"imageAssetName":"sable_antelope","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-008","commonName":"Roan Antelope","scientificName":"Hippotragus equinus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["khaudum","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["woodland","grassland","savanna"],"conservationStatus":"LC","description":"The second-largest antelope in Africa after the eland. Less commonly seen than its cousin the sable, requiring large territories of undisturbed medium-high grassland and is sensitive to hunting pressure and habitat fragmentation. The face mask, mane, and robust build give it a horse-like appearance that inspired the name. Khaudum in Namibia and Botswana's northern reserves are key refugia.","howToSpot":{"lookFor":"A very large, robust grey-roan antelope with a distinctive black-and-white face mask. Both sexes have backward-sweeping curved horns (shorter than sable) and a prominent upright mane. The horse-like build and grey-roan colouration distinguish it from sable.","behaviour":"Herds of 5–12 led by a dominant female. More nomadic than sable; follows medium-height grass availability. Extremely defensive — both sexes will confront predators with their horns and are known to kill attacking lions.","bestTime":"Early morning in open grassy woodland. They are diurnal and predictable in good habitat.","strategy":"Ask specifically for roan habitat information from local guides — they require specific conditions and are genuinely uncommon. Khaudum National Park in northeast Namibia is one of the best places in the region. In Botswana, the Linyanti–Selinda area holds a small but reliable population."},"imageAssetName":"roan_antelope","difficulty":"hard","isNocturnal":false},{"id":"MAM-ANT-009","commonName":"Tsessebe","scientificName":"Damaliscus lunatus lunatus","category":"mammal","subcategory":"antelope","regions":["botswana"],"specificRegions":["chobe","okavango","moremi","linyanti","nxai_pan"],"habitats":["savanna","grassland","woodland"],"conservationStatus":"LC","description":"The fastest antelope in Africa, capable of reaching 90 km/h in short bursts — faster than a cheetah. Despite their speed, populations have declined significantly across their range. Botswana's northern savannas are a stronghold. The tsessebe is a close relative of the topi; they prefer open grassy floodplains, particularly the broad grasslands of the Okavango and Chobe systems.","howToSpot":{"lookFor":"Large reddish-brown to dark purplish-brown antelope with a characteristically long, sloping face. Dark smudges on the shoulders and hips. Both sexes have lyre-shaped, ringed horns curved inward at the tips. The sloped back (like hartebeest) and rich colouring are distinctive.","behaviour":"Territorial bulls stand conspicuously on elevated platforms — termite mounds, fallen logs — to watch over their territory. Alert and fast; flees at great speed when alarmed. Lives in small herds.","bestTime":"Early morning in open floodplain areas near the Okavango and Chobe.","strategy":"Scan open seasonally flooded grasslands in northern Botswana — they prefer the broad floodplains between woodland. Territorial bulls on termite mounds are conspicuous and allow good approach. Ask guides for active territories."},"imageAssetName":"tsessebe","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-010","commonName":"Waterbuck","scientificName":"Kobus ellipsiprymnus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","grassland","woodland"],"conservationStatus":"LC","description":"A large, robust antelope never found far from water — it relies on rivers and floodplains for both drinking and as an escape from predators, readily entering water to flee. The distinctive white horseshoe ring around the rump is unique and unmistakable. Oily, musky secretions from its skin give the flesh an unpleasant taste that most predators avoid.","howToSpot":{"lookFor":"A large, shaggy grey-brown antelope with a distinctive white circle (horseshoe-shaped) around the rump. Only males carry the long, forward-sweeping ringed horns. Coarser coat than most antelopes. Frequently stands in or near water.","behaviour":"Never strays far from water; uses rivers and swamps as escape routes from predators. Small groups of females with one territorial bull. Bulls are highly territorial along riversides. Will wade chest-deep and swim strongly.","bestTime":"Year-round near major rivers. Very reliable along the Chobe and Okavango system.","strategy":"Simply walk or drive along any major river bank in northern Botswana or the Namibian Zambezi Region. Waterbuck are predictably water-associated and almost always visible from the Chobe riverfront. The white rump ring is visible from a great distance."},"imageAssetName":"waterbuck","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-011","commonName":"Red Lechwe","scientificName":"Kobus leche","category":"mammal","subcategory":"antelope","regions":["botswana"],"specificRegions":["okavango","moremi","linyanti","chobe"],"habitats":["wetland","grassland","riverine"],"conservationStatus":"LC","description":"Highly adapted to semi-aquatic life, with elongated, splayed hooves and powerful hindquarters that allow it to bound through shallow water at speed. The Okavango Delta supports one of the largest lechwe populations in the world — they are the dominant large grazer of the floodplains and a cornerstone of the delta's ecology. Spectacular when thousands flood-leap across the delta's broad shallows.","howToSpot":{"lookFor":"Chestnut-orange upper body contrasting with white underside; black stripe down the front of the forelegs. Males are darker and larger, with long, lyrate swept-back horns; females are hornless and more slender. The elongated hindquarters give a characteristic high-rumped profile.","behaviour":"Semi-aquatic; wades and runs through shallow floodwaters with ease, the spray of water at each stride creating a spectacular sight in the morning light. Gathers in very large herds on seasonally flooded grasslands. When fleeing predators, immediately heads for water.","bestTime":"Year-round in the Okavango. At their most spectacular during the flood pulse (June–September) when large herds are concentrated on the floodplain margins.","strategy":"Take a mokoro (dugout canoe) or motorboat through the Okavango Delta channels and scan the floodplains. Herds of hundreds are visible from a distance. The Chief's Island area in Moremi is outstanding. Morning light on running lechwe throwing spray is one of the Delta's great sights."},"imageAssetName":"red_lechwe","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-012","commonName":"Sitatunga","scientificName":"Tragelaphus spekeii","category":"mammal","subcategory":"antelope","regions":["botswana"],"specificRegions":["okavango","moremi","linyanti"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"One of Africa's most specialised antelopes, almost entirely restricted to papyrus swamp and dense reed beds. Elongated, splayed hooves prevent sinking, and the animal's powerful build allows it to push through dense reeds. Males are dark brown with white stripes; females are smaller and rufous. Rarely leaves the water's edge.","howToSpot":{"lookFor":"Males are large and dark chocolate-brown with faint white body stripes and spots; they carry long, spirally twisted horns. Females are noticeably smaller, reddish-brown without horns. The shaggy, unkempt coat of males is distinctive. Very elongated hooves are visible up close.","behaviour":"Predominantly crepuscular and nocturnal. Wades through shallow water and swims when necessary. Stands chest-deep in reed beds to feed. Rarely ventures onto dry land. Very wary.","bestTime":"Dawn and dusk along papyrus and reed-bed margins. Boat trips at first light in the Okavango are the most productive.","strategy":"Take an early morning motorboat trip through the narrow channels of the Okavango and scan papyrus edges. Sitatunga are very cryptic and still — look for the curved horns of a male emerging above the reed tops. The sound of reeds being pushed aside can give them away."},"imageAssetName":"sitatunga","difficulty":"hard","isNocturnal":true},{"id":"MAM-ANT-013","commonName":"Bushbuck","scientificName":"Tragelaphus scriptus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["zambezi","waterberg","khaudum","chobe","okavango","moremi","linyanti"],"habitats":["riverine","woodland"],"conservationStatus":"LC","description":"A medium-sized antelope of dense riverine and woodland habitat, highly secretive and solitary. Namibia's Cape bushbuck is the most southerly subspecies. Despite its size, bushbuck are famously aggressive when cornered, fatally goring both dogs and humans with their short but sharp horns. Never found far from dense vegetation that provides escape cover.","howToSpot":{"lookFor":"A medium-sized antelope, dark chestnut-brown to yellowish with white spots and stripes on the body; a white crescent on the throat. Only males carry short, straight, slightly twisted horns. Fluffy white underside of the tail is flashed when fleeing. White spots on the haunches and white patches on the cheeks are diagnostic.","behaviour":"Solitary except during mating. Extremely secretive — melts into vegetation immediately when alarmed. Predominantly nocturnal, but seen regularly at dawn and dusk. Barks loudly like a dog when frightened.","bestTime":"Dawn and dusk at woodland edges and riverine thickets.","strategy":"Drive very slowly along riverine corridors and scan thick vegetation edges at dawn. Listen for the sharp double bark that indicates a startled individual. Chobe riverfront is very reliable for bushbuck at dusk. The white spots and throat patch are visible in low light."},"imageAssetName":"bushbuck","difficulty":"medium","isNocturnal":true},{"id":"MAM-ANT-014","commonName":"Klipspringer","scientificName":"Oreotragus oreotragus","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["namib_naukluft","damaraland","fish_river","waterberg","tuli"],"habitats":["rocky"],"conservationStatus":"LC","description":"A tiny mountain antelope perfectly engineered for rocky terrain, walking on the very tips of cylindrical hooves that act like rubber suction cups — capable of standing on a coin-sized rock ledge. 'Klipspringer' means 'rock jumper' in Afrikaans. Both sexes are monogamous and pairs are almost always seen together, often perched motionless on a prominent boulder as sentinels.","howToSpot":{"lookFor":"A small, compact antelope about the size of a large cat. Coarse, spiny coat of olive-grey or yellowish hair (each hair is hollow and provides insulation and impact absorption). Small rounded face. Only males have short, straight, parallel horns. Standing on vertical rock faces is diagnostic.","behaviour":"Strictly rock-associated; almost never ventures onto flat ground. Monogamous pairs occupy permanent territories. One partner stands sentinel while the other feeds. The sharp, nasal bark alarm call echoes off rock faces.","bestTime":"Morning and late afternoon in rocky terrain.","strategy":"Scan cliff faces and rocky koppies for motionless shapes — their habit of standing still as sentinels makes them paradoxically easy to see once you learn to look at the rocks. The Naukluft Mountains and Fish River Canyon area are excellent. Namib-Naukluft rock outcrops reliably hold resident pairs."},"imageAssetName":"klipspringer","difficulty":"medium","isNocturnal":false},{"id":"MAM-ANT-015","commonName":"Steenbok","scientificName":"Raphicerus campestris","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","fish_river","central_kalahari","makgadikgadi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"A small, delicate antelope of open, lightly wooded country. Despite its diminutive size (under 12 kg), the steenbok does not drink water at all — extracting all its moisture from its food. It digs up roots and tubers for nutrition. Unlike most small antelopes it tends to freeze rather than flee, making close-range observation possible.","howToSpot":{"lookFor":"A small, fine-featured antelope with very large eyes and enormous, delicate ears. Bright rufous-fawn coat with pure white underside. Males have short, straight, sharp horns set vertically above the face. White rings around the eyes give a wide-eyed expression.","behaviour":"Mostly solitary; monogamous pairs hold territories but are rarely seen together. Characteristically freezes when alarmed, relying on its colour to provide camouflage in dry grass. Drops suddenly to the ground and lies flat to avoid detection. Territorial markings left on grass stems are distinctive.","bestTime":"Early morning and late afternoon. They rest at midday in shade.","strategy":"Drive slowly through open savanna and watch roadsides carefully. They frequently freeze near the road. The Central Kalahari is excellent steenbok habitat. Their enormous ears make them visible even in sparse grass — the ears appear disproportionately large for the body."},"imageAssetName":"steenbok","difficulty":"easy","isNocturnal":false},{"id":"MAM-ANT-016","commonName":"Common Duiker","scientificName":"Sylvicapra grimmia","category":"mammal","subcategory":"antelope","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","khaudum","chobe","okavango","moremi"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"The most widespread and adaptable small antelope in Africa, found in virtually every savanna habitat from desert margins to dense woodland. 'Duiker' means 'diver' in Afrikaans — when disturbed it makes a characteristic plunging dive into vegetation. Unlike most antelopes it is opportunistically omnivorous, eating insects, birds' eggs, and even small vertebrates in addition to vegetation.","howToSpot":{"lookFor":"A small, hunched grey-brown antelope with a distinctive dark stripe from the nose
