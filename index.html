yellow tip distinguish it from the Eurasian spoonbill which occasionally visits.","howToSpot":{"lookFor":"A large, all-white bird with a distinctively flattened, spoon-shaped red bill with a yellow tip. Red facial skin around the eye and base of the bill. Long red legs. In flight, the neck is fully extended. The bill shape is immediately obvious and unique.","behaviour":"Wades slowly through shallow water, sweeping the open bill from side to side in a continuous arc. Extremely tactile feeding — snaps shut on touch. Rests with the bill tucked under the wing. Often roosts communally with herons and ibises.","bestTime":"Year-round at permanent water. Most active during the cooler morning and late afternoon.","strategy":"Any shallow lagoon or flooded grassland in northern Botswana or the Etosha pan area is worth checking. Spoonbills are conspicuous — the all-white plumage and the sweeping feeding action are visible from a distance. In the Okavango, they are a regular sight on boat trips."},"imageAssetName":"african_spoonbill","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-007","commonName":"African Darter","scientificName":"Anhinga rufa","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"Known as the 'snakebird' for its habit of swimming with the body submerged and only the long, sinuous neck visible above water — the resemblance to a swimming snake is striking. Unlike ducks and cormorants, the darter's feathers are not waterproof; it must dry its wings by perching with them fully spread after each dive, creating the most recognisable silhouette on any African river.","howToSpot":{"lookFor":"A large, dark waterbird with an extraordinarily long, thin neck with a distinctive kink (an S-curve used to power the spearing strike at fish). Chestnut neck with white stripe from eye to shoulder. Dark brown body with white streaking on the wings. Long, stiff, fan-shaped tail. The spread-wing drying posture is diagnostic.","behaviour":"Swims with body submerged, neck held above water in a serpentine curve. Dives to spear fish with the sharply pointed bill. Spends long periods perched with wings fully spread to dry. Flies with alternate flapping and gliding, the neck slightly kinked.","bestTime":"Year-round on any river. Drying birds are stationary and easy to approach.","strategy":"Scan exposed branches and snags overhanging rivers for the spread-wing drying posture — once seen, it is unmistakable and immediately identifies the bird. On boat trips in the Okavango or Chobe, darters are regularly encountered at close range."},"imageAssetName":"african_darter","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-008","commonName":"Malachite Kingfisher","scientificName":"Corythornis cristatus","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"One of Africa's most jewel-like birds — a tiny, gem-bright kingfisher of reeded margins and slow-moving water. Despite being barely 13 cm long, its iridescent cobalt-blue and malachite-green upperparts and vivid orange underparts make it one of the most visually arresting birds encountered on any river trip. An extraordinary diver, plunging vertically from a low perch to take fish.","howToSpot":{"lookFor":"Tiny — barely larger than a sparrow. Brilliant, iridescent cobalt and malachite-green cap and upperparts; deep rufous-orange underparts and cheeks; red bill; red feet. The cobalt streaks through the iridescent green cap are visible in good light. Sits bolt-upright on a low reed or twig.","behaviour":"Perches motionless on a low overhanging branch or reed stem, watching the water surface. Plunges vertically on spotting a fish, rarely making a splash, then returns immediately to the same perch. The high-pitched, piping call is given in fast flight.","bestTime":"Year-round on any slow-moving water with emergent vegetation. Active throughout the day.","strategy":"On any boat or mokoro trip in the Okavango, scan reed margins and overhanging vegetation at water level. The malachite kingfisher is tiny but the vivid jewel colours catch sunlight brilliantly. Slow movement along reed-fringed channels is the most productive approach."},"imageAssetName":"malachite_kingfisher","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-009","commonName":"Giant Kingfisher","scientificName":"Megaceryle maxima","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"Africa's largest kingfisher, as big as a small crow at 46 cm. Despite its size it is a true kingfisher — hovering above water and plunge-diving for fish with considerable precision. The male and female are unusually different: the male has a chestnut breast with white-spotted upperparts; the female reverses this with a chestnut belly and chestnut-spotted white breast.","howToSpot":{"lookFor":"A very large, heavily built kingfisher with a massive bill. Slate-black upperparts with white spots; the male has a chestnut breast band; the female has a chestnut belly. The enormous, dagger-like black bill is the most distinctive feature. The shaggy, crested head gives a slightly unkempt appearance.","behaviour":"Perches conspicuously on exposed branches overhanging rivers, scanning the water below. Hovers briefly before plunging. The call — a loud, harsh, clattering 'kek-kek-kek' — is frequently heard before the bird is seen. Highly vocal and territorial.","bestTime":"Year-round on any major river. Most vocal and active in the morning.","strategy":"Scan exposed perches overhanging the main river channel — giant kingfishers prefer large rivers with clear, still water and perch prominently. On the Chobe River, they are regular and approachable from a boat. The loud, rattling call almost always announces the bird before it is visible."},"imageAssetName":"giant_kingfisher","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-010","commonName":"African Skimmer","scientificName":"Rynchops flavirostris","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango"],"habitats":["riverine"],"conservationStatus":"LC","description":"One of Africa's most uniquely specialised waterbirds — it feeds exclusively by flying low over still water with the elongated lower mandible slicing through the surface, snapping shut when it contacts a fish. The lower mandible is significantly longer than the upper — the only bird in Africa with this adaptation. Nests colonially on exposed sandbanks in major rivers, highly vulnerable to flooding and disturbance.","howToSpot":{"lookFor":"A tern-like bird with glossy black upperparts, white underparts, and a striking red-and-yellow compressed bill where the lower mandible extends visibly beyond the upper. The long, pointed wings and forked tail are visible in flight. In the hand (or at very close range), the asymmetric bill is extraordinary.","behaviour":"Most distinctive in feeding flight: wings held high, the lower mandible cutting through calm water in a long furrow, the bird snapping closed and flicking the prey up when contact is made. Rests on exposed sandbanks in groups. Crepuscular and nocturnal feeder — most active at dusk and dawn when the water is calmest.","bestTime":"Dawn and dusk when feeding. Year-round on suitable rivers.","strategy":"Scan exposed river sandbanks on the Chobe and Zambezi for resting groups. At dusk, watch for the low, skimming flight over calm water — the wake left by the lower mandible is sometimes visible before the bird itself. Chobe River sandbanks near Kasane are reliable."},"imageAssetName":"african_skimmer","difficulty":"medium","isNocturnal":true},{"id":"BIR-WAT-011","commonName":"African Openbill Stork","scientificName":"Anastomus lamelligerus","category":"bird","subcategory":"waterbird","regions":["botswana"],"specificRegions":["chobe","okavango","moremi","linyanti"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"A medium-sized, dark stork with a highly specialised bill that appears 'broken' — the mandibles close only at the tips, leaving a pronounced open gap in the middle. This gap is the tool with which it extracts large freshwater snails and mussels from their shells, using the sharp bill tips as a lever. A nomadic, highly gregarious species that follows seasonal water levels across the continent.","howToSpot":{"lookFor":"A medium, all-dark (glossy black-brown) stork with a distinctive bill that curves apart in the middle — the 'open bill' gap is visible even at moderate distance and is unmistakable. The glossy dark plumage shows a greenish sheen in good light. Pink-red legs and face. In flight, the dark wings and slow, soaring flight distinguish it from cormorants.","behaviour":"Wades through shallow water probing for snails and mussels. Often seen in large, loose flocks roosting in trees over water or wheeling in thermals. Highly nomadic — can be absent for months and then appear in thousands following flooding.","bestTime":"Year-round in the Okavango and Chobe, most abundant in wet season (December–April) when snails are most active.","strategy":"Any flooded grassland or shallow lagoon in northern Botswana in the wet season is worth checking. Flocks of dark storks circling on thermals are usually openbills. The bill gap is visible when birds land and begin feeding. Very common in good years — unmissable."},"imageAssetName":"african_openbill","difficulty":"easy","isNocturnal":false},{"id":"BIR-WAT-012","commonName":"Pied Kingfisher","scientificName":"Ceryle rudis","category":"bird","subcategory":"waterbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"The world's most common kingfisher and the only one that habitually hovers over open water before diving — a behaviour that makes it independent of overhanging perches and allows it to hunt over large, open water bodies. Black-and-white plumage unique among kingfishers. A cooperative breeder — non-breeding 'helpers', usually male offspring from previous years, assist the dominant pair in raising chicks.","howToSpot":{"lookFor":"A medium-sized kingfisher with bold black-and-white plumage — no other kingfisher in Africa has this colouration. Males have two black breast bands; females have one incomplete band. The thick, black dagger bill and crested head are distinctive. Usually seen hovering over water, bill pointed downward.","behaviour":"Hovers conspicuously over open water for 10–30 seconds before plunging vertically. Returns to the surface and may eat the fish in the air or carry it to a perch. Vocal, with a sharp, chattering call. Often seen in groups of 3–4 cooperative family members.","bestTime":"Year-round. Active throughout the day, most easily seen when hovering over open water.","strategy":"Scan open water — rivers, lagoons, dams — for the distinctive hovering silhouette with bill pointed downward. Pied kingfishers are extremely common on any Botswana river and require no special effort to find. The hovering is highly visible from a great distance."},"imageAssetName":"pied_kingfisher","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-001","commonName":"Common Ostrich","scientificName":"Struthio camelus","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","sossusvlei","central_kalahari","makgadikgadi","nxai_pan"],"habitats":["savanna","grassland","semi-arid","desert"],"conservationStatus":"LC","description":"The world's largest living bird, reaching 2.8 m and 160 kg — and the world's fastest bird on land at 70 km/h sustained (90 km/h in sprints). The two-toed foot is a powerful weapon: a single kick can disembowel a lion. Its eyes — 5 cm in diameter — are the largest of any land vertebrate. The breeding male performs a spectacular wing-fanning and body-swaying courtship display.","howToSpot":{"lookFor":"Unmistakable. A massively tall, long-necked bird with small, fluffy grey-brown wings and a bare pink-to-blue neck. Breeding males have black-and-white plumage with a vivid pink neck and legs. Females and immatures are grey-brown throughout. The bare blue-grey neck of the male turns vivid pink-red during the breeding season.","behaviour":"Lives in family groups of one male, 2–7 females. Ostriches do not actually bury their heads — this myth arose from the nesting posture, where the incubating bird lowers its head flat to the ground when alarmed. Can run for very long distances without tiring.","bestTime":"Active throughout the day. Year-round in open habitat.","strategy":"Scan open grassland and desert plains — ostriches are very large and visible from kilometres away. In Etosha, they are a regular sight on open pans. In the Namib, look for family groups on gravel plains. The Makgadikgadi is excellent ostrich country."},"imageAssetName":"common_ostrich","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-002","commonName":"Kori Bustard","scientificName":"Ardeotis kori","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","central_kalahari","makgadikgadi","nxai_pan","chobe"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"NT","description":"The world's heaviest flying bird, with males reaching 18–19 kg. Despite its bulk it flies powerfully when it must, but strongly prefers to walk. The male's courtship display is extraordinary — he inflates the throat to a white balloon-like pouch while fanning his tail over his back and drooping his wings to the ground, appearing to double in size. The pygmy falcon nests in association with its behaviour near sociable weaver colonies.","howToSpot":{"lookFor":"A very large, heavy-bodied bird walking slowly across open grassland. Finely vermiculated grey-brown upperparts; white underparts; a long neck with a grey chest and black-and-white markings. A pronounced crest of black feathers on the head. The sheer bulk — like a turkey-sized bustard — is immediately evident.","behaviour":"Walks steadily across open ground, pausing to eat insects, lizards, and small snakes. Often follows large mammals and their attendant insects. The male's display is most commonly seen in the early morning breeding season. Flies with deep, slow wing-beats when disturbed.","bestTime":"Morning and late afternoon in open savanna and grassland. Year-round.","strategy":"Scan open grassland from a vehicle — kori bustards are large enough to be visible at considerable distance. In Etosha and the Kalahari, they walk along roadsides early in the morning. They are approachable by vehicle but flush quickly on foot. Check areas around livestock and game for individuals following the attendant insects."},"imageAssetName":"kori_bustard","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-003","commonName":"Southern Ground Hornbill","scientificName":"Bucorvus leadbeateri","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["khaudum","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"VU","description":"One of Africa's most impressive birds — a turkey-sized, entirely black hornbill that walks through open savanna in slow, cooperative family groups of 2–9, hunting anything it can overpower including tortoises, snakes (including venomous species), and small mammals. Groups are led by the dominant breeding pair; all other members are helpers that assist in raising the single chick, which takes 9 months to fledge — the slowest development of any hornbill.","howToSpot":{"lookFor":"An unmistakable, very large, all-black bird on the ground. Brilliant red facial skin and throat wattle in adults (blue in females around the eyes). The massive, downcurved black bill is unique. White primary feathers are revealed only in flight. The sheer size — 90–100 cm long — and jet-black colouration make confusion with any other species impossible.","behaviour":"Walks slowly in small family groups through open areas, probing and tossing aside vegetation and dung to expose prey. Gives a deep, booming hoot — one of Africa's most evocative sounds, carrying up to 3 km and frequently heard before dawn. Groups roost together in tall trees.","bestTime":"Active throughout the day. The deep, resonant booming calls at dawn are the best auditory locator.","strategy":"Listen for the booming calls before sunrise — ground hornbills call from roost trees in the early morning before moving off to forage. Follow the sound. In Moremi and Chobe, they are reliably encountered on game drives in open woodland. Slow driving through grass pans is productive."},"imageAssetName":"southern_ground_hornbill","difficulty":"medium","isNocturnal":false},{"id":"BIR-GRD-004","commonName":"Helmeted Guineafowl","scientificName":"Numida meleagris","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","khaudum","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"The most abundant gamebird in Africa and the ancestor of the domestic guinea fowl. Named for the bony casque (helmet) on the crown. Its frantic, panicked running away from threats — rarely flying until the very last moment — is a characteristic feature of African savanna and has been the cause of many safari vehicle scares. Groups of 20–60 are typical, making the ground appear to move as they cross roads.","howToSpot":{"lookFor":"An instantly recognisable, round-bodied, dark-grey bird covered in white spots. Bare blue-and-red facial skin, a bony yellow-brown casque on the crown, and red wattles. Runs with a frantic, head-bobbing trot. Flocks of running, spotted birds crossing a road are unmistakable.","behaviour":"Forages in flocks, scratching through leaf litter for seeds, tubers, and insects. Roosts communally in trees at night. Extremely vocal — the repeated two-syllable 'come back, come back' call is constant from feeding flocks. Reluctant to fly; will run at speed for considerable distance.","bestTime":"Active throughout the day. Morning and evening foraging flocks are most conspicuous.","strategy":"Guineafowl are everywhere in good savanna habitat and require no effort to find. The interesting observation is watching their panic response to predators — when a large flock suddenly explodes into flight and scattering, something triggered it."},"imageAssetName":"helmeted_guineafowl","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-005","commonName":"Double-banded Sandgrouse","scientificName":"Pterocles bicinctus","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","khaudum","waterberg","central_kalahari","nxai_pan"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"Sandgrouse are among Africa's most extraordinary birds for their adaptation to aridity. The male double-banded sandgrouse soaks his belly feathers in water, then flies up to 80 km to the nest where the chicks drink by stripping the water from his feathers. The early morning gatherings at waterholes — when dozens to hundreds arrive simultaneously in fast, low flight — are one of the iconic sights of Etosha.","howToSpot":{"lookFor":"A plump, short-legged, pigeonlike bird. Male has a distinctive pattern of two parallel white bands across the black chest, white face with black lines through the eye. Female is more cryptically streaked and barred. The short bill, small head, pointed wings in flight, and fast, direct flight style are typical of all sandgrouse.","behaviour":"Cryptic on the ground — rests motionless and is almost invisible against dry soil and grass. Arrives at waterholes in fast flocks at a predictable time just after dark, drinks quickly, and departs. Calls in flight — a repeated mellow whistle that identifies the approaching flock before it lands.","bestTime":"Just after dusk at waterholes — the most reliable window. Year-round.","strategy":"In Etosha, sit at a floodlit waterhole from dusk. Sandgrouse flights arrive at predictable times — listen for the whistling flight calls before they land. In the Kalahari, check waterholes just after sunset. This is one of the most reliable evening wildlife spectacles in the region."},"imageAssetName":"double_banded_sandgrouse","difficulty":"medium","isNocturnal":true},{"id":"BIR-GRD-006","commonName":"Blacksmith Lapwing","scientificName":"Vanellus armatus","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","chobe","okavango","moremi","makgadikgadi"],"habitats":["grassland","wetland","riverine"],"conservationStatus":"LC","description":"One of Africa's most instantly recognisable waterside birds, named for the loud metallic 'tink-tink-tink' call — like a blacksmith's hammer on an anvil — that rings constantly around any open water. Among the most aggressive small birds in Africa, boldly diving and striking at intruders — including eagles, humans, and even lions — when nesting on exposed ground.","howToSpot":{"lookFor":"A distinctive black, white, and grey lapwing with a bold pattern. Black cap, throat, chest, and wings; white forehead and flanks; grey back. The red wattle-eye is vivid at close range. In flight, the bold black-and-white wing pattern is unmistakable. No other lapwing in the region has this tricolour pattern.","behaviour":"Usually seen in pairs or small groups on open ground near water. Gives the metallic alarm call repeatedly when any intruder approaches. Dives aggressively at threats. Nests in a scrape on open ground.","bestTime":"Year-round. Active throughout the day near water.","strategy":"Any open ground near water — riverbanks, floodplain edges, airstrips near rivers — will almost certainly have blacksmith lapwings. The metallic call is so distinctive and constant that it identifies the area before the bird is seen. Easy to see and to identify."},"imageAssetName":"blacksmith_lapwing","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-007","commonName":"Crowned Lapwing","scientificName":"Vanellus coronatus","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","central_kalahari","makgadikgadi","chobe"],"habitats":["grassland","savanna","semi-arid"],"conservationStatus":"LC","description":"The most characteristic bird of short-grazed grassland and airstrips across Africa. The dramatic white halo surrounding the black crown is unlike any other bird. A vocal, conspicuous sentinel of open land — its repeated harsh 'kreeeep' call, given persistently when any intruder approaches, is the background soundtrack of African grassland.","howToSpot":{"lookFor":"A brown-and-white lapwing with a distinctive black crown surrounded by a white halo, bisected by a red-tipped black bill. Brown body with a white belly separated by a black breast band. Red legs. The white halo around the black crown is the definitive field mark, visible at considerable distance.","behaviour":"Usually seen in pairs or small groups standing upright in short grass, often near roads. Bobs and runs rapidly when disturbed. Extremely vocal when approached — gives repeated, strident calls and will walk toward an intruder if nesting nearby.","bestTime":"Active throughout the day. Year-round in short grassland.","strategy":"Crowned lapwings need no strategy — they are conspicuous and common on any open ground. Airstrips across Botswana's national parks almost always have resident pairs. They are also the bird most frequently found on golf courses and sports fields throughout the region."},"imageAssetName":"crowned_lapwing","difficulty":"easy","isNocturnal":false},{"id":"BIR-GRD-008","commonName":"Kalahari Scrub Robin","scientificName":"Cercotrichas paena","category":"bird","subcategory":"ground_bird","regions":["namibia","botswana"],"specificRegions":["central_kalahari","makgadikgadi","nxai_pan","etosha","namib_naukluft"],"habitats":["semi-arid","savanna","grassland"],"conservationStatus":"LC","description":"A near-endemic bird of the Kalahari ecosystem and one of the most characteristic voices of the arid Kalahari and Namibian scrub. Its rich, melodious song — delivered from the top of a bush in the early morning — is one of the most evocative sounds of the Kalahari dawn. The cocked tail and ground-foraging habit are typical of the scrub robin family.","howToSpot":{"lookFor":"A small, ground-loving bird. Pale, sandy-buff above with dark streaking; white below with buff-washed flanks. A distinctive white supercilium (eyebrow stripe) above a dark eye stripe. The tail is frequently cocked upward, showing rufous-chestnut outer tail feathers. Pale pinkish-brown legs.","behaviour":"Forages on the ground and in low bushes, flicking leaves aside with the bill. Cocks its tail repeatedly — a characteristic habit. Sings from exposed perches at the tops of bushes, particularly in the early morning. Skulks when not singing.","bestTime":"Early morning when singing from exposed perches. Otherwise active throughout the day.","strategy":"Listen for the rich, melodious song at dawn in Kalahari scrub — it rises above all other bird sounds. Follow the song to the singing perch for a clear view. Central Kalahari and Nxai Pan are ideal habitat. The cocked rufous tail is visible on the ground even when the bird is otherwise hidden."},"imageAssetName":"kalahari_scrub_robin","difficulty":"medium","isNocturnal":false},{"id":"BIR-HRN-001","commonName":"Southern Yellow-billed Hornbill","scientificName":"Tockus leucomelas","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","khaudum","waterberg","central_kalahari","makgadikgadi","chobe","moremi"],"habitats":["savanna","woodland","semi-arid"],"conservationStatus":"LC","description":"The 'flying banana' of the African bush — the most abundant and familiar hornbill in the drier savannas of Namibia and Botswana. Endearingly tame around campsites, where it is often known as the 'Zazu bird' after the character in The Lion King. Nests in a sealed tree cavity — the female seals herself inside with mud and her own droppings, leaving only a vertical slit through which the male feeds her for the entire incubation period.","howToSpot":{"lookFor":"A medium-sized black-and-white bird with a large, curved yellow bill (the casque is underdeveloped compared to ground hornbills). White underparts, black back with white spots, white outer tail feathers visible in flight. The yellow bill is the defining field mark.","behaviour":"Forages on the ground and in low shrubs for insects, seeds, and small lizards. Hops with both feet together. Extremely tame around camps; will take food from the hand. Gives a repetitive, accelerating 'tok-tok-tok' call that ends in a liquid chuckle.","bestTime":"Active throughout the day; most vocal and conspicuous in the early morning when foraging. Year-round resident.","strategy":"One of the most frequently encountered birds of dry savanna — it requires no strategy. Listen for the accelerating tok-tok call, which will lead you to the bird. Campsite birds are delightfully tame and provide excellent photography opportunities."},"imageAssetName":"yellow_billed_hornbill","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-002","commonName":"Lilac-breasted Roller","scientificName":"Coracias caudatus","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","waterberg","khaudum","okavango","moremi","chobe","linyanti","nxai_pan","central_kalahari"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"Arguably Africa's most beautiful bird, flashing eight distinct colours in flight: lilac, turquoise, deep blue, pale green, black, white, rufous-brown, and buff. A classic open-savanna species that perches conspicuously to hunt. The courtship display is spectacular — the male dives and rolls in the air, the elongated tail streamers forming spirals, all while giving a harsh, raspy call. Botswana's national bird.","howToSpot":{"lookFor":"Lilac-pink breast, turquoise-green belly and wing coverts, rufous-brown back, brilliant blue flight feathers visible only in flight, and elongated blue outer tail streamers. About 36 cm long. The combination of colours is unique — no other African bird has both a lilac breast and turquoise underparts.","behaviour":"Perches motionless on the highest point available — dead branch, telephone wire, termite mound — scanning the ground below. Drops to catch insects, lizards, or small rodents, then returns to a perch. The rolling, diving display flight in the breeding season is breath-taking.","bestTime":"Active throughout the day in open savanna. Year-round resident — one of the most reliable birds at any time.","strategy":"Drive slowly through open savanna and scan the tops of exposed dead trees and bushes. The combination of vivid colours is unmissable even from a moving vehicle. Almost impossible to overlook in good habitat. In Moremi and Chobe, lilac-breasted rollers are among the most commonly photographed birds."},"imageAssetName":"lilac_breasted_roller","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-003","commonName":"Carmine Bee-eater","scientificName":"Merops nubicoides","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","savanna","woodland"],"conservationStatus":"LC","description":"One of Africa's most spectacular colonial nesting birds. The southern carmine bee-eater nests in enormous colonies of thousands of pairs in vertical sandbanks along major rivers, creating a wall of crimson and turquoise that is one of Africa's great wildlife spectacles. Between August and November, the Zambezi and Chobe banks are alive with nesting activity — the noise and colour of thousands of birds is overwhelming.","howToSpot":{"lookFor":"A stunning, slender bird with brilliant crimson-carmine plumage on the body, turquoise-green head, and an elongated central tail spike. The combination of carmine and turquoise is unmistakable. A dark mask runs through the eye. In flight, the elongated tail and swept-back wings create an elegant silhouette.","behaviour":"Highly colonial. Nests in horizontal burrows excavated in vertical sandbanks. Hawks insects from perches, often using large mammals (including elephants and kori bustards) as beaters — riding on their backs to catch disturbed insects. Aerial hawking creates a swirling, glittering display over the colony.","bestTime":"September–November at nesting colonies along the Zambezi and Chobe. December–March at wintering areas further north.","strategy":"From August, scan vertical sandstone or earth banks along the Zambezi and Chobe for the colonial nest entrances — hundreds of holes with crimson birds streaming in and out is unmissable. A boat trip past the nesting banks is the definitive experience. The sound of thousands of birds calling simultaneously is extraordinary."},"imageAssetName":"carmine_bee_eater","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-004","commonName":"White-fronted Bee-eater","scientificName":"Merops bullockoides","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","savanna"],"conservationStatus":"LC","description":"A superbly coloured colonial bee-eater with one of the most complex social structures of any bird — extended family groups of up to 17 individuals cooperate to raise young, and non-breeders are 'recruited' (sometimes forced) into helping by their relatives. A cooperative breeding system of extraordinary complexity that has been the subject of landmark ornithological research in Zimbabwe.","howToSpot":{"lookFor":"A brilliantly coloured medium bee-eater. Vivid red throat contrasting with a white face (the white forehead and chin are diagnostic and the basis of the name). Green-blue back and wings; buffy-cinnamon underparts; bright blue rump visible in flight. The red throat combined with white face and green back is unique among bee-eaters.","behaviour":"Colonial; nests in sandbanks like carmine bee-eaters, often in mixed colonies. Perches on exposed branches and wires above open ground, making fast aerial sallies after bees and wasps. Family groups often roost together, lined up along a branch.","bestTime":"Year-round resident near rivers. Most conspicuous August–December when nesting.","strategy":"Scan riparian vegetation and exposed perches along rivers in northern Botswana. Often nests in the same sandbanks as carmine bee-eaters. The red throat and white face are vivid and visible from a considerable distance. A common and reliable bird on any Chobe or Okavango river trip."},"imageAssetName":"white_fronted_bee_eater","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-005","commonName":"African Hoopoe","scientificName":"Upupa africana","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","waterberg","zambezi","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"A bird of unmistakable and ancient appearance — the hoopoe appears in Egyptian hieroglyphics and was sacred to the pharaohs. The fan-like crest of buff-and-black feathers is erected in a dramatic display when alarmed. The African hoopoe was recently split from the Eurasian hoopoe. The nest produces a foul-smelling oil from the uropygial gland which the female smears on the eggs — thought to deter predators.","howToSpot":{"lookFor":"An unmistakable pinkish-buff bird with bold black-and-white barred wings and back, a long, decurved black bill, and a prominent fan-like crest of pinkish-buff feathers tipped with black. In flight, the broad, rounded, black-and-white wings create a butterfly-like fluttering appearance.","behaviour":"Walks on the ground, probing with its long bill for beetle larvae and insects in soft soil. Erects the crest when alarmed, then lowers it as it relaxes. The 'hoop-hoop-hoop' call is a characteristic sound of woodland mornings. Solitary or in pairs.","bestTime":"Morning when feeding actively on the ground. Year-round.","strategy":"A very easy bird that needs no special strategy — hoopoes are common and conspicuous across a wide range of habitats. The distinctive fluttering, butterfly-like flight makes them immediately identifiable in the air. Listen for the 'hoop' call and scan open ground below trees. Common at campsites."},"imageAssetName":"african_hoopoe","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-006","commonName":"Broad-billed Roller","scientificName":"Eurystomus glaucurus","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["woodland","riverine"],"conservationStatus":"LC","description":"The most aerial of Africa's rollers, hunting exclusively in flight rather than dropping to the ground like the lilac-breasted roller. A Palearctic and intra-African migrant, present in northern Botswana from October to March when large numbers congregate at dusk, performing spectacular aerial displays above the woodland canopy and hunting flying insects on the wing.","howToSpot":{"lookFor":"A compact, short-tailed roller with a distinctive broad, flat, bright yellow bill (unique among rollers). Chestnut-purple body; vivid blue wings visible in flight. In good light the entire plumage shimmers with metallic blue, green, and purple. The short tail and wide yellow bill distinguish it from all other rollers.","behaviour":"Perches high in dead canopy trees, launching aerial sallies after flying insects. At dusk, large numbers hawk insects in spectacular, swirling flocks above the treetops. Gregarious at roost sites.","bestTime":"October–March when migrants are present. Dusk flocking is the most spectacular display.","strategy":"In Moremi and Chobe between October and March, scan the tops of tall dead trees for perching individuals. At dusk, scan the sky above the forest canopy — flocks of dozens may be hawking insects in the fading light. The short-tailed, broad-billed silhouette in acrobatic flight is distinctive."},"imageAssetName":"broad_billed_roller","difficulty":"medium","isNocturnal":false},{"id":"BIR-HRN-007","commonName":"Southern Red-billed Hornbill","scientificName":"Tockus rufirostris","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","khaudum","central_kalahari","chobe","moremi"],"habitats":["savanna","woodland","semi-arid"],"conservationStatus":"LC","description":"The closely related companion species to the yellow-billed hornbill in drier bush and mixed woodland. Like the yellow-billed, it has an obligate mutualistic relationship with the dwarf mongoose — following groups of mongooses to catch insects they disturb, and calling an aerial-predator alarm that the mongooses heed. One of the most studied examples of inter-species cooperation between a bird and a mammal.","howToSpot":{"lookFor":"Very similar to the yellow-billed hornbill in build and behaviour, but with a bright red bill instead of yellow. White underparts; black-and-white upperparts with white spots. The red bill is brighter and more vivid than the yellow-billed and immediately separates the two species. Slightly smaller than the yellow-billed.","behaviour":"Identical foraging behaviour to yellow-billed — hops on the ground, hunts insects and seeds. The cooperative relationship with dwarf mongooses is the same. The call is similar but slightly higher-pitched.","bestTime":"Active throughout the day in dry acacia woodland. Year-round resident; follows dwarf mongoose groups reliably.","strategy":"Scan ground and low shrubs in dry acacia savanna. Where dwarf mongooses are present, check carefully for accompanying red-billed hornbills — they literally follow the mongoose group at the same height and pace. More common in drier, more arid woodland than the yellow-billed."},"imageAssetName":"red_billed_hornbill","difficulty":"easy","isNocturnal":false},{"id":"BIR-HRN-008","commonName":"European Roller","scientificName":"Coracias garrulus","category":"bird","subcategory":"hornbill","regions":["namibia","botswana"],"specificRegions":["etosha","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"A striking Palearctic migrant that winters in southern Africa from October to April, migrating from breeding grounds in Europe and central Asia. Its arrival in Namibia and Botswana coincides with the rains and the explosion of insect life that follows. Often seen in large numbers following grass fires to hawk insects flushed by the flames — dozens may gather along a fire front.","howToSpot":{"lookFor":"A compact roller with a vivid turquoise-blue head, breast, and underparts; chestnut-brown back; and brilliant dark blue flight feathers in flight. The square tail (no streamers) distinguishes it from the lilac-breasted roller. Larger and stockier than the lilac-breasted. The blue flash of the wings in flight is brilliant.","behaviour":"Perches conspicuously on exposed wires, poles, and dead branches, scanning the ground. Drops to catch large insects, beetles, and lizards. Congregates around grass fires in sometimes spectacular numbers.","bestTime":"October–April when migrants are present. Most abundant November–March.","strategy":"Scan telephone wires and fence posts in open savanna between October and April. European rollers are very common in the wet season and perch conspicuously. Around grass fires, flocks of dozens may be hawking — the brilliant blue flash of their wings is visible from far away."},"imageAssetName":"european_roller","difficulty":"easy","isNocturnal":false},{"id":"BIR-SON-001","commonName":"Sociable Weaver","scientificName":"Philetairus socius","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["namib_naukluft","damaraland","kaokoveld","sossusvlei","central_kalahari"],"habitats":["semi-arid","savanna","desert"],"conservationStatus":"LC","description":"Builder of the largest nest structure of any bird in the world — a communal haystack nest up to 8 m long and 2 m deep, housing up to 500 birds in hundreds of individual chambers. These permanent structures, built on camelthorn acacias or telephone poles, are the most conspicuous wildlife feature of the Namibian landscape. The chambers are cool in summer and warm in winter, and the nest is also shared by pygmy falcons, ashy tits, and lanner falcons.","howToSpot":{"lookFor":"A small, sparrow-like brown bird with a black chin patch, a white-and-black scalloped pattern on the back, and a pale buff face and underparts. Almost always associated with its enormous nest structure — finding the nest (a massive haystack on a tree) is far easier than identifying the individual bird.","behaviour":"Intensely colonial; hundreds of birds constantly enter and exit the nest, accompanied by chattering calls. Forages in loose groups on the ground around the base of the nest tree, eating grass seeds and insects.","bestTime":"Year-round. Most active in the morning when foraging.","strategy":"The nest is the target — locate any large camelthorn acacia in arid Namibia and look for the massive thatched structure that can weigh up to 2,000 kg. Along roadsides between Namibia's towns, sociable weaver nests on telegraph poles are encountered every few kilometres."},"imageAssetName":"sociable_weaver","difficulty":"easy","isNocturnal":false},{"id":"BIR-SON-002","commonName":"Fork-tailed Drongo","scientificName":"Dicrurus adsimilis","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","khaudum","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"One of Africa's most charismatic and intelligent birds — an aggressive, bold thief that mimics the alarm calls of meerkats and other species to steal food from them. When a meerkat finds a scorpion, the drongo produces a perfect meerkat alarm call, causing the meerkat to drop its prey and dive for cover, whereupon the drongo swoops in to collect the stolen item. This remarkable deceptive kleptoparasitism is one of the most sophisticated tool uses documented in birds.","howToSpot":{"lookFor":"A glossy blue-black bird with a long, deeply forked tail — the most distinctive feature. Vivid red eye. Sits upright in an alert, aggressive posture. The forked tail and all-black glossy plumage make it immediately identifiable.","behaviour":"Perches prominently and sallies out to catch insects in short aerial dashes, returning to the same perch. Intensely aggressive — mobbing hawks, eagles, and even hornbills. Mimics other species' calls. Often follows large mammals to catch insects they disturb.","bestTime":"Active throughout the day; most conspicuous midday when hawking insects from exposed perches. Year-round.","strategy":"Drongos are found almost everywhere in savanna and woodland and require no strategy to find. The interesting behaviour to watch for is the kleptoparasitism — position near a meerkat group or foraging mongoose troop and watch for the drongo waiting for an opportunity to steal food."},"imageAssetName":"fork_tailed_drongo","difficulty":"easy","isNocturnal":false},{"id":"BIR-SON-003","commonName":"Crimson-breasted Shrike","scientificName":"Laniarius atrococcineus","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["etosha","damaraland","khaudum","central_kalahari","makgadikgadi"],"habitats":["savanna","semi-arid","woodland"],"conservationStatus":"LC","description":"A near-endemic of the southern African arid zone — one of the most breathtakingly coloured birds of the Kalahari and Namibian savanna. The combination of jet-black upperparts and vivid scarlet-crimson underparts has earned it the nickname 'the bird of paradise of the Kalahari'. Pairs sing complex, perfectly synchronised duets — one bird gives one phrase, the other completes it so rapidly that it sounds like a single voice.","howToSpot":{"lookFor":"Unmistakable. Jet-black head, back, wings, and tail contrasting with brilliant crimson-scarlet underparts from throat to undertail. White wing bar visible when the wing is spread. The colour contrast is among the most vivid of any African bird. An all-white variant (white instead of crimson) is occasionally seen.","behaviour":"Moves through thorny acacia scrub in pairs, calling and responding in alternating duet phrases. Feeds on large insects, lizards, and sometimes small frogs in low shrubs. Wary; often heard calling without being visible.","bestTime":"Most vocal in the early morning when duetting pairs call from exposed perches. Year-round resident.","strategy":"Listen for the rich, liquid duet calls in arid acacia scrub in the Kalahari and central Namibia. Follow the calls through the bush — the vivid red-and-black plumage against green foliage is unmistakable once found. Etosha's acacia woodland and the Central Kalahari are the best areas."},"imageAssetName":"crimson_breasted_shrike","difficulty":"medium","isNocturnal":false},{"id":"BIR-SON-004","commonName":"Cape Glossy Starling","scientificName":"Lamprotornis nitens","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","damaraland","khaudum","chobe","okavango","moremi","central_kalahari"],"habitats":["savanna","woodland"],"conservationStatus":"LC","description":"The most widespread and abundant of the glossy starlings — a family of iridescent, metallic-plumaged birds that are among Africa's most striking. The structural, iridescent colours — produced by the refraction of light through the microscopic structure of the feathers rather than by pigments — shift from blue-green to violet as the angle of light changes. A common and delightfully bold campsite visitor.","howToSpot":{"lookFor":"A medium starling with uniformly brilliant metallic blue-green plumage that shifts to violet-purple in different light. Orange-yellow eye. Short, dark bill. No spotting or streaking — uniformly iridescent. The orange eye is conspicuous and distinctive at close range.","behaviour":"Highly gregarious; forages in noisy flocks for fruit, insects, and nectar. Bold and inquisitive around camps and lodges. Frequently perches in the open on prominent branches and fence posts. Gives a variety of harsh, grating, and melodious calls.","bestTime":"Active throughout the day; most animated at dawn when foraging flocks move noisily through the canopy. Year-round.","strategy":"One of the most commonly encountered birds of the region — any campsite or lodge will have resident glossy starlings. The iridescent plumage is most stunning in good directional light. Not an effort-bird — it finds you."},"imageAssetName":"cape_glossy_starling","difficulty":"easy","isNocturnal":false},{"id":"BIR-SON-005","commonName":"Yellow-billed Oxpecker","scientificName":"Buphagus africanus","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["savanna","woodland","grassland"],"conservationStatus":"LC","description":"One of Africa's most fascinating ecological specialists — the oxpecker lives almost entirely on large mammals, clinging to their skin with sharp, laterally flattened claws and removing ticks, blood-feeding flies, and wound debris with its scissoring bill. The relationship is mutualistic but complex — oxpeckers also keep wounds open to drink blood, and their alarm calls alert the host to approaching predators.","howToSpot":{"lookFor":"A starling-sized bird clinging to the flanks, neck, or ears of large mammals. Brown above; buff below; vivid yellow bill with a red tip. A pale yellowish eye-ring (wattle) around the red eye. The red-tipped yellow bill and the habit of clinging to large mammals make it unmistakable. (The red-billed oxpecker, with an all-red bill, is less common in this region.)","behaviour":"Spends almost its entire life on the back of large mammals — buffalo, impala, giraffe, and rhino are favoured hosts. Runs up and down the body, probing into ears, nostrils, and wounds. Gives a sharp, hissing alarm call when a predator approaches — often alerting the host before it detects the threat itself.","bestTime":"Year-round wherever buffalo, giraffe, and waterbuck are present. Active throughout the day.","strategy":"Look on the backs and necks of large mammals — every buffalo and giraffe in northern Botswana likely carries a few oxpeckers. They are most visible when clinging to the side of a giraffe neck or perched on a buffalo's back. On rhino sightings, look for oxpeckers as a bonus."},"imageAssetName":"yellow_billed_oxpecker","difficulty":"easy","isNocturnal":false},{"id":"BIR-SON-006","commonName":"Violet-backed Starling","scientificName":"Cinnyricinclus leucogaster","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["waterberg","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["woodland","savanna"],"conservationStatus":"LC","description":"One of Africa's most breathtakingly iridescent birds — the male's upperparts shift from brilliant violet-purple to emerald-green as the light angle changes, producing one of nature's most dramatic structural colour displays. An intra-African migrant that arrives with the summer rains. Sexual dimorphism is extreme — the female is so different in appearance that the two were once considered separate species.","howToSpot":{"lookFor":"Male: brilliant, shifting iridescent violet-purple to emerald upperparts; clean white underparts with a sharp line between the two. Female: entirely different — heavily brown-streaked with white underparts spotted with brown. The male's iridescence is visible from a considerable distance in good sunlight — it appears to glow.","behaviour":"Found in small flocks in fruiting trees and at fig trees. Often perches on the very tops of trees in direct sunlight to display. A migrant; arrives October and departs March–April. Gathers in large flocks before departure.","bestTime":"October–March. Morning sunlight is essential to appreciate the full iridescence.","strategy":"Look in fruiting trees in woodland — figs and sycamores draw starlings. In Moremi and Chobe, the woodland edges in the wet season often have flocks. Morning sun at the right angle transforms the plumage from dull brown to brilliant violet — remarkable to observe as the bird moves on a branch."},"imageAssetName":"violet_backed_starling","difficulty":"medium","isNocturnal":false},{"id":"BIR-SON-007","commonName":"African Paradise Flycatcher","scientificName":"Terpsiphone viridis","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["waterberg","zambezi","chobe","okavango","moremi","linyanti"],"habitats":["woodland","riverine"],"conservationStatus":"LC","description":"One of Africa's most elegant birds — the breeding male carries tail streamers up to three times his body length in rufous-chestnut or (rarely) white, which spiral behind him in graceful arcs during his fast, acrobatic aerial chases through woodland. A common bird of dense riparian and evergreen forest that is heard far more often than it is seen, given its tendency to remain in the canopy.","howToSpot":{"lookFor":"Male: blue-black head, vivid blue eye-ring and bill, rufous-chestnut wings and back, white underparts, and two enormously long central tail streamers (rufous or white morph). Female: similar but lacking streamers. Immature males have shorter streamers. The impossibly long tail trailing behind a fast-flying bird in woodland is unmistakable.","behaviour":"Makes fast, twisting aerial sallies after insects, the long tail streamers trailing behind in curves. Extremely active; rarely sits still for more than a few seconds. The sharp, repeated 'zweet' call leads you to the bird.","bestTime":"Most common October–March. Active throughout the day in woodland.","strategy":"Listen for the sharp, repeated call in riparian woodland and follow it — the bird is almost always on the move. Chobe's riverside forests and the woodlands of Moremi reliably hold birds. The male's long tail catches light and movement even in dense shade."},"imageAssetName":"african_paradise_flycatcher","difficulty":"medium","isNocturnal":false},{"id":"BIR-SON-008","commonName":"Shaft-tailed Whydah","scientificName":"Vidua regia","category":"bird","subcategory":"songbird","regions":["namibia","botswana"],"specificRegions":["etosha","namib_naukluft","damaraland","central_kalahari","makgadikgadi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"One of the most extraordinary breeding-season birds of southern Africa's arid savannas. The breeding male grows four long tail feathers with spatula-shaped tips ('shaft-tails') that make his total length 28–30 cm — three times longer than the female. A brood parasite that lays its eggs in the nests of violet-eared waxbills, with chick mimicry so precise that the gape pattern and calls of the young whydah are identical to those of the host's own chicks.","howToSpot":{"lookFor":"Breeding male: vivid orange-buff, black, and white plumage with four extraordinarily long, racket-tipped tail feathers with spatula-shaped ends — unmistakable in flight as the tails wave and flutter. Female and non-breeding male: sparrow-like, streaked brown — easily overlooked. The breeding male in bouncing display flight is one of the most striking bird spectacles of the Kalahari.","behaviour":"Breeding males perform a spectacular bouncing display flight, the long tail feathers waving and flickering as they fly low over the grass in a slow, exaggerated undulation. Highly gregarious outside the breeding season; forms mixed flocks with other waxbills and whydahs.","bestTime":"November–March when males are in breeding plumage. Active throughout the day.","strategy":"Scan open grassland and scrub in the Kalahari and arid Namibia from December to March for the bouncing display flight of the breeding male. The long tail feathers and orange plumage are visible from a considerable distance. Central Kalahari and Etosha's open grassland areas are productive."},"imageAssetName":"shaft_tailed_whydah","difficulty":"medium","isNocturnal":false},{"id":"AMP-001","commonName":"African Bullfrog","scientificName":"Pyxicephalus adspersus","category":"amphibian","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","central_kalahari","makgadikgadi","nxai_pan","chobe","okavango","moremi"],"habitats":["savanna","grassland","semi-arid"],"conservationStatus":"LC","description":"Africa's largest frog and one of its most formidable amphibians — adult males reach 2 kg and will bite hard enough to draw blood from a human hand. Spends up to ten months of the year buried up to a metre underground in a self-made mucous cocoon, emerging explosively after heavy rain to breed in temporary pools. Males fight violently for territories in the breeding pool, with larger males actively guarding and herding tadpoles against predators and even digging channels between drying pools to rescue them.","howToSpot":{"lookFor":"A massive, olive-green frog with a wide, flat body; the largest frog you are likely to encounter. Adult males have a yellow-orange throat and prominent ridges (ridges) running the length of the back. Females are significantly smaller and more olive-brown. The wide, frog-like posture and sheer size make it unmistakable. Juveniles are bright green with a pale dorsal stripe.","behaviour":"Almost entirely fossorial outside of the brief breeding season. After heavy summer rain, males emerge and gather at temporary pools, where they call with a deep, resonant whooping grunt audible from hundreds of metres. Highly aggressive — males attack anything that enters the breeding pool, including snakes and mammals far larger than themselves. Consumed by locals and considered a delicacy.","bestTime":"First heavy rains of summer (November–January) when males emerge to breed. Sightings are almost impossible outside this window.","strategy":"Position near a large, temporary rainwater pan in Etosha, the Kalahari, or the Makgadikgadi within 24 hours of the first substantial summer downpour. The deep, resonant calling of males is audible before you reach the pan. Approach slowly with a torch after dark — the pool will often be ringed by calling males. One of Africa's most extraordinary weather-triggered wildlife events."},"imageAssetName":"african_bullfrog","difficulty":"hard","isNocturnal":true},{"id":"AMP-002","commonName":"African Foam-nest Tree Frog","scientificName":"Chiromantis xerampelina","category":"amphibian","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti","waterberg"],"habitats":["woodland","savanna","riverine"],"conservationStatus":"LC","description":"One of the most physiologically remarkable frogs in the world — the only African frog that can tolerate prolonged exposure to direct sun without desiccating, thanks to a waxy skin secretion that cuts water loss to levels comparable to a desert reptile. Groups of up to 40 individuals build a communal foam nest over water by whipping mucus with the hind legs, into which the female lays her eggs; the foam keeps the eggs moist as they develop.","howToSpot":{"lookFor":"A medium-sized, pale grey to cream-white tree frog with large, adhesive toe pads and distinctive maroon or red flash markings on the inner thighs, visible only when the frog is active or jumps. The pale, almost chalky-white skin and bright red eyes are the most recognisable features. Resting individuals appear nearly white and pressed flat against a tree trunk or leaf.","behaviour":"Spends the dry season aestivating on exposed tree branches in full sun — the white skin reflects heat and the waxy coating prevents dehydration, making it look like a patch of pale lichen from a distance. After rain, groups descend to vegetation overhanging water and whip mucus into a foam nest collectively. Strictly nocturnal when active.","bestTime":"During the dry season, resting individuals can be found on tree branches in full sunlight. After the first summer rains, groups gather at water to nest — November to February.","strategy":"In the dry season, scan the upper surfaces of branches and trunks of trees near seasonal pools and rivers — the white, waxy resting frog pressed flat against a pale branch is easy to overlook but unmistakable once found. After heavy rain in northern Botswana, check vegetation overhanging water at night for nesting groups; the foam nest the size of a tennis ball is visible in torchlight."},"imageAssetName":"foam_nest_tree_frog","difficulty":"medium","isNocturnal":true},{"id":"AMP-003","commonName":"Painted Reed Frog","scientificName":"Hyperolius marmoratus","category":"amphibian","subcategory":null,"regions":["botswana"],"specificRegions":["okavango","moremi","chobe","linyanti","zambezi"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"One of Africa's most visually variable small frogs — the painted reed frog displays an extraordinary range of colour morphs across its range, from boldly striped white-and-brown to spotted and marbled patterns. Individual frogs can change colour slightly between activity states. The males produce a deafening, high-pitched whistle that is amplified by the vocal sac to carry across water — choruses of hundreds in the Okavango on a warm summer night are among Africa's most intense acoustic experiences.","howToSpot":{"lookFor":"A small, slender tree frog (3–3.5 cm) with large adhesive toe pads. Colour is highly variable: typically striped cream-and-brown, spotted, or marbled in shades of brown, cream, olive, and orange. The bold geometric pattern is striking at close range. Bright red or orange eyes in some individuals. The adhesive toe pads allow it to cling to smooth reed stems vertically.","behaviour":"Males call from reed stems and vegetation at the water's edge, inflating a single large vocal sac to produce a sharp, penetrating whistle. Highly gregarious when calling — choruses of dozens to hundreds are typical. Strongly nocturnal; rests concealed in reed beds by day. Females are attracted to calling males and amplexus occurs on vegetation above the water.","bestTime":"Warm, humid evenings from October through March when breeding choruses are active. Peak activity on still, warm nights after rain.","strategy":"Walk slowly along the edge of any reed-fringed lagoon or channel in the Okavango or Chobe after dark. The chorus is deafening and immediately locates the frogs. Shine a torch along reed stems at water level — the reflective eyes pick up the beam and the vivid patterning is unmistakable at close range. The experience of a full Okavango reed frog chorus on a warm night is genuinely extraordinary."},"imageAssetName":"painted_reed_frog","difficulty":"medium","isNocturnal":true},{"id":"AMP-004","commonName":"Banded Rubber Frog","scientificName":"Phrynomantis bifasciatus","category":"amphibian","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","waterberg","khaudum"],"habitats":["savanna","woodland","riverine"],"conservationStatus":"LC","description":"A strikingly aposematic frog whose vivid red-and-black colouration advertises the toxic skin secretions that make it unpalatable to most predators. Despite this bold warning, it is a secretive species rarely seen outside of breeding congregations. Unlike most frogs it walks rather than hops — a slow, deliberate gait that resembles a miniature lizard. It shelters in termite mounds, where it may associate with specific termite species that tolerate its presence.","howToSpot":{"lookFor":"Unmistakable and unlike any other frog in the region. A smooth, rubbery-skinned frog with a distinctive pattern of bright red or orange-red bands and spots on a jet-black background — the underside is equally vivid. The small, narrow head and pointed snout give it a non-frog-like profile. Walks deliberately rather than hopping.","behaviour":"Terrestrial and largely nocturnal. Shelters in termite mounds and under logs and bark by day. After rain, gathers in large numbers at temporary pools to breed; the calling male produces a high-pitched, melodious trill. The slow, deliberate walk is immediately noticeable and distinguishes it from all other local frogs.","bestTime":"After heavy summer rain (November–February) when breeding aggregations form at temporary pools. Occasionally encountered on night drives crossing roads.","strategy":"Night drives in woodland and savanna after substantial rain are the most productive approach. Scan road surfaces slowly — banded rubber frogs cross tar and dirt roads after dark and the vivid red-and-black pattern is unmissable in a spotlight. In the Waterberg and northern Botswana woodlands, they are encountered regularly on wet-season night drives."},"imageAssetName":"banded_rubber_frog","difficulty":"medium","isNocturnal":true},{"id":"AMP-005","commonName":"Guttural Toad","scientificName":"Sclerophrys gutturalis","category":"amphibian","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","waterberg","zambezi","chobe","okavango","moremi","linyanti","khaudum"],"habitats":["savanna","woodland","riverine","wetland"],"conservationStatus":"LC","description":"The most abundant and widespread toad in the region and one of the most commonly encountered amphibians on any safari. A large, robust toad with toxic parotoid glands behind the eyes that deter most predators — though the African civet is able to consume them by rolling them in the soil to remove the toxin. Breeding choruses produce a sustained, guttural snoring call from which the species takes its name, audible from a kilometre on still nights.","howToSpot":{"lookFor":"A large, stocky toad (up to 12 cm) with rough, heavily warty skin. Pale grey to brown above with irregular darker blotches; a pale, cream median dorsal stripe runs from snout to vent. Prominent parotoid glands (large, oval, warty pads) behind each eye. The underside is pale and smooth. Much larger and stouter than any reed frog or foam-nest tree frog.","behaviour":"Largely nocturnal; shelters under logs, stones, and in burrows by day. Walks more than it hops. Males call from the edges of any standing water, producing a sustained, snoring 'kraaa-kraaa-kraaa' in large, deafening choruses. Commonly found at lodge and camp swimming pools attracted by the insects drawn to the lights.","bestTime":"Active throughout the wet season (October–April) after rain. The calling chorus begins after dusk and continues through the night.","strategy":"One of the easiest amphibians to find — check the edges of any standing water, pond, or swimming pool at a lodge after dark. Calling males are stationary and easily observed with a torch. The guttural chorus at a breeding pond is very loud and impossible to miss. A common and reliable encounter throughout northern Botswana and the Namibian woodland areas."},"imageAssetName":"guttural_toad","difficulty":"easy","isNocturnal":true},{"id":"FSH-001","commonName":"Tigerfish","scientificName":"Hydrocynus vittatus","category":"fish","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","linyanti"],"habitats":["riverine"],"conservationStatus":"LC","description":"The apex predator of Africa's great river systems and one of the most prized sport fish on the continent — the tigerfish is to the Zambezi what the great white shark is to the ocean. Rows of large, interlocking, razor-sharp teeth that cannot be fully closed give it a permanently menacing expression. Hunts in fast, coordinated packs and is one of the few freshwater fish documented to leap from the water and take birds — including barn swallows — in mid-flight.","howToSpot":{"lookFor":"A muscular, torpedo-shaped silver fish with vivid black horizontal stripes along the flanks — the basis of the name. The large, prominent, interlocking canine teeth are visible even when the mouth is closed. Large scales with a golden sheen. Deeply forked tail. Adults in the Zambezi regularly reach 5–7 kg; exceptional individuals exceed 15 kg.","behaviour":"An aggressive, open-water predator that hunts in schools. Attacks prey in fast, slashing strikes, the teeth cutting rather than gripping. Leaps repeatedly when hooked on a line, cartwheeling through the air. At dawn and dusk, feeding frenzies near the surface are visible as a boil of splashing water and fleeing baitfish.","bestTime":"Most active at dawn and dusk when feeding schools move close to the surface. Year-round in the Zambezi and Chobe. Most visible during low water (August–October) when fish concentrate.","strategy":"Take a fishing or boat trip on the Chobe River or Zambezi near Kasane or Katima Mulilo. At dawn, scan fast-flowing sections and rocky rapids for surface-feeding frenzies — the splash of fleeing baitfish and the tigerfish slashing through them is dramatic and unmistakable. Any fish eagle sitting over fast water is often tracking a tigerfish below."},"imageAssetName":"tigerfish","difficulty":"medium","isNocturnal":false},{"id":"FSH-002","commonName":"Vundu","scientificName":"Heterobranchus longifilis","category":"fish","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"The largest freshwater fish in southern Africa, with authenticated specimens from the Zambezi exceeding 55 kg and 1.5 m. A giant catfish of the deepest river channels and submerged snags, the vundu is primarily a nocturnal scavenger and predator of fish, frogs, and carrion. A prized catch for subsistence and sport fishermen alike. An accessory breathing organ allows it to survive in poorly oxygenated water where other large fish cannot.","howToSpot":{"lookFor":"An enormous, smooth-skinned catfish — no scales. Dark grey-brown to olive on the back, paling to cream on the belly. Four pairs of barbels ('whiskers') around the large, wide mouth — two long maxillary barbels extending well past the gills and three shorter pairs. A large, fleshy adipose fin between the dorsal fin and the tail. The sheer size of an adult is impressive.","behaviour":"Primarily nocturnal; spends the day resting in deep pools under submerged logs and root tangles. Feeds by sweeping the bottom with its barbels and engulfing prey with the wide, suction-capable mouth. Rolls slowly at the surface in very warm, low-oxygen conditions to access oxygenated surface water. Occasionally seen from boats over deep pools at dusk.","bestTime":"Dusk and night in deep pools of large rivers. Most likely to be observed during low-water periods when fish concentrate in deep channels.","strategy":"Scan deep, shaded pools in the main river channel from a boat at dusk — vundu occasionally roll at the surface in the last light. Night fishing trips on the Zambezi near Katima Mulilo specifically target vundu. River guides and camp staff always know the local deep-pool locations. A dramatic encounter when a large individual rolls or surfaces."},"imageAssetName":"vundu","difficulty":"hard","isNocturnal":true},{"id":"FSH-003","commonName":"Sharptooth Catfish","scientificName":"Clarias gariepinus","category":"fish","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["etosha","zambezi","chobe","okavango","moremi","linyanti","makgadikgadi"],"habitats":["riverine","wetland","savanna"],"conservationStatus":"LC","description":"The most widespread and adaptable large freshwater fish in Africa, with a range extending from the Nile to the Cape. A superpredator in shallow water, the sharptooth catfish is notorious for mass spawning migrations across flooded savanna — thousands of large fish travel overland through grass only a few centimetres deep on rainy nights, wriggling across fields to reach new pools. An accessory breathing organ allows it to survive out of water for extended periods and to breathe atmospheric air.","howToSpot":{"lookFor":"A large, scaleless catfish with a broad, flattened head and an enormous wide mouth. Dark grey to olive-black on the back with a paler belly. Four pairs of barbels around the mouth. A long, continuous dorsal fin running most of the length of the back. Adults commonly reach 60–80 cm and 4–6 kg; specimens over 30 kg have been recorded.","behaviour":"Mostly nocturnal but frequently active by day in turbid water. An opportunistic predator eating fish, frogs, invertebrates, and carrion. During heavy rain, undertakes remarkable overland migrations across flooded grassland — the sound and sight of large fish wriggling through ankle-deep water is genuinely startling. Concentrates in receding pools in the dry season and can be seen from a distance as crocodiles and birds gather.","bestTime":"Year-round. Overland migrations occur on rainy nights from November to March. Dry-season pools (July–October) concentrate large numbers.","strategy":"In the dry season, any shrinking pool in northern Botswana will likely contain concentrations of catfish — identifiable by the disturbance and the gathering of crocodiles, herons, and fish eagles. On flooded grassland at night after heavy rain, wade carefully — you may hear and feel large fish moving through the water around your feet."},"imageAssetName":"sharptooth_catfish","difficulty":"medium","isNocturnal":true},{"id":"FSH-004","commonName":"African Lungfish","scientificName":"Protopterus annectens","category":"fish","subcategory":null,"regions":["botswana"],"specificRegions":["okavango","moremi","linyanti","chobe"],"habitats":["wetland","riverine"],"conservationStatus":"LC","description":"A genuine living fossil, virtually unchanged from specimens in the fossil record dating back 400 million years — lungfish predate the dinosaurs by 200 million years. The only fish in the region capable of breathing atmospheric air, rising to the surface every 30–60 minutes to gulp air through functional lungs. During drought, it burrows into mud, secretes a protective mucous cocoon, and aestivates for up to four years — surviving the complete drying of its wetland habitat and reviving when the rains return.","howToSpot":{"lookFor":"An elongated, eel-like fish reaching up to 1 m with a cylindrical body, small eyes, and two pairs of long, filamentous paired fins — more like primitive limbs than typical fish fins. Dark grey to brownish-olive with darker marbling on the back and a paler, pinkish belly. The long, tapering snout and tiny eyes give it an ancient, primitive appearance quite unlike any conventional fish.","behaviour":"Surfaces regularly to breathe air — a slow, deliberate rise to the surface, a gulp, and a descent, repeated every 30–60 minutes. Hunts slowly in shallow, vegetated water for molluscs, frogs, and small fish, which it crushes with plate-like teeth. In very shallow, deoxygenated water, may be seen breathing air continuously near the surface. Largely inactive during the dry season, buried in the substrate.","bestTime":"Wet season (November–April) when active in shallow, flooded areas of the Okavango. Most easily spotted at the surface breathing. Dry season individuals are buried and inaccessible.","strategy":"On a mokoro trip through shallow, vegetated areas of the Okavango, watch the water surface carefully — a slow, deliberate surfacing followed by a visible gulp of air and a descent, roughly every 30–60 minutes, is diagnostic. Ask your poler to watch for air-breathing fish. Shallow, heavily vegetated backwaters are the most productive. An encounter with this living fossil is genuinely humbling."},"imageAssetName":"african_lungfish","difficulty":"hard","isNocturnal":false},{"id":"FSH-005","commonName":"Nile Tilapia","scientificName":"Oreochromis niloticus","category":"fish","subcategory":null,"regions":["namibia","botswana"],"specificRegions":["zambezi","chobe","okavango","moremi","linyanti"],"habitats":["riverine","wetland"],"conservationStatus":"LC","description":"One of the most ecologically important fish in the Okavango and Chobe systems — the tilapia forms the base of the food chain that supports virtually every aquatic and semi-aquatic predator in northern Botswana, from the African fish eagle and goliath heron to the Nile crocodile. An exclusively herbivorous cichlid that filters algae and grazes on aquatic vegetation, converting plant material into protein that moves up the food chain. Schools of thousands are a characteristic sight on any river boat trip.","howToSpot":{"lookFor":"A deep-bodied, laterally compressed fish with a continuous dorsal fin edged in red. Silvery-grey with faint vertical banding on the sides; a distinctive red or orange-red margin to the tail fin. Breeding males develop a vivid dark blue-black coloration on the head and belly. Large scales and a small, slightly downturned mouth adapted for grazing. Schools visible from above as dark, shifting masses in clear shallows.","behaviour":"Highly gregarious — schools of hundreds to thousands in open water. Males are mouthbrooders: the female incubates fertilised eggs in her mouth and continues to shelter the fry there after hatching, releasing them to feed but scooping them back at any sign of danger. Spawning males defend circular substrate nests with vigorous fin displays.","bestTime":"Year-round in permanent water. Most visible from a boat in clear, shallow water where large schools are visible from above.","strategy":"On any boat trip in the Okavango or Chobe, scan shallow, clear water for the dark mass of a large tilapia school — they are frequently visible just below the surface. The gathering of fish eagles, herons, kingfishers, and crocodiles at a shallow crossing point almost always reflects a tilapia concentration below. Spawning males in shallow water perform visible fin displays."},"imageAssetName":"nile_tilapia","difficulty":"easy","isNocturnal":false}]};
