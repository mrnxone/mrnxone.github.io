// ── State ─────────────────────────────────────────────────────────────────────
let S = {
  view: 'home',
  selectedId: null,
  search: '',
  filterCat: null,
  filterSpotted: null,   // null | true | false
  filterCountry: null,   // null | 'namibia' | 'botswana'
  grouped: true,
  modalId: null,
  modalIsSpotted: true,
};
let sightings = JSON.parse(localStorage.getItem('safari_sightings') || '{}');

function save() { localStorage.setItem('safari_sightings', JSON.stringify(sightings)); }
function isSeen(id) { return sightings[id]?.spotted === true; }
function getSighting(id) { return sightings[id] || null; }

// ── Navigation ────────────────────────────────────────────────────────────────
function go(view, extra={}) {
  Object.assign(S, {view}, extra);
  render();
  window.scrollTo({top:0, behavior:'auto'});
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.nav===view||(!['home','list'].includes(view)&&b.dataset.nav==='list')));
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (S.view === 'home')   app.innerHTML = renderHome();
  if (S.view === 'list')   app.innerHTML = renderList();
  if (S.view === 'detail') app.innerHTML = renderDetail(S.selectedId);
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const total   = ANIMALS.length;
  const spotted = ANIMALS.filter(a => isSeen(a.id)).length;
  const pct     = total > 0 ? spotted/total : 0;
  const r=80, sw=12, circ=2*Math.PI*r;
  const offset  = circ - pct*circ;
  const catRows = Object.entries(CAT).map(([key, cfg]) => {
    const group = ANIMALS.filter(a=>a.category===key);
    const gs = group.filter(a=>isSeen(a.id)).length;
    const gp = group.length > 0 ? gs/group.length : 0;
    return `<div class="cat-row" onclick="go('list',{filterCat:'${key}',search:'',filterSpotted:null,filterCountry:null})">
      <div class="cat-top">
        <span class="cat-icon">${cfg.emoji}</span>
        <span class="cat-name">${cfg.label}</span>
        <span class="cat-count">${gs} / ${group.length}</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${gp*100}%;background:${cfg.color}"></div>
      </div>
    </div>`;
  }).join('');

  return `<div>
    <div class="home-header">
      <div class="home-greeting">Your Safari</div>
      <div class="home-title">Namibia &amp; Botswana</div>
    </div>
    <div class="ring-section">
      <div class="ring-wrap">
        <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
          <circle cx="90" cy="90" r="${r}" fill="none" stroke="#E4DDD2" stroke-width="${sw}"/>
          <circle cx="90" cy="90" r="${r}" fill="none" stroke="#B8722A" stroke-width="${sw}"
            stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"
            transform="rotate(-90 90 90)"/>
        </svg>
        <div class="ring-inner">
          <div class="ring-num">${spotted}</div>
          <div class="ring-denom">of ${total}</div>
        </div>
      </div>
      <div class="ring-label">${spotted===total?'🎉 All spotted!':spotted===0?'Let the adventure begin':'Keep exploring!'}</div>
      <div class="ring-sub">${Math.round(pct*100)}% complete &nbsp;·&nbsp; ${total-spotted} remaining</div>
    </div>
    <div class="cat-section">
      <div class="section-hd">By category</div>
      ${catRows}
    </div>
  </div>`;
}

// ── LIST ──────────────────────────────────────────────────────────────────────
function renderList() {
  let animals = ANIMALS;
  const q = S.search.toLowerCase().trim();
  if (q) animals = animals.filter(a=>
    a.commonName.toLowerCase().includes(q)||a.scientificName.toLowerCase().includes(q));
  if (S.filterCat)     animals = animals.filter(a=>a.category===S.filterCat);
  if (S.filterCountry) animals = animals.filter(a=>a.regions.includes(S.filterCountry));
  if (S.filterSpotted===true)  animals = animals.filter(a=>isSeen(a.id));
  if (S.filterSpotted===false) animals = animals.filter(a=>!isSeen(a.id));

  // chips
  const cats = ['mammal','bird','reptile','amphibian','fish'];
  const catChips = cats.map(c=>`<button class="chip${S.filterCat===c?' on':''}" onclick="setFilter('filterCat','${c}')">${CAT[c].emoji} ${CAT[c].label}</button>`).join('');
  const countryChips = ['namibia','botswana'].map(c=>`<button class="chip${S.filterCountry===c?' on':''}" onclick="setFilter('filterCountry','${c}')">${c==='namibia'?'🇳🇦':'🇧🇼'} ${c==='namibia'?'Namibia':'Botswana'}</button>`).join('');
  const spChips = [
    `<button class="chip${S.filterSpotted===true?' on':''}" onclick="setFilter('filterSpotted',true)">✅ Spotted</button>`,
    `<button class="chip${S.filterSpotted===false?' on':''}" onclick="setFilter('filterSpotted',false)">⭕ Unseen</button>`
  ].join('');

  // animal cards
  let listHTML = '';
  if (S.grouped && !q && !S.filterCat) {
    const order = ['mammal','bird','reptile','amphibian','fish'];
    order.forEach(cat => {
      const group = animals.filter(a=>a.category===cat);
      if (!group.length) return;
      listHTML += `<div class="sect-label">${CAT[cat].emoji} ${CAT[cat].label}s (${group.length})</div>`;
      listHTML += group.map(a=>animalCard(a)).join('');
    });
  } else {
    listHTML = animals.map(a=>animalCard(a)).join('');
  }

  const activeFilters = [S.filterCat,S.filterCountry,S.filterSpotted!==null?'x':null].filter(Boolean).length;

  return `<div>
    <div class="list-header">
      <div class="list-title">Animals</div>
      <button class="group-toggle" onclick="S.grouped=!S.grouped;render()">${S.grouped?'A–Z':'Grouped'}</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="Search species…" value="${S.search}"
        oninput="S.search=this.value;render()" autocomplete="off">
    </div>
    <div class="filter-scroll">
      <button class="chip${!S.filterCat&&!S.filterCountry&&S.filterSpotted===null?' on':''}" onclick="clearFilters()">All</button>
      ${catChips}${countryChips}${spChips}
    </div>
    <div class="results-bar">${animals.length} of ${ANIMALS.length} species${activeFilters?` · ${activeFilters} filter${activeFilters>1?'s':''} active`:''}</div>
    <div class="animal-list">
      ${listHTML || '<div class="empty"><span class="empty-icon">🔍</span><div class="empty-txt">No animals match your search.<br>Try different filters.</div></div>'}
    </div>
  </div>`;
}

function animalCard(a) {
  const emoji = EMOJI_MAP[a.id] || CAT[a.category].emoji;
  const seen  = isSeen(a.id);
  const dots  = diffDots(a.difficulty);
  return `<div class="a-card" onclick="go('detail',{selectedId:'${a.id}'})">
    <div class="a-thumb" style="background:${CAT[a.category].bg}">${emoji}</div>
    <div class="a-info">
      <div class="a-name">${a.commonName}</div>
      <div class="a-sci">${a.scientificName}</div>
      <div class="a-badges">
        <span class="badge ${STATUS_BADGE[a.conservationStatus]}">${a.conservationStatus}</span>
        <span class="diff-dots">${dots}</span>
        ${a.isNocturnal?'<span class="nocturnal-icon">🌙</span>':''}
      </div>
    </div>
    <div class="a-spotted">${seen?'✅':'⭕'}</div>
  </div>`;
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function renderDetail(id) {
  const a = ANIMALS.find(x=>x.id===id);
  if (!a) return '<div class="empty">Animal not found.</div>';
  const cat   = CAT[a.category];
  const emoji = EMOJI_MAP[id] || cat.emoji;
  const seen  = isSeen(id);
  const sg    = getSighting(id);
  const dots  = diffDots(a.difficulty);

  // spotted card
  let spotCard = '';
  if (seen) {
    const parts = [];
    if (sg?.date)     parts.push(formatDate(sg.date));
    if (sg?.location) parts.push(sg.location);
    spotCard = `<div class="d-card spot-card spotted">
      <div class="spot-row">
        <div class="spot-ico">✅</div>
        <div class="spot-meta">
          <div class="spot-lbl">Spotted!</div>
          <div class="spot-detail">${parts.join(' · ')||'No details recorded'}</div>
          ${sg?.notes?`<div class="spot-detail" style="margin-top:4px;font-style:italic">"${sg.notes}"</div>`:''}
        </div>
      </div>
      <button class="spot-btn edit" onclick="openModal('${id}')">✏️ Edit sighting</button>
      <button class="unmark-btn" onclick="unmark('${id}')">Remove from spotted</button>
    </div>`;
  } else {
    spotCard = `<div class="d-card spot-card unspotted">
      <button class="spot-btn mark" onclick="openModal('${id}')">🔭 Mark as spotted</button>
    </div>`;
  }

  // regions
  const regionsByCountry = {'namibia':[],'botswana':[]};
  a.specificRegions.forEach(r => {
    const namibiaRegions = ['etosha','damaraland','skeleton_coast','namib_naukluft','kaokoveld','zambezi','waterberg','fish_river','sossusvlei','khaudum'];
    if (namibiaRegions.includes(r)) regionsByCountry.namibia.push(r);
    else regionsByCountry.botswana.push(r);
  });
  const regionsHTML = Object.entries(regionsByCountry).filter(([,v])=>v.length).map(([country,regs])=>
    `<div class="region-grp">
      <div class="region-country">${country==='namibia'?'🇳🇦 Namibia':'🇧🇼 Botswana'}</div>
      <div class="chips-wrap">${regs.map(r=>`<span class="r-chip ${country}">${REGION_DISPLAY[r]||r}</span>`).join('')}</div>
    </div>`
  ).join('');

  const habitatsHTML = a.habitats.map(h=>`<span class="h-chip">${h.charAt(0).toUpperCase()+h.slice(1)}</span>`).join('');

  return `<div>
    <div class="detail-hero" style="background:linear-gradient(160deg,${cat.color}CC,${cat.color})">
      <button class="d-back" onclick="go('list')">← Back</button>
      <div class="d-emoji">${emoji}</div>
      <div class="d-name">${a.commonName}</div>
      <div class="d-sci">${a.scientificName}</div>
      <div class="d-hero-badges">
        <span class="hero-badge">${a.conservationStatus}</span>
        <span class="hero-badge">${diffLabel(a.difficulty)}</span>
        ${a.isNocturnal?'<span class="hero-badge">🌙 Nocturnal</span>':''}
      </div>
    </div>

    <div class="d-body">
      ${spotCard}

      <div class="d-card">
        <div class="d-card-title">About</div>
        <div class="d-text">${a.description}</div>
      </div>

      <div class="d-card">
        <div class="d-card-title">🗺 Where to find it</div>
        ${regionsHTML}
        <div style="margin-top:10px">
          <div class="region-country" style="margin-bottom:6px">Habitats</div>
          <div class="chips-wrap">${habitatsHTML}</div>
        </div>
      </div>

      <div class="d-card">
        <div class="d-card-title">🔭 How to spot it</div>
        <div class="hts-grid">
          <div class="hts-item">
            <div class="hts-lbl">👁 Look for</div>
            <div class="hts-txt">${a.howToSpot.lookFor}</div>
          </div>
          <div class="hts-item">
            <div class="hts-lbl">🏃 Behaviour</div>
            <div class="hts-txt">${a.howToSpot.behaviour}</div>
          </div>
          <div class="hts-item">
            <div class="hts-lbl">🕐 Best time</div>
            <div class="hts-txt">${a.howToSpot.bestTime}</div>
          </div>
          <div class="hts-item">
            <div class="hts-lbl">🎯 Strategy</div>
            <div class="hts-txt">${a.howToSpot.strategy}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const a  = ANIMALS.find(x=>x.id===id);
  const sg = getSighting(id);
  S.modalId = id;
  S.modalIsSpotted = sg?.spotted !== false;
  document.getElementById('modal-name').textContent = a.commonName;
  document.getElementById('modal-sci').textContent  = a.scientificName;
  document.getElementById('m-date').value     = sg?.date     || today();
  document.getElementById('m-location').value = sg?.location || '';
  document.getElementById('m-notes').value    = sg?.notes    || '';
  modalToggle(S.modalIsSpotted);
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  S.modalId = null;
}

function modalToggle(isSpotted) {
  S.modalIsSpotted = isSpotted;
  document.getElementById('t-spotted').classList.toggle('on', isSpotted);
  document.getElementById('t-unspotted').classList.toggle('on', !isSpotted);
  document.getElementById('modal-fields').style.display = isSpotted ? '' : 'none';
}

function saveSighting() {
  const id = S.modalId;
  if (!id) return;
  if (S.modalIsSpotted) {
    sightings[id] = {
      spotted:  true,
      date:     document.getElementById('m-date').value,
      location: document.getElementById('m-location').value.trim(),
      notes:    document.getElementById('m-notes').value.trim(),
    };
  } else {
    sightings[id] = {spotted: false};
  }
  save();
  closeModal();
  render();
}

function unmark(id) {
  if (!confirm('Remove this sighting?')) return;
  delete sightings[id];
  save();
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function diffDots(d) {
  const n = DIFF_LABELS[d]||1;
  return [1,2,3,4].map(i=>`<div class="dd ${i<=n?'f':'e'}"></div>`).join('');
}
function diffLabel(d) {
  return {easy:'Easy',medium:'Medium',hard:'Hard',very_hard:'Very Hard'}[d]||d;
}
function formatDate(s) {
  if (!s) return '';
  try { return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch{return s;}
}
function today() {
  return new Date().toISOString().slice(0,10);
}
function setFilter(key, val) {
  if (S[key]===val) S[key]=null; else S[key]=val;
  if (key!=='filterSpotted') {} // keep as-is
  if (key==='filterSpotted'&&S.filterSpotted===val) S.filterSpotted=null;
  render();
}
function clearFilters() {
  S.filterCat=null; S.filterCountry=null; S.filterSpotted=null; S.search='';
  render();
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('[data-nav]');
  if (btn) go(btn.dataset.nav);
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target===document.getElementById('modal')) closeModal();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
document.querySelectorAll('.nav-btn').forEach(b=>
  b.classList.toggle('active',b.dataset.nav==='home'));
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
</body>
</html>
